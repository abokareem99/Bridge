<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر خدمة جديدة - Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: var(--w); width: 100%; max-width: 450px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h2 { color: var(--pi-p); text-align: center; margin-bottom: 20px; font-weight: 800; }
        .fee-badge { background: #f3e5f5; color: var(--pi-p); padding: 8px 15px; border-radius: 12px; display: block; text-align: center; font-size: 0.9rem; margin-bottom: 25px; border: 1px dashed var(--pi-p); }
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 15px; border: 1px solid #ececec; border-radius: 15px; background: #fdfdfd; font-size: 0.95rem; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--pi-p); box-shadow: 0 0 0 3px rgba(106, 27, 154, 0.1); }
        .btn-publish { width: 100%; background: var(--pi-p); color: white; border: none; padding: 18px; border-radius: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-publish:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #666; font-weight: 600; }
        .footer-links { margin-top: auto; padding: 20px; text-align: center; }
        .footer-links a { color: var(--pi-p); text-decoration: none; margin: 0 10px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>نشر خدمة جديدة</h2>
        <div class="fee-badge">رسوم النشر: 1.0 Pi</div>

        <div class="input-group">
            <input type="text" id="title" placeholder="عنوان الخدمة (مثلاً: تصميم شعار)">
        </div>

        <div class="input-group">
            <textarea id="description" rows="4" placeholder="وصف الخدمة..."></textarea>
        </div>

        <div class="input-group">
            <input type="number" id="price" placeholder="سعر الخدمة للعملاء (Pi)">
        </div>

        <button id="payBtn" class="btn-publish" onclick="handlePayment()">دفع الرسوم والنشر الآن</button>
        <div id="status">جاري التوثيق...</div>
    </div>

    <div class="footer-links">
        <a href="terms.html">شروط الاستخدام</a> | <a href="privacy.html">سياسة الخصوصية</a>
    </div>

    <script>
        // إعداد Supabase
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co";
        const supabaseKey = "sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = "";

        // دالة التوثيق التلقائي عند فتح الصفحة
        async function initApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments']);
                currentUser = auth.user.username;
                document.getElementById('status').innerText = "مرحباً " + currentUser + " | جاهز للنشر";
                document.getElementById('status').style.color = "#2ecc71";
            } catch (error) {
                document.getElementById('status').innerText = "يرجى فتح التطبيق من متصفح Pi لتوثيق الحساب";
                document.getElementById('status').style.color = "#e74c3c";
            }
        }

        async function handlePayment() {
            const title = document.getElementById('title').value;
            const desc = document.getElementById('description').value;
            const price = document.getElementById('price').value;
            const btn = document.getElementById('payBtn');

            if (!title || !desc || !price) {
                alert("يرجى ملء جميع الخانات");
                return;
            }

            if (!currentUser) {
                alert("لم يتم التوثيق بعد، تأكد من استخدام متصفح Pi");
                return;
            }

            btn.disabled = true;
            document.getElementById('status').innerText = "جاري إنشاء عملية الدفع...";

            try {
                await window.Pi.createPayment({
                    amount: 1.0,
                    memo: "رسوم نشر خدمة: " + title,
                    metadata: { type: "listing_fee", service: title }
                }, {
                    onReadyForServerApproval: (id) => console.log("Payment ID:", id),
                    onConnectedToBlockchain: (id, txid) => {
                        document.getElementById('status').innerText = "تم الدفع! جاري حفظ الخدمة في القاعدة...";
                        saveToSupabase(title, desc, price);
                    },
                    onReadyForServerCompletion: (id, txid) => console.log("Completed"),
                    onCancel: () => {
                        document.getElementById('status').innerText = "تم إلغاء العملية";
                        btn.disabled = false;
                    },
                    onError: (error) => {
                        document.getElementById('status').innerText = "خطأ: " + error.message;
                        btn.disabled = false;
                    }
                });
            } catch (e) {
                alert("فشل بدء عملية الدفع");
                btn.disabled = false;
            }
        }

        async function saveToSupabase(title, desc, price) {
            try {
                const { error } = await _supabase.from('services').insert([
                    { 
                        title: title, 
                        description: desc, 
                        price: parseFloat(price), 
                        user_pi: currentUser 
                    }
                ]);

                if (error) throw error;

                alert("تهانينا! تم نشر خدمتك بنجاح.");
                window.location.href = "index.html"; // العودة للرئيسية لمشاهدة الخدمة
            } catch (err) {
                alert("تم الدفع ولكن فشل الحفظ في القاعدة: " + err.message);
                document.getElementById('payBtn').disabled = false;
            }
        }

        // تشغيل التوثيق بمجرد تحميل الصفحة
        window.onload = initApp;
    </script>
</body>
</html>
