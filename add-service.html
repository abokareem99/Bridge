<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة - جسر التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-purple: #6a1b9a;
            --pi-dark-purple: #4a148c;
            --pi-gold: #ffb74d;
            --white: #ffffff;
            --gray: #f4f4f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); padding-bottom: 40px; }

        .header {
            background: var(--pi-purple); color: white; padding: 18px;
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 1000;
        }
        .header h1 { font-size: 1.1rem; }
        .back-btn { color: white; text-decoration: none; font-size: 1.2rem; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .form-card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--pi-dark-purple); font-size: 0.9rem; }
        
        .input-group input, .input-group textarea, .input-group select {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--pi-purple); box-shadow: 0 0 5px rgba(106, 27, 154, 0.2); }

        .fee-notice {
            background: #fff9e6; padding: 12px; border-radius: 10px;
            font-size: 0.85rem; color: #856404; margin-bottom: 25px;
            display: flex; align-items: center; gap: 10px;
        }

        .submit-btn {
            width: 100%; background: var(--pi-purple); color: white; border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { background: var(--pi-dark-purple); }

        .status-toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 12px 25px; border-radius: 50px;
            font-size: 0.85rem; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-right"></i></a>
        <h1>أنشئ خدمتك الجديدة</h1>
    </header>

    <div class="container">
        <div class="form-card">
            <div class="fee-notice">
                <i class="fas fa-info-circle"></i>
                <span>رسوم نشر الخدمة هي 0.01 Pi لضمان جدية المبدعين.</span>
            </div>

            <form id="serviceForm">
                <div class="input-group">
                    <label>اسم الخدمة</label>
                    <input type="text" id="serviceTitle" placeholder="مثلاً: تصميم شعار احترافي" required>
                </div>

                <div class="input-group">
                    <label>الفئة</label>
                    <select id="serviceCat">
                        <option value="tech">برمجة وتكنولوجيا</option>
                        <option value="design">تصميم جرافيك</option>
                        <option value="writing">كتابة وترجمة</option>
                        <option value="marketing">تسويق ومبيعات</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>وصف الخدمة</label>
                    <textarea id="serviceDesc" rows="4" placeholder="اشرح بالتفصيل ما الذي ستقدمه للعميل..." required></textarea>
                </div>

                <div class="input-group">
                    <label>السعر المطلوب (Pi)</label>
                    <input type="number" id="servicePrice" step="0.01" placeholder="مثلاً: 0.5" required>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-plus-circle"></i> دفع الرسوم ونشر الخدمة
                </button>
            </form>
        </div>
    </div>

    <div id="statusToast" class="status-toast"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // سيتم جلب هذه القيم تلقائياً من إعدادات Vercel التي قمت بضبطها
        const supabaseUrl = 'https://your-project-url.supabase.co' 
        const supabaseKey = 'your-anon-key'
        const supabase = createClient(supabaseUrl, supabaseKey)

        const form = document.getElementById('serviceForm');
        
        function notify(msg) {
            const toast = document.getElementById('statusToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            try {
                notify("جاري تهيئة الدفع...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                await window.Pi.authenticate(['username', 'payments'], (p) => {});

                // عملية دفع رسوم النشر عبر شبكة Pi
                await window.Pi.createPayment({
                    amount: 0.01,
                    memo: "رسوم توثيق ونشر خدمة جديدة",
                    metadata: { 
                        type: "service_listing",
                        title: document.getElementById('serviceTitle').value 
                    }
                }, {
                    onReadyForServerApproval: (id) => { /* موافقة السيرفر */ },
                    onConnectedToBlockchain: async (id, txid) => {
                        notify("تم الدفع! جاري حفظ الخدمة في قاعدة البيانات...");
                        
                        // حفظ البيانات في جدول services بعد نجاح الدفع
                        const { error } = await supabase.from('services').insert([{
                            title: document.getElementById('serviceTitle').value,
                            category: document.getElementById('serviceCat').value,
                            description: document.getElementById('serviceDesc').value,
                            price: document.getElementById('servicePrice').value
                        }]);

                        if (error) throw error;

                        notify("تم النشر بنجاح! ستظهر خدمتك قريباً.");
                        form.reset();
                    },
                    onError: (err) => notify("خطأ: " + err.message)
                });
            } catch (err) {
                notify("فشل: " + err.message);
            }
        };
    </script>
</body>
</html>
