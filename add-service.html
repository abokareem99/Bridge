<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة - جسر التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --pi-purple: #6a1b9a; --pi-dark-purple: #4a148c; --white: #ffffff; --gray: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); padding-bottom: 40px; }
        .header { background: var(--pi-purple); color: white; padding: 18px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--pi-dark-purple); font-size: 0.9rem; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.95rem; }
        .submit-btn { width: 100%; background: var(--pi-purple); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-chevron-right"></i></a>
        <h1 style="font-size:1.1rem; margin-right:10px;">أنشئ خدمتك الجديدة</h1>
    </header>

    <div class="container">
        <div class="form-card">
            <form id="serviceForm">
                <div class="input-group">
                    <label>اسم الخدمة</label>
                    <input type="text" id="serviceTitle" placeholder="مثلاً: تصميم شعار" required>
                </div>
                <div class="input-group">
                    <label>الفئة</label>
                    <select id="serviceCat">
                        <option value="tech">برمجة وتكنولوجيا</option>
                        <option value="design">تصميم جرافيك</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>وصف الخدمة</label>
                    <textarea id="serviceDesc" rows="4" required></textarea>
                </div>
                <div class="input-group">
                    <label>السعر (Pi)</label>
                    <input type="number" id="servicePrice" step="0.01" required>
                </div>
                <button type="submit" class="submit-btn" id="btnText">دفع الرسوم ونشر الخدمة</button>
            </form>
        </div>
    </div>

    <div id="statusToast" class="status-toast"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const supabase = createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');

        function notify(msg) {
            const toast = document.getElementById('statusToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // تهيئة بسيطة ومباشرة
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('serviceForm').onsubmit = function(e) {
            e.preventDefault();
            
            const title = document.getElementById('serviceTitle').value;
            const cat = document.getElementById('serviceCat').value;
            const desc = document.getElementById('serviceDesc').value;
            const price = document.getElementById('servicePrice').value;

            notify("جاري المصادقة...");

            Pi.authenticate(['username', 'payments']).then(function(auth) {
                
                Pi.createPayment({
                    amount: 0.01,
                    memo: "نشر خدمة: " + title,
                    metadata: { type: "listing" }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Ready:", paymentId);
                        // في تطبيقات الويب البسيطة، ننتظر الربط مع الـ Backend لاحقاً
                    },
                    onConnectedToBlockchain: function(paymentId, txid) {
                        notify("تم الدفع! جاري الحفظ...");
                        supabase.from('services').insert([{
                            title: title,
                            category: cat,
                            description: desc,
                            price: price
                        }]).then(res => {
                            notify("تم النشر بنجاح!");
                            document.getElementById('serviceForm').reset();
                        });
                    },
                    onCancel: function(paymentId) { notify("تم الإلغاء"); },
                    onError: function(error, payment) { notify("خطأ: " + error.message); },
                    onIncomplete: function(paymentId) { notify("دفع غير مكتمل"); }
                });

            }).catch(function(err) {
                notify("خطأ في الدخول: " + err.message);
            });
        };
    </script>
</body>
</html>
