<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر خدمة - Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --pi-p: #6a1b9a; }
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        h2 { text-align: center; color: var(--pi-p); }
        .fee-badge { text-align: center; background: #fff3e0; color: #e65100; padding: 10px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 14px; margin-top: 15px; border: 1px solid #eee; border-radius: 12px; background: #f9f9f9; outline: none; box-sizing: border-box; }
        .btn-pay { width: 100%; background: var(--pi-p); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-pay:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>نشر خدمة جديدة</h2>
    <div class="fee-badge">رسوم النشر: 1.0 Pi</div>
    
    <input type="text" id="title" placeholder="عنوان الخدمة">
    <textarea id="description" rows="4" placeholder="وصف الخدمة بالتفصيل..."></textarea>
    
    <select id="category">
        <option value="برمجة">برمجة وتطوير</option>
        <option value="تصميم">تصميم جرافيك</option>
        <option value="تسويق">تسويق إلكتروني</option>
        <option value="أخرى" selected>أخرى</option>
    </select>

    <input type="number" id="price" placeholder="السعر المطلوب (Pi)">
    <input type="text" id="contact" placeholder="وسيلة التواصل (واتساب/إيميل)">
    
    <button class="btn-pay" id="payBtn" onclick="handlePayment()">دفع 1.0 Pi ونشر الخدمة</button>
    <div id="status">جاري الاتصال بـ Pi...</div>
</div>

<script>
    // إعدادات الربط - تأكد من مطابقتها لإعدادات Vercel و Supabase
    const SB_URL = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const SB_KEY = "sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll"; // مفتاحك الذي ظهر في الصورة
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    
    // تهيئة EmailJS
    (function(){
        emailjs.init("aRCAx1NwvATaC4F-m"); 
    })();

    let currentUser = "";

    async function initPi() {
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            const auth = await window.Pi.authenticate(['username', 'payments']);
            currentUser = auth.user.username;
            document.getElementById('status').innerText = "متصل: " + currentUser;
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "يرجى استخدام متصفح Pi";
        }
    }

    async function handlePayment() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('description').value;
        const price = document.getElementById('price').value;

        if(!title || !desc || !price || !currentUser) {
            alert("يرجى إكمال البيانات وتوثيق الحساب");
            return;
        }

        const btn = document.getElementById('payBtn');
        btn.disabled = true;
        document.getElementById('status').innerText = "جاري الدفع...";

        try {
            await window.Pi.createPayment({
                amount: 1.0,
                memo: "نشر خدمة: " + title,
                metadata: { type: "listing_fee" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, action: 'approve' })
                    });
                },
                onConnectedToBlockchain: (paymentId, txid) => {
                    document.getElementById('status').innerText = "تم الدفع! جاري إرسال البيانات...";
                    // استدعاء الدالة المحدثة
                    saveToServices(title, desc, price, document.getElementById('category').value, document.getElementById('contact').value, txid);
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid, action: 'complete' })
                    });
                },
                onCancel: () => { 
                    document.getElementById('status').innerText = "تم إلغاء الدفع"; 
                    btn.disabled = false; 
                },
                onError: (error) => { 
                    alert("خطأ في الدفع: " + error.message); 
                    btn.disabled = false; 
                }
            });
        } catch (e) {
            alert("فشل في نظام الدفع");
            btn.disabled = false;
        }
    }

    async function saveToServices(t, d, p, cat, con, tx) {
        console.log("بداية عملية الحفظ والإرسال...");

        // الخطوة 1: إرسال الإيميل أولاً لضمان وصوله
        try {
            await emailjs.send("Service_vuti648", "Template_m6rq1ab", {
                from_name: currentUser,
                service_title: t,
                service_price: p,
                message: d,
                txid: tx
            });
            console.log("تم إرسال الإيميل بنجاح");
        } catch (mailError) {
            console.error("فشل إرسال الإيميل:", mailError);
            // سنكمل المحاولة حتى لو فشل الإيميل
        }

        // الخطوة 2: محاولة الحفظ في Supabase (تأكد من إنشاء الجدول)
        try {
            const { error } = await _supabase
                .from('services')
                .insert([{ 
                    title: t, 
                    description: d, 
                    price: String(p), // إرساله كنص لتفادي أخطاء النوع
                    user_pi: currentUser, 
                    txid: tx,
                    category: cat,
                    contact_info: con 
                }]);

            if (!error) {
                alert("مبروك! تم الإرسال والنشر بنجاح.");
                window.location.href = "services.html"; 
            } else {
                console.error("خطأ Supabase:", error);
                alert("وصل الإيميل ولكن فشل الحفظ في الجدول: " + error.message);
                document.getElementById('payBtn').disabled = false;
            }
        } catch (supabaseError) {
            console.error("خطأ تقني:", supabaseError);
            alert("حدث خطأ غير متوقع أثناء الحفظ.");
            document.getElementById('payBtn').disabled = false;
        }
    }

    window.onload = initPi;
</script>
</body>
</html>
