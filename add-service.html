<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة - جسر التواصل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-purple: #6a1b9a; --white: #ffffff; --gray: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); padding: 20px; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #4a148c; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .submit-btn { width: 100%; background: var(--pi-purple); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2 style="text-align:center; color:var(--pi-purple); margin-bottom:20px;">نشر خدمة جديدة</h2>
        <form id="serviceForm">
            <div class="input-group"><label>اسم الخدمة</label><input type="text" id="serviceTitle" required></div>
            <div class="input-group"><label>وصف الخدمة</label><textarea id="serviceDesc" rows="3" required></textarea></div>
            <div class="input-group"><label>السعر (Pi)</label><input type="number" id="servicePrice" step="0.01" required></div>
            <button type="submit" class="submit-btn" id="submitBtn">تأكيد الدفع والنشر</button>
        </form>
    </div>

    <script>
        const supabaseClient = supabase.createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');

        // تهيئة الـ SDK فوراً
        try {
            window.Pi.init({ version: "2.0", sandbox: true });
        } catch (e) { console.error("Init Error", e); }

        document.getElementById('serviceForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري المعالجة...";
            btn.disabled = true;

            try {
                // المصادقة أولاً للحصول على اليوزر
                const auth = await window.Pi.authenticate(['username', 'payments']);
                const username = auth.user.username;

                // تعريف الـ Callbacks في كائن مستقل لضمان عدم ضياعها
                const paymentCallbacks = {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Payment ready:", paymentId);
                    },
                    onConnectedToBlockchain: function(paymentId, txid) {
                        saveData(username);
                    },
                    onCancel: function(paymentId) {
                        alert("تم إلغاء الدفع");
                        btn.disabled = false;
                        btn.innerText = "تأكيد الدفع والنشر";
                    },
                    onError: function(error, payment) {
                        alert("خطأ: " + error.message);
                        btn.disabled = false;
                        btn.innerText = "تأكيد الدفع والنشر";
                    },
                    onIncomplete: function(paymentId) {
                        console.log("Payment incomplete:", paymentId);
                        btn.disabled = false;
                    }
                };

                // استدعاء الدفع مع الكائن المعرف
                window.Pi.createPayment({
                    amount: parseFloat(document.getElementById('servicePrice').value),
                    memo: "نشر خدمة: " + document.getElementById('serviceTitle').value,
                    metadata: { orderId: "srv_" + Date.now() }
                }, paymentCallbacks);

            } catch (err) {
                alert("فشل المصادقة: " + err.message);
                btn.disabled = false;
                btn.innerText = "تأكيد الدفع والنشر";
            }
        };

        async function saveData(user) {
            const { error } = await supabaseClient.from('services').insert([{
                title: document.getElementById('serviceTitle').value,
                description: document.getElementById('serviceDesc').value,
                price: document.getElementById('servicePrice').value,
                user_pi: user
            }]);
            
            if (!error) {
                alert("تم النشر بنجاح!");
                window.location.href = 'index.html';
            } else {
                alert("فشل الحفظ في قاعدة البيانات");
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
