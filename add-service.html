<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة - جسر التواصل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-purple: #6a1b9a; --white: #ffffff; --gray: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); }
        .header { background: var(--pi-purple); color: white; padding: 18px; display: flex; align-items: center; gap: 15px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #4a148c; font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .submit-btn { width: 100%; background: var(--pi-purple); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 2000; }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" style="color:white; text-decoration:none;">✕</a>
        <h1 style="font-size:1.1rem;">نشر خدمة جديدة</h1>
    </header>

    <div class="container">
        <div class="form-card">
            <form id="serviceForm">
                <div class="input-group"><label>اسم الخدمة</label><input type="text" id="serviceTitle" required></div>
                <div class="input-group"><label>وصف الخدمة</label><textarea id="serviceDesc" rows="4" required></textarea></div>
                <div class="input-group"><label>السعر (Pi)</label><input type="number" id="servicePrice" step="0.01" required></div>
                <button type="submit" class="submit-btn" id="submitBtn">ادفع وانشر الآن</button>
            </form>
        </div>
    </div>

    <div id="statusToast" class="status-toast"></div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');

        function notify(msg) {
            const toast = document.getElementById('statusToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        // التهيئة بإصدار 2.0 وهو المطلوب حالياً للمدفوعات
        try {
            window.Pi.init({ version: "2.0", sandbox: true });
        } catch (e) { console.error(e); }

        document.getElementById('serviceForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            notify("جاري المصادقة...");

            try {
                // المصادقة أولاً
                const auth = await window.Pi.authenticate(['username', 'payments']);
                notify("جاري طلب الدفع من المحفظة...");

                // هذا هو الهيكل الذي يمنع خطأ missing callbacks
                window.Pi.createPayment({
                    amount: parseFloat(document.getElementById('servicePrice').value),
                    memo: "نشر خدمة: " + document.getElementById('serviceTitle').value,
                    metadata: { orderId: "srv_" + Date.now() }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        // ضرورية جداً لإتمام الدفع
                        console.log("Ready for approval:", paymentId);
                    },
                    onConnectedToBlockchain: function(paymentId, txid) {
                        notify("نجح الدفع! جاري الحفظ...");
                        saveData(auth.user.username);
                    },
                    onCancel: function(paymentId) {
                        notify("تم إلغاء الدفع");
                        btn.disabled = false;
                    },
                    onError: function(error, payment) {
                        notify("خطأ: " + error.message);
                        btn.disabled = false;
                    },
                    onIncomplete: function(paymentId) {
                        // دالة إلزامية في الإصدارات الجديدة
                        console.log("Incomplete payment found:", paymentId);
                    }
                });
            } catch (err) {
                notify("فشل: " + err.message);
                btn.disabled = false;
            }
        };

        async function saveData(user) {
            const { error } = await _supabase.from('services').insert([{
                title: document.getElementById('serviceTitle').value,
                description: document.getElementById('serviceDesc').value,
                price: document.getElementById('servicePrice').value,
                user_pi: user
            }]);
            if (!error) {
                notify("تم النشر بنجاح!");
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } else {
                notify("خطأ في الحفظ بقاعدة البيانات");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
