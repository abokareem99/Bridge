<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة خدمة - جسر التواصل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --pi-purple: #6a1b9a; --pi-dark-purple: #4a148c; --white: #ffffff; --gray: #f4f4f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gray); padding-bottom: 40px; }
        .header { background: var(--pi-purple); color: white; padding: 18px; display: flex; align-items: center; gap: 15px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--pi-dark-purple); font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
        .submit-btn { width: 100%; background: var(--pi-purple); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-chevron-right"></i></a>
        <h1 style="font-size:1.1rem; margin-right:10px;">نشر خدمة جديدة</h1>
    </header>

    <div class="container">
        <div class="form-card">
            <form id="serviceForm">
                <div class="input-group">
                    <label>اسم الخدمة</label>
                    <input type="text" id="serviceTitle" required>
                </div>
                <div class="input-group">
                    <label>وصف الخدمة</label>
                    <textarea id="serviceDesc" rows="4" required></textarea>
                </div>
                <div class="input-group">
                    <label>السعر (Pi)</label>
                    <input type="number" id="servicePrice" step="0.01" required>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">ادفع وانشر الآن</button>
            </form>
        </div>
    </div>

    <div id="statusToast" class="status-toast"></div>

    <script>
        const { createClient } = supabase;
        const _supabase = createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');

        function notify(msg) {
            const toast = document.getElementById('statusToast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        // تهيئة الـ SDK بإصدار متوافق
        try {
            window.Pi.init({ version: "2.0", sandbox: true });
        } catch (e) {
            console.error("Init error:", e);
        }

        document.getElementById('serviceForm').onsubmit = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            notify("جاري المصادقة...");

            try {
                // استخدام الإصدار 2.0 هنا أيضاً
                const auth = await window.Pi.authenticate(['username', 'payments']);
                
                notify("افتح المحفظة لإتمام الدفع...");

                window.Pi.createPayment({
                    amount: parseFloat(document.getElementById('servicePrice').value) || 0.01,
                    memo: "رسوم نشر خدمة جسر التواصل",
                    metadata: { orderId: "service_" + Date.now() }
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Payment waiting:", paymentId);
                    },
                    onConnectedToBlockchain: function(paymentId, txid) {
                        notify("تم الدفع! جاري الحفظ في القاعدة...");
                        saveData(auth.user.username);
                    },
                    onCancel: function() { 
                        notify("تم إلغاء الدفع"); 
                        btn.disabled = false; 
                    },
                    onError: function(err) { 
                        notify("خطأ في الدفع: " + err.message); 
                        btn.disabled = false; 
                    }
                });
            } catch (err) {
                notify("خطأ في الدخول: " + err.message);
                btn.disabled = false;
            }
        };

        async function saveData(username) {
            const title = document.getElementById('serviceTitle').value;
            const desc = document.getElementById('serviceDesc').value;
            const price = document.getElementById('servicePrice').value;

            const { error } = await _supabase.from('services').insert([{
                title: title,
                description: desc,
                price: price,
                user_pi: username
            }]);

            if (!error) {
                notify("تم بنجاح! جاري العودة...");
                setTimeout(() => window.location.href = 'index.html', 2000);
            } else {
                notify("خطأ في الحفظ: " + error.message);
                document.getElementById('submitBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
