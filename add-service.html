<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر خدمة - Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --pi-p: #6a1b9a; }
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        h2 { text-align: center; color: var(--pi-p); }
        .fee-badge { text-align: center; background: #fff3e0; color: #e65100; padding: 10px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; }
        input, textarea { width: 100%; padding: 14px; margin-top: 15px; border: 1px solid #eee; border-radius: 12px; background: #f9f9f9; outline: none; box-sizing: border-box; }
        .btn-pay { width: 100%; background: var(--pi-p); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-pay:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>نشر خدمة جديدة</h2>
    <div class="fee-badge">رسوم النشر: 1.0 Pi</div>
    
    <input type="text" id="title" placeholder="عنوان الخدمة">
    <textarea id="description" rows="4" placeholder="وصف الخدمة بالتفصيل..."></textarea>
    <input type="number" id="price" placeholder="السعر المطلوب بـ (Pi)">
    
    <button class="btn-pay" id="payBtn" onclick="handlePayment()">دفع الرسوم والنشر الآن</button>
    <div id="status">جاري تهيئة النظام...</div>
</div>

<script>
    // 1. إعداد Supabase (استخدام المفاتيح الخاصة بك)
    const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll");
    
    // 2. إعداد EmailJS
    (function(){
        emailjs.init("aRCAx1NwvATaC4F-m"); 
    })();

    let currentUser = "";

    async function initPi() {
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            const auth = await window.Pi.authenticate(['username', 'payments']);
            currentUser = auth.user.username;
            document.getElementById('status').innerText = "موثق كـ: " + currentUser;
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "يرجى فتح التطبيق من متصفح Pi";
            document.getElementById('status').style.color = "red";
        }
    }

    async function handlePayment() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('description').value;
        const price = document.getElementById('price').value;
        const btn = document.getElementById('payBtn');

        if(!title || !desc || !price || !currentUser) {
            alert("أكمل البيانات أولاً يا هندسة");
            return;
        }

        btn.disabled = true;
        document.getElementById('status').innerText = "جاري تحضير عملية الدفع...";

        try {
            await window.Pi.createPayment({
                amount: 1.0,
                memo: "رسوم نشر خدمة: " + title,
                metadata: { type: "listing_fee" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    // إرسال المعرف للسيرفر للموافقة
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, action: 'approve' })
                    });
                },
                onConnectedToBlockchain: (paymentId, txid) => {
                    document.getElementById('status').innerText = "تم الدفع بنجاح! جاري الحفظ...";
                    // الحفظ في Supabase وإرسال الإيميل بعد نجاح الدفع
                    saveDataAndSendEmail(title, desc, price, txid);
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid, action: 'complete' })
                    });
                },
                onCancel: () => { 
                    document.getElementById('status').innerText = "تم إلغاء العملية"; 
                    btn.disabled = false; 
                },
                onError: (error) => { 
                    document.getElementById('status').innerText = "خطأ في الدفع: " + error.message; 
                    btn.disabled = false; 
                }
            });
        } catch (e) {
            console.error(e);
            alert("فشل نظام الدفع، حاول مرة أخرى");
            btn.disabled = false;
        }
    }

    async function saveDataAndSendEmail(t, d, p, txid) {
        // الحفظ في جدول 'services'
        const { data, error } = await _supabase.from('services').insert([{ 
            title: t, 
            description: d, 
            price: parseFloat(p), 
            user_pi: currentUser,
            transaction_id: txid // حفظ رقم المعاملة للتوثيق
        }]);

        if (!error) {
            // إرسال إشعار بالبريد الإلكتروني بعد الحفظ الناجح
            try {
                await emailjs.send("Service_vuti648", "Template_m6rq1ab", {
                    from_name: currentUser,
                    service_title: t,
                    service_price: p,
                    message: d,
                    transaction_id: txid
                });
            } catch (mailErr) {
                console.warn("Email notification failed but data is saved.");
            }

            alert("تم نشر خدمتك بنجاح في جسر التواصل!");
            window.location.href = "services.html"; // التوجه لصفحة عرض الخدمات
        } else {
            alert("حدث خطأ أثناء الحفظ في قاعدة البيانات: " + error.message);
            console.error("Supabase Error:", error);
            document.getElementById('payBtn').disabled = false;
        }
    }

    window.onload = initPi;
</script>
</body>
</html>
