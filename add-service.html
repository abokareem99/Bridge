<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Service - Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --pi-p: #6a1b9a; }
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        h2 { text-align: center; color: var(--pi-p); margin-bottom: 5px; }
        .fee-badge { text-align: center; background: #fff3e0; color: #e65100; padding: 10px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 15px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 14px; margin-top: 15px; border: 1px solid #eee; border-radius: 12px; background: #f9f9f9; outline: none; box-sizing: border-box; }
        .btn-pay { width: 100%; background: var(--pi-p); color: white; border: none; padding: 18px; border-radius: 12px; margin-top: 25px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn-pay:hover { background: #4a148c; }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; }
        #status { text-align: center; margin-top: 15px; font-size: 0.85rem; color: #666; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Post New Service</h2>
    <div class="fee-badge">Listing Fee: 1.0 Pi</div>
    
    <input type="text" id="title" placeholder="Service Title">
    <textarea id="description" rows="4" placeholder="Detailed description..."></textarea>
    
    <select id="category">
        <option value="Programming">Programming & Tech</option>
        <option value="Design">Graphic Design</option>
        <option value="Marketing">Digital Marketing</option>
        <option value="Other" selected>Other Services</option>
    </select>

    <input type="number" id="price" placeholder="Required Price (Pi)">
    <input type="text" id="contact" placeholder="Contact Info (WhatsApp/Email)">
    
    <button class="btn-pay" id="payBtn" onclick="handlePayment()">Pay 1.0 Pi & Post</button>
    <div id="status">Connecting to Pi Network...</div>
</div>

<script>
    // Configuration - Updated with your provided anon key
    const SB_URL = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w"; 
    const _supabase = supabase.createClient(SB_URL, SB_KEY);
    
    (function(){
        emailjs.init("aRCAx1NwvATaC4F-m"); 
    })();

    let currentUser = "";

    async function initPi() {
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            const auth = await window.Pi.authenticate(['username', 'payments']);
            currentUser = auth.user.username;
            document.getElementById('status').innerText = "Connected as: " + currentUser;
            document.getElementById('status').style.color = "green";
        } catch (e) {
            document.getElementById('status').innerText = "Please use Pi Browser";
            document.getElementById('status').style.color = "red";
        }
    }

    async function handlePayment() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('description').value;
        const price = document.getElementById('price').value;
        const category = document.getElementById('category').value;
        const contact = document.getElementById('contact').value;

        if(!title || !desc || !price || !currentUser) {
            alert("Please fill all fields and authenticate your account.");
            return;
        }

        const btn = document.getElementById('payBtn');
        btn.disabled = true;
        document.getElementById('status').innerText = "Processing Payment...";

        try {
            await window.Pi.createPayment({
                amount: 1.0,
                memo: "Listing Service: " + title,
                metadata: { type: "listing_fee" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, action: 'approve' })
                    });
                },
                onConnectedToBlockchain: (paymentId, txid) => {
                    document.getElementById('status').innerText = "Payment Successful! Saving...";
                    saveToServices(title, desc, price, category, contact, txid);
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    await fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId, txid, action: 'complete' })
                    });
                },
                onCancel: () => { 
                    document.getElementById('status').innerText = "Payment Cancelled"; 
                    btn.disabled = false; 
                },
                onError: (error) => { 
                    alert("Payment Error: " + error.message); 
                    btn.disabled = false; 
                }
            });
        } catch (e) {
            alert("Payment System Error");
            btn.disabled = false;
        }
    }

    async function saveToServices(t, d, p, cat, con, tx) {
        try {
            const { error } = await _supabase
                .from('services')
                .insert([{ 
                    title: t, 
                    description: d, 
                    price: String(p), 
                    user_pi: currentUser, 
                    txid: tx,
                    category: cat,
                    contact_info: con 
                }]);

            if (error) {
                console.error("Supabase Error:", error);
                alert("Payment received, but failed to save to database: " + error.message);
            } else {
                console.log("Saved to Supabase successfully");
            }
        } catch (err) {
            console.error("Technical Error:", err);
        }

        try {
            await emailjs.send("Service_vuti648", "Template_m6rq1ab", {
                from_name: currentUser,
                service_title: t,
                service_price: p,
                message: d,
                txid: tx
            });
            console.log("Backup Email Sent");
        } catch (mailErr) {
            console.error("Email Error:", mailErr);
        }

        alert("Success! Your service has been posted.");
        window.location.href = "services.html";
    }

    window.onload = initPi;
</script>
</body>
</html>
