<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نشر خدمة</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; background: #6a1b9a; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #st { color: red; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#6a1b9a;">نشر خدمة</h2>
        <input type="text" id="t" placeholder="العنوان">
        <textarea id="d" placeholder="الوصف"></textarea>
        <input type="number" id="p" placeholder="السعر">
        <button class="btn" id="b" onclick="go()">دفع ونشر</button>
        <div id="st"></div>
    </div>

    <script>
        const sb = supabase.createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');
        
        // 1. تعريف الدوال في مستوى الصفحة العام (Global) فوراً
        const callbacks = {
            onReadyForServerApproval: (id) => console.log("Ready", id),
            onConnectedToBlockchain: (id, tx) => save(),
            onCancel: (id) => { err("تم الإلغاء"); res(); },
            onError: (e) => { err("خطأ: " + e.message); res(); },
            onIncomplete: (id) => { err("فشل الدفع"); res(); }
        };

        function err(m) { document.getElementById('st').innerText = m; }
        function res() { const b = document.getElementById('b'); b.disabled = false; b.innerText = "دفع ونشر"; }

        window.onload = () => { window.Pi.init({ version: "2.0", sandbox: true }); };

        async function go() {
            const btn = document.getElementById('b');
            btn.disabled = true;
            btn.innerText = "جاري التحقق...";
            err("");

            try {
                const auth = await window.Pi.authenticate(['username', 'payments']);
                window.uid = auth.user.username;
                
                // 2. استدعاء الدفع باستخدام الكائن المعرف مسبقاً
                window.Pi.createPayment({
                    amount: parseFloat(document.getElementById('p').value),
                    memo: "نشر: " + document.getElementById('t').value,
                    metadata: { orderId: "srv_" + Date.now() }
                }, callbacks);
            } catch (e) {
                err("فشل: " + e.message);
                res();
            }
        }

        async function save() {
            const { error } = await sb.from('services').insert([{
                title: document.getElementById('t').value,
                description: document.getElementById('d').value,
                price: document.getElementById('p').value,
                user_pi: window.uid
            }]);
            if (!error) { window.location.href = 'index.html'; }
            else { err("خطأ في قاعدة البيانات"); res(); }
        }
    </script>
</body>
</html>
