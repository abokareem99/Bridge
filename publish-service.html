<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نشر خدمة - جسر التواصل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-purple: #6a1b9a; }
        body { background-color: #f4f4f9; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: var(--pi-purple); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; background: var(--pi-purple); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #status { text-align: center; margin-top: 15px; color: #d32f2f; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <h2>نشر خدمة جديدة</h2>
    <input type="text" id="t" placeholder="اسم الخدمة">
    <textarea id="d" rows="3" placeholder="وصف مختصر"></textarea>
    <input type="number" id="p" placeholder="السعر بـ Pi" step="0.01">
    <button class="btn" id="mainBtn" onclick="pay()">تأكيد الدفع والنشر</button>
    <div id="status"></div>
</div>

<script>
    const sb = supabase.createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');
    
    // تهيئة الـ SDK فوراً
    try { window.Pi.init({ version: "2.0", sandbox: true }); } catch(e) {}

    // تعريف الـ Callbacks كمتغير ثابت لضمان عدم ضياعها من الذاكرة
    const paymentCallbacks = {
        onReadyForServerApproval: function(id) { console.log("Approved", id); },
        onConnectedToBlockchain: function(id, tx) { finalize(); },
        onCancel: function(id) { updateStatus("تم إلغاء العملية"); resetBtn(); },
        onError: function(err) { updateStatus("خطأ: " + err.message); resetBtn(); },
        onIncomplete: function(id) { updateStatus("دفعة غير مكتملة"); resetBtn(); }
    };

    function updateStatus(m) { document.getElementById('status').innerText = m; }
    function resetBtn() { 
        const b = document.getElementById('mainBtn');
        b.disabled = false;
        b.innerText = "تأكيد الدفع والنشر";
    }

    async function pay() {
        const b = document.getElementById('mainBtn');
        b.disabled = true;
        b.innerText = "جاري المصادقة...";
        updateStatus("");

        try {
            const auth = await window.Pi.authenticate(['username', 'payments']);
            window.currentUser = auth.user.username;
            
            b.innerText = "جاري طلب الدفع...";
            
            window.Pi.createPayment({
                amount: parseFloat(document.getElementById('p').value),
                memo: "نشر خدمة: " + document.getElementById('t').value,
                metadata: { orderId: "service_" + Date.now() }
            }, paymentCallbacks); // تمرير الكائن الجاهز مسبقاً

        } catch (e) {
            updateStatus("فشل: " + e.message);
            resetBtn();
        }
    }

    async function finalize() {
        updateStatus("نجح الدفع! جاري الحفظ...");
        const { error } = await sb.from('services').insert([{
            title: document.getElementById('t').value,
            description: document.getElementById('d').value,
            price: document.getElementById('p').value,
            user_pi: window.currentUser
        }]);
        
        if (!error) {
            updateStatus("تم النشر بنجاح!");
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
        } else {
            updateStatus("خطأ في قاعدة البيانات");
            resetBtn();
        }
    }
</script>

</body>
</html>
