<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f9; padding-bottom: 20px; }

        .hero {
            height: 35vh; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--w);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 10px; }

        .categories { padding: 20px; max-width: 500px; margin: 0 auto; }
        /* زر الخدمة بعد التعديل */
        .cat-card {
            background: var(--w); margin-bottom: 10px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border: 1px solid #eee; transition: 0.3s;
        }
        .cat-card:active { transform: scale(0.98); background: #f0f0f0; }
        .cat-info { display: flex; align-items: center; gap: 15px; }
        .cat-info i { color: var(--pi-p); font-size: 1.2rem; width: 30px; text-align: center; }
        .price-badge { background: var(--pi-g); color: var(--pi-d); padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1 class="hero-title">جسر التواصل</h1>
            <p>اختر خدمة للبدء بالدفع المباشر</p>
            <br>
            <button id="authBtn" class="btn-main" style="background:var(--pi-g); border:none; padding:10px 20px; border-radius:20px; font-weight:bold;" onclick="startApp()">توثيق الحساب</button>
        </div>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة والتطوير')">
            <div class="cat-info"><i class="fas fa-code"></i><span>البرمجة والتطوير</span></div>
            <span class="price-badge">1.0 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.5, 'الكتابة والترجمة')">
            <div class="cat-info"><i class="fas fa-pen-nib"></i><span>الكتابة والترجمة</span></div>
            <span class="price-badge">0.5 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.8, 'التصميم الجرافيكي')">
            <div class="cat-info"><i class="fas fa-palette"></i><span>التصميم الجرافيكي</span></div>
            <span class="price-badge">0.8 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.7, 'التسويق والمبيعات')">
            <div class="cat-info"><i class="fas fa-bullhorn"></i><span>التسويق والمبيعات</span></div>
            <span class="price-badge">0.7 Pi</span>
        </div>
    </section>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        function showMsg(m) { 
            toast.innerText = m; toast.style.display = 'block'; 
            setTimeout(() => toast.style.display='none', 4000); 
        }

        async function startApp() {
            try {
                showMsg("جاري التوثيق مع Pi...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك: " + auth.user.username);
                document.getElementById('authBtn').innerText = "تم التوثيق بنجاح ✅";
            } catch (e) { showMsg("خطأ توثيق: " + e.message); }
        }

        // دالة الدفع الموحدة التي تنهي مشكلة الصفحات الفارغة
        async function processPayment(amt, serviceName) {
            try {
                showMsg(`بدء عملية دفع لخدمة: ${serviceName}...`);
                await window.Pi.createPayment({
                    amount: amt, 
                    memo: `شراء خدمة: ${serviceName}`, 
                    metadata: { service: serviceName }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    }).then(r => r.json()),
                    
                    onConnectedToBlockchain: (id, tx) => showMsg("تم إرسال الطلب للبلوكشين!"),
                    
                    onReadyForServerCompletion: (id, tx) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                    }).then(r => r.json()),
                    
                    onCancel: () => showMsg("تم إلغاء الدفع"),
                    onError: (e) => showMsg("خطأ في المعاملة: " + e.message)
                });
            } catch (e) { showMsg("تنبيه: " + e.message); }
        }
    </script>
</body>
</html>
