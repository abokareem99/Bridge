<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Compact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background: radial-gradient(circle at top, #4a148c, #2d0a4e); 
            min-height: 100vh; color: var(--white); 
            padding-bottom: 60px; /* تقليل المساحة السفلية */
            overflow-x: hidden;
        }

        /* Hero - جعل العناوين أصغر ومضغوطة */
        .hero { padding: 15px 10px; text-align: center; }
        .hero-title { font-size: 1.5rem; color: var(--pi-g); font-weight: 900; }
        .welcome-msg { font-size: 0.7rem; background: var(--glass); border: 1px solid rgba(255,183,77,0.3); color: var(--pi-g); padding: 4px 12px; border-radius: 50px; margin-top: 5px; display: inline-block; }
        
        .btn-auth { 
            background: linear-gradient(45deg, var(--pi-g), #ffa726); 
            color: var(--pi-d); border: none; padding: 8px 20px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; font-size: 0.85rem; margin: 10px auto; 
            display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(255,183,77,0.3);
        }

        /* Services Grid - تصغير الكروت */
        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .cat-card { 
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 5px; border-radius: 18px; text-align: center; cursor: pointer; 
        }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1rem; margin: 0 auto 8px; }
        .cat-card span { font-weight: 700; font-size: 0.8rem; display: block; margin-bottom: 4px; }
        .price-badge { font-size: 0.7rem; color: var(--pi-g); font-weight: 800; border: 1px solid var(--pi-g); padding: 1px 8px; border-radius: 6px; }

        /* Global Activity - تحديد ارتفاع ثابت مع تمرير داخلي */
        .orders-section { padding: 12px; max-width: 500px; margin: 10px auto; background: rgba(0,0,0,0.2); border-radius: 20px; }
        #ordersList { max-height: 150px; overflow-y: auto; padding-right: 5px; } /* تمرير للنشاطات */

        .order-item { background: var(--glass); padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--pi-g); }
        .order-item b { font-size: 0.75rem; color: var(--pi-g); }
        .order-item small { font-size: 0.6rem; opacity: 0.6; }

        /* Profile Section */
        #profileSection { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
        .profile-card { background: var(--glass); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid rgba(255,183,77,0.2); margin-bottom: 15px; }
        .profile-avatar { width: 60px; height: 60px; background: var(--pi-g); color: var(--pi-d); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 10px; font-weight: bold; }
        
        /* Footer & Links - دمجها بشكل صغير جداً */
        footer { text-align: center; padding: 10px 0; margin-bottom: 10px; }
        .policy-links { font-size: 0.65rem; margin-bottom: 5px; display: flex; justify-content: center; gap: 15px; }
        .policy-links a { color: var(--pi-g); text-decoration: none; opacity: 0.8; }
        .copy-text { font-size: 0.55rem; opacity: 0.4; }

        /* Nav Bar - تقليص الارتفاع */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid var(--glass); z-index: 3000; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.1rem; cursor: pointer; }
        .nav-item.active { color: var(--pi-g); opacity: 1; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: var(--white); width: 85%; max-width: 350px; padding: 20px; border-radius: 20px; color: var(--pi-d); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Welcome to abokareem Platform 🌐</div>
            <button id="authBtn" class="btn-auth" onclick="startApp()">
                <i class="fab fa-ethereum"></i> Login Pi
            </button>
        </section>

        <section class="categories" id="servicesContainer"></section>

        <section class="orders-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size: 0.8rem;">
                <span style="color:var(--pi-g); font-weight:bold;"><i class="fas fa-bolt"></i> Global Activity</span>
                <i class="fas fa-user-shield" style="opacity:0.3" onclick="openAdmin()"></i>
            </div>
            <div id="ordersList"></div>
        </section>

        <footer>
            <div class="policy-links">
                <a onclick="alert('Privacy: Encrypted via Pi Network.')">Privacy Policy</a>
                <a onclick="alert('Terms: High quality standards.')">Terms of Use</a>
            </div>
            <p class="copy-text">&copy; 2026 Bridge Freelance</p>
        </footer>
    </div>

    <section id="profileSection">
        <div class="profile-card">
            <div class="profile-avatar" id="userInitial">?</div>
            <h2 id="profileName" style="font-size: 1.1rem;">Guest</h2>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:10px;">
                <div><b id="totalOrders" style="color:var(--pi-g)">0</b><p style="font-size:0.6rem">Orders</p></div>
                <div><b id="totalSpent" style="color:var(--pi-g)">0</b><p style="font-size:0.6rem">Pi Spent</p></div>
            </div>
        </div>
        <h3 style="color: var(--pi-g); margin-bottom: 10px; font-size: 0.9rem;">My History</h3>
        <div id="userOrdersList" style="max-height: 200px; overflow-y: auto;"></div>
    </section>

    <div class="nav-bar">
        <div class="nav-item active" id="homeNav" onclick="showTab('home')"><i class="fas fa-home"></i></div>
        <div class="nav-item" id="profileNav" onclick="showTab('profile')"><i class="fas fa-user-circle"></i></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h4 style="text-align:center">Admin Panel</h4>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="Password" style="width:100%; padding:10px; margin:10px 0;">
                <button onclick="checkAdmin()" style="width:100%; padding:10px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:8px;">Login</button>
            </div>
            <div id="adminTools" style="display:none">
                <input type="text" id="newSTitle" placeholder="Name" style="width:100%; padding:8px; margin-top:5px;">
                <input type="number" id="newSPrice" placeholder="Price" style="width:100%; padding:8px; margin-top:5px;">
                <button onclick="addService()" style="width:100%; padding:10px; margin-top:10px; background:#27ae60; color:white; border:none; border-radius:8px;">Add</button>
                <div id="adminServiceList" style="margin-top:10px; max-height:100px; overflow-y:auto; font-size:0.8rem;"></div>
                <button onclick="closeAdmin()" style="width:100%; padding:8px; margin-top:10px; background:#eee; border:none; border-radius:8px">Close</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        
        function showTab(tab) {
            if(tab === 'profile') {
                if(!window.currentUser) { showMsg("Login Pi first"); return; }
                document.getElementById('homePage').style.display = 'none';
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('profileNav').classList.add('active');
                document.getElementById('homeNav').classList.remove('active');
                loadUserProfile();
            } else {
                document.getElementById('homePage').style.display = 'block';
                document.getElementById('profileSection').style.display = 'none';
                document.getElementById('homeNav').classList.add('active');
                document.getElementById('profileNav').classList.remove('active');
            }
        }

        async function loadUserProfile() {
            document.getElementById('profileName').innerText = window.currentUser;
            document.getElementById('userInitial').innerText = window.currentUser.charAt(0).toUpperCase();
            const { data } = await _supabase.from('services').select('*').eq('user_pi', window.currentUser).eq('category', 'Order').order('id', { ascending: false });
            if (data) {
                document.getElementById('totalOrders').innerText = data.length;
                document.getElementById('totalSpent').innerText = data.reduce((acc, curr) => acc + parseFloat(curr.price || 0), 0).toFixed(3);
                document.getElementById('userOrdersList').innerHTML = data.map(o => `<div class="order-item"><div><b>${o.title}</b></div><div><b>${o.price} Pi</b></div></div>`).join('');
            }
        }

        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }
        function closeAdmin() { document.getElementById('adminModal').style.display='none'; }
        async function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminAuth').style.display='none';
                document.getElementById('adminTools').style.display='block';
                loadAdminList();
            } else { showMsg("Wrong Password"); }
        }
        async function loadAdminList() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Service');
            if(data) {
                document.getElementById('adminServiceList').innerHTML = data.map(s => `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #eee;"><span>${s.title}</span><i class="fas fa-trash" style="color:red" onclick="deleteService(${s.id})"></i></div>`).join('');
            }
        }
        async function deleteService(id) {
            if(confirm("Delete?")) { await _supabase.from('services').delete().eq('id', id); loadAdminList(); loadServices(); }
        }
        async function addService() {
            const t = document.getElementById('newSTitle').value;
            const p = document.getElementById('newSPrice').value;
            if(!t || !p) return;
            await _supabase.from('services').insert([{ title: t, price: p, status: 'active', category: 'Service' }]);
            showMsg("Added!"); loadAdminList(); loadServices();
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "User: " + auth.user.username;
                document.getElementById('authBtn').style.background = "#2ecc71";
            } catch (e) { showMsg("Pi Error"); }
        }

        async function loadServices() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Service');
            if(data) {
                document.getElementById('servicesContainer').innerHTML = data.map(s => {
                    let t = s.title.toLowerCase();
                    let icon = t.includes('des') ? 'fa-palette' : t.includes('prog') ? 'fa-code' : t.includes('trans') ? 'fa-language' : 'fa-briefcase';
                    return `<div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                            <i class="fas ${icon}"></i><span>${s.title}</span>
                            <span class="price-badge">${s.price} Pi</span>
                        </div>`;
                }).join('');
            }
        }

        async function loadOrders() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Order').order('id', { ascending: false }).limit(5);
            if (data) {
                document.getElementById('ordersList').innerHTML = data.map(o => `
                    <div class="order-item">
                        <div><b>${o.title}</b><br><small>by ${o.user_pi}</small></div>
                        <div><b>${o.price} Pi</b></div>
                    </div>
                `).join('');
            }
        }

        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
