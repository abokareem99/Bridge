<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جسر التواصل - النسخة المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #4a148c; --y: #ffb74d; }
        body { background: var(--p); color: white; font-family: sans-serif; margin: 0; padding-bottom: 30px; text-align: center; }
        .header { padding: 20px; background: #5e1bbf; border-bottom: 3px solid var(--y); }
        .auth-btn { background: #2ecc71; color: white; padding: 10px 20px; border-radius: 20px; display: inline-block; margin: 10px; font-weight: bold; cursor: pointer; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .buy-card { background: var(--y); color: var(--p); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: none; }
        .price-badge { background: var(--p); color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; display: inline-block; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--y); color: var(--p); padding: 10px 20px; border-radius: 30px; display: none; z-index: 2000; border: 2px solid white; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--y);">جسر التواصل</h1>
        <div id="btnAuth" class="auth-btn" onclick="initPi()">اضغط للتحقق</div>
    </div>

    <div id="pageMarket" class="market-grid">
        </div>

    <div id="toast"></div>

    <script>
        const _sb = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        
        function msg(t) { const e=document.getElementById('toast'); e.innerText=t; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }

        async function initPi() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments']);
                window.piUser = auth.user.username;
                document.getElementById('btnAuth').innerText = "مرحباً: " + window.piUser;
                load();
            } catch (e) { msg("افتح من Pi Browser"); }
        }

        async function load() {
            const { data } = await _sb.from('services').select('*').order('id', {ascending:false});
            if(data) {
                document.getElementById('pageMarket').innerHTML = data.map(i => `
                    <div class="buy-card" onclick="onOrder('${i.price}', '${i.title}')">
                        <i class="fas fa-briefcase" style="font-size:1.5rem;"></i><br>
                        <b>${i.title}</b><br>
                        <span class="price-badge">${i.price} Pi</span>
                    </div>
                `).join('');
            }
        }

        // --- استبدال كود الدفع بالكود المستقر الذي طلبته ---
        async function onOrder(amount, title) {
            if (!window.piUser) return msg("يرجى التحقق أولاً");
            
            msg("جاري فتح المحفظة...");
            
            try {
                const payment = await window.Pi.createPayment({
                    amount: parseFloat(amount),
                    memo: "طلب خدمة: " + title,
                    metadata: { service_name: title }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'approve' })
                        }).then(res => res.json());
                    },
                    onConnectedToBlockchain: (paymentId, txid) => {
                        // حفظ البيانات في Supabase فور الربط بالبلوكشين
                        _sb.from('services').update({ txid: txid, status: 'paid' })
                           .match({ title: title, user_pi: window.piUser });
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid, action: 'complete' })
                        });
                        msg("تم الدفع بنجاح! راجع بريدك");
                    },
                    onCancel: (id) => msg("تم إلغاء الطلب"),
                    onError: (err, id) => msg("حدث خطأ في الاتصال")
                });
            } catch (e) {
                msg("خطأ غير متوقع بالشبكة");
            }
        }
        // ------------------------------------------------

        window.onload = load;
    </script>
</body>
</html>
