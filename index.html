<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .hero { padding: 40px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .categories { padding: 25px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { background: var(--w); padding: 20px 10px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(106, 27, 154, 0.08); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .price-badge { font-size: 0.8rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 3px 10px; border-radius: 6px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 92%; max-width: 400px; padding: 30px 20px; border-radius: 25px; text-align: right; }
        .footer-container { margin-top: auto; padding: 20px; text-align: center; background: #fff; border-top: 1px solid #eee; }
        .legal-link { color: var(--pi-p); text-decoration: none; font-weight: bold; margin: 0 10px; font-size: 0.9rem; }
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 25px; border-radius: 30px; display: none; z-index: 5000; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة والتطوير')">
            <i class="fas fa-code"></i><br><span>البرمجة</span><br><span class="price-badge">Pi 1.0</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'التصميم الجرافيكي')">
            <i class="fas fa-palette"></i><br><span>التصميم</span><br><span class="price-badge">Pi 0.8</span>
        </div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2>📦 مطلوبات التنفيذ</h2>
            <textarea id="orderDetail" rows="4" style="width:100%; margin-top:10px;" placeholder="اشرح طلبك..."></textarea>
            <input type="text" id="contactInfo" style="width:100%; margin-top:10px;" placeholder="واتساب أو تلجرام">
            <button style="width:100%; margin-top:15px; padding:10px; background:var(--pi-p); color:#fff; border:none; border-radius:10px;" onclick="submitOrder()">إرسال الطلب</button>
        </div>
    </div>

    <footer class="footer-container">
        <a href="terms.html" class="legal-link">شروط الاستخدام</a>
        <span style="color:#ccc">|</span>
        <a href="privacy.html" class="legal-link">سياسة الخصوصية</a>
        <div style="font-size:0.8rem; color:#888; margin-top:10px;">© Bridge Freelance 2026</div>
    </footer>

    <div id="toast"></div>

    <script>
        let currentTxId = ""; let selectedService = "";
        const showMsg = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 4000); };

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك " + auth.user.username);
                document.getElementById('authBtn').innerText = "تم التوثيق ✅";
            } catch (e) { showMsg("خطأ في التوثيق"); }
        }

        async function processPayment(amt, name) {
            selectedService = name;
            try {
                showMsg(`جاري دفع ${amt} Pi...`);
                await window.Pi.createPayment({ amount: amt, memo: name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        const res = await fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                paymentId: id, txid: tx, action: 'complete',
                                orderDetails: { service: selectedService, contact: "قيد الانتظار" } 
                            })
                        });
                        if (res.ok) { document.getElementById('reqModal').style.display = 'flex'; showMsg("تم الدفع والحفظ!"); }
                    }
                });
            } catch (e) { showMsg("فشل الدفع"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            emailjs.send("service_vuti648", "template_m6rq1ab", { service_detail: detail, contact_info: contact, order_id: currentTxId })
            .then(() => { document.getElementById('modalContent').innerHTML = "<h2>تم الإرسال بنجاح!</h2><button onclick='location.reload()'>إغلاق</button>"; });
        }
    </script>
</body>
</html>
