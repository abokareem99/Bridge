<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("aRCAx1NwvATaC4F-m"); 
        })();
    </script>

    <style>
        :root {
            --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        .hero {
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            text-align: center; color: var(--w);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .hero h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .hero p { font-size: 0.9rem; opacity: 0.9; }

        .container { padding: 20px; flex: 1; max-width: 600px; margin: 0 auto; width: 100%; }
        
        .card {
            background: var(--w); border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;
            border: 1px solid #eee; transition: 0.3s; cursor: pointer;
        }
        .card:active { transform: scale(0.98); }
        .card i { font-size: 2rem; color: var(--pi-p); margin-bottom: 15px; }
        .card h3 { color: #333; margin-bottom: 10px; }
        .card p { color: #666; font-size: 0.85rem; line-height: 1.6; }
        .price { display: block; margin-top: 15px; font-weight: bold; color: var(--pi-d); font-size: 1.1rem; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--w); width: 90%; max-width: 400px; padding: 25px;
            border-radius: 25px; position: relative; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        textarea, input {
            width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee;
            border-radius: 12px; outline: none; font-size: 0.9rem; transition: 0.3s;
        }
        textarea:focus, input:focus { border-color: var(--pi-p); }
        
        .btn-submit {
            background: var(--pi-p); color: var(--w); border: none; width: 100%;
            padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>جسر التواصل | Bridge Freelance</h1>
        <p>خدمات رقمية احترافية في بيئة Pi Network</p>
    </div>

    <div class="container">
        <div class="card" onclick="openOrder('تطوير تطبيقات ويب', 5)">
            <i class="fas fa-code"></i>
            <h3>تطوير تطبيقات ويب</h3>
            <p>تصميم وبرمجة مواقع متكاملة متوافقة مع متصفح Pi بلمسة احترافية.</p>
            <span class="price">5 Pi</span>
        </div>

        <div class="card" onclick="openOrder('تصميم هوية بصرية', 3)">
            <i class="fas fa-paint-brush"></i>
            <h3>تصميم هوية بصرية</h3>
            <p>شعارات وتصاميم سوشيال ميديا تعكس احترافية مشروعك.</p>
            <span class="price">3 Pi</span>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h3 id="serviceTitle" style="margin-bottom: 15px; color: var(--pi-p);"></h3>
            <textarea id="orderDetail" placeholder="اشرح طلبك باختصار هنا..."></textarea>
            <input type="text" id="contactInfo" placeholder="وسيلة تواصل (واتساب أو إيميل)">
            <button class="btn-submit" onclick="startPayment()">تأكيد الطلب والدفع</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#999; width:100%; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        let currentService = "";
        let currentAmount = 0;
        let currentTxId = "";

        function openOrder(name, price) {
            currentService = name;
            currentAmount = price;
            document.getElementById('serviceTitle').innerText = name;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function showMsg(m) { alert(m); }

        async function startPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: currentAmount,
                    memo: "طلب خدمة: " + currentService,
                    metadata: { service: currentService }
                }, {
                    onReadyForServerApproval: (id) => console.log("Approval:", id),
                    onReadyForServerCompletion: (id, tx) => {
                        currentTxId = id;
                        submitOrder();
                    },
                    onCancel: (id) => showMsg("تم إلغاء الدفع"),
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { showMsg("فشل الاتصال بمحفظة Pi"); }
        }

        // دالة الإرسال بعد إضافة مطلوبات الإيميل
        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            
            if(!detail || !contact) {
                showMsg("يرجى ملء جميع البيانات");
                return;
            }

            showMsg("جاري إرسال طلبك...");

            const templateParams = {
                username: "abokareem", 
                service_detail: detail, 
                contact_info: contact,
                order_id: currentTxId 
            };

            emailjs.send("service_vuti648", "template_m6rq1ab", templateParams)
                .then(function() {
                    document.getElementById('modalContent').innerHTML = `
                        <div style="text-align: center; padding: 10px;">
                            <i class="fas fa-check-circle" style="font-size: 3.5rem; color: #2ecc71; margin-bottom: 15px;"></i>
                            <h2 style="color: #333;">تم الإرسال بنجاح!</h2>
                            <p style="margin-top:15px; font-weight:bold;">سيتواصل معك فريقنا قريباً.</p>
                            <button class="btn-submit" onclick="location.reload()">إغلاق</button>
                        </div>`;
                }, function(error) {
                    showMsg("فشل الإرسال التلقائي، سيتم التواصل معك يدوياً");
                });
        }
    </script>
</body>
</html>
