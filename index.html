<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>

    <style>
        :root { 
            --pi-p: #6a1b9a; 
            --pi-d: #4a148c; 
            --pi-g: #ffb74d; 
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--pi-d); 
            min-height: 100vh; 
            color: var(--white);
            display: block; 
        }
        
        .hero { padding: 20px 15px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.1); }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        
        .welcome-msg { 
            font-size: 0.75rem; background: var(--pi-g); color: var(--pi-d); 
            display: inline-block; padding: 6px 15px; border-radius: 20px; 
            margin-bottom: 10px; font-weight: bold;
        }
        
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; 
            padding: 10px 25px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem; display: block; margin: 0 auto;
        }

        .categories { 
            padding: 15px; max-width: 450px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        
        .cat-card { 
            background: var(--pi-g); padding: 15px 5px; border-radius: 18px; 
            text-align: center; cursor: pointer; color: var(--pi-d);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-size: 1rem; margin: 0 auto 8px;
        }
        
        .cat-card span { font-weight: 700; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        
        .price-badge { 
            font-size: 0.65rem; color: #fff; font-weight: bold; 
            background: var(--pi-d); padding: 2px 8px; border-radius: 6px; 
        }
        
        .orders-section { padding: 15px; max-width: 450px; margin: 0 auto; }
        .section-title { color: var(--pi-g); margin-bottom: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        
        .order-item { 
            background: rgba(255, 255, 255, 0.1); padding: 10px; 
            border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--pi-g);
        }

        footer { padding: 10px 0; text-align: center; border-top: 1px solid rgba(255,183,77,0.05); }
        .policy-links { font-size: 0.7rem; color: var(--pi-g); display: flex; justify-content: center; gap: 15px; }
        .policy-links a { color: var(--pi-g); text-decoration: none; opacity: 0.8; font-weight: bold; }
        .copy-text { font-size: 0.6rem; color: white; opacity: 0.4; margin-top: 4px; }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; align-items: center; 
            justify-content: center; z-index: 4000; 
        }
        .modal-content { 
            background: var(--white); width: 90%; max-width: 350px; padding: 20px; 
            border-radius: 15px; text-align: left; color: var(--pi-d); 
        }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 10px 20px; border-radius: 20px; display: none; z-index: 5000; font-size: 0.8rem; font-weight: bold; }
        
        textarea, input { width: 100%; padding: 8px; border-radius: 8px; margin-top: 8px; font-size: 0.85rem; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">Bridge Freelance</h1>
        <div class="welcome-msg">Welcome to abokareem Platform 🌐</div>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Login via Pi Network</button>
    </section>

    <section class="categories" id="servicesContainer">
        </section>

    <section class="orders-section">
        <div class="section-title">📦 Recent Orders</div>
        <div id="ordersList"></div>
    </section>

    <footer>
        <div class="policy-links">
            <a href="#" onclick="alert('Privacy Policy: We protect your Pi data.')">Privacy Policy</a>
            <a href="#" onclick="alert('Terms of Use: Use this platform for legal services.')">Terms of Use</a>
        </div>
        <p class="copy-text">&copy; 2026 Bridge Freelance. All rights reserved.</p>
    </footer>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; font-size: 1.2rem; margin-bottom:10px; color: var(--pi-d)">Payment Complete! 🎉</h2>
            <textarea id="orderDetail" rows="3" placeholder="Enter order details..."></textarea>
            <input type="email" id="contactInfo" placeholder="Your Email">
            <button style="width:100%; background:var(--pi-g); color:var(--pi-d); border:none; padding:12px; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <div id="autoReplyModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 15px;"></i>
            <h2 style="color: var(--pi-d); margin-bottom: 10px;">Order Received!</h2>
            <p style="font-size: 0.9rem; color: #666; line-height: 1.5;">
                Thank you for choosing <b>Bridge Freelance</b>. <br>
                We will contact you via email shortly.
            </p>
            <button style="width:100%; background:var(--pi-d); color:var(--pi-g); border:none; padding:12px; border-radius:10px; margin-top:20px; font-weight:bold; cursor:pointer;" onclick="location.reload()">Back to Home</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 3000); }

        async function startApp() {
            try {
                showMsg("Connecting...");
                await window.Pi.init({ version: "2.0", sandbox: true }); 
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "Verified ✅";
                document.getElementById('authBtn').style.background = "#2ecc71";
                showMsg("Welcome " + auth.user.username);
            } catch (e) { showMsg("Login failed"); }
        }

        async function loadServices() {
            const container = document.getElementById('servicesContainer');
            try {
                // تعديل ذكي: سيجلب الخدمات التي تحتوي على active سواء بعلامات تنصيص أو بدونها
                const { data } = await _supabase.from('services').select('*');
                
                // تصفية النتائج برمجياً لضمان الدقة
                const activeOnes = data.filter(s => s.status.includes('active'));

                if (activeOnes.length > 0) {
                    container.innerHTML = activeOnes.map(s => {
                        let icon = s.title.includes('Design') ? 'fa-palette' : 
                                   s.title.includes('Program') ? 'fa-code' : 'fa-briefcase';
                        return `
                            <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                                <i class="fas ${icon}"></i>
                                <span>${s.title}</span>
                                <span class="price-badge">${s.price} Pi</span>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = "<p style='grid-column:1/3; font-size:0.7rem; opacity:0.5;'>Setup services in Supabase first.</p>";
                }
            } catch (e) { console.log(e); }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) { showMsg("Please login first"); return; }
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("Starting payment...");
                await window.Pi.createPayment({ amount: amt, memo: "Service: " + name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: () => showMsg("Payment Failed"),
                    onCancel: () => showMsg("Cancelled")
                });
            } catch (e) { showMsg("Error"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("Fill all fields");
            try {
                showMsg("Sending Request...");
                await _supabase.from('services').insert([{ title: currentCategory, description: detail, price: String(currentPrice), category: 'Order', contact_info: contact, user_pi: window.currentUser, txid: currentTxId, status: 'active' }]);
                await emailjs.send("service_vuti648", "template_m6rq1ab", { username: window.currentUser, service_detail: detail, contact_info: contact, order_id: currentTxId, price: currentPrice });
                document.getElementById('reqModal').style.display = 'none';
                document.getElementById('autoReplyModal').style.display = 'flex';
            } catch (error) { showMsg("Error sending request"); }
        }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(4);
                if (data) {
                    document.getElementById('ordersList').innerHTML = data.map(o => `
                        <div class="order-item">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.7rem; color:var(--pi-g);">
                                <span>${o.title}</span><span>${o.price} Pi</span>
                            </div>
                            <div style="font-size:0.65rem; opacity:0.8; margin-top:3px;">User: ${o.user_pi || 'Guest'}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }
        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
