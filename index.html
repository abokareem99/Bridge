<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>

    <style>
        :root { 
            --pi-p: #6a1b9a; 
            --pi-d: #4a148c; /* Pi Purple */
            --pi-g: #ffb74d; /* Golden Yellow */
            --white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--pi-d); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow-x: hidden; 
            color: var(--white);
        }
        
        .hero { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.1); }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 10px; font-weight: 800; }
        
        .welcome-msg { 
            font-size: 0.85rem; background: var(--pi-g); color: var(--pi-d); 
            display: inline-block; padding: 8px 20px; border-radius: 25px; 
            margin-bottom: 15px; font-weight: bold; box-shadow: 0 4px 10px rgba(255,183,77,0.3);
        }
        
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; 
            padding: 12px 30px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(255,183,77,0.3);
        }
        .btn-auth:active { transform: scale(0.95); }

        .categories { 
            padding: 20px 15px; max-width: 450px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; 
        }
        
        .cat-card { 
            background: var(--pi-g); padding: 15px 5px; border-radius: 20px; 
            text-align: center; cursor: pointer; color: var(--pi-d); font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); transition: 0.2s;
        }
        .cat-card:active { transform: scale(0.95); }
        
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; font-size: 1.2rem; margin: 0 auto 10px;
        }
        
        .cat-card span { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        
        .price-badge { 
            font-size: 0.8rem; color: #fff; font-weight: bold; 
            background: var(--pi-d); padding: 3px 10px; border-radius: 8px; 
        }
        
        .orders-section { padding: 20px 15px; max-width: 450px; margin: 0 auto; width: 100%; }
        .section-title { color: var(--pi-g); margin-bottom: 12px; text-align: center; font-size: 1rem; font-weight: bold; }
        
        .order-item { 
            background: rgba(255, 255, 255, 0.1); padding: 12px; 
            border-radius: 15px; margin-bottom: 10px; border-left: 4px solid var(--pi-g);
        }

        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; align-items: center; 
            justify-content: center; z-index: 4000; 
        }
        .modal-content { 
            background: var(--white); width: 90%; max-width: 380px; padding: 25px; 
            border-radius: 20px; text-align: left; color: var(--pi-d); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--pi-g); color: var(--pi-d); padding: 12px 25px;
            border-radius: 30px; display: none; z-index: 5000; font-size: 0.9rem; 
            font-weight: bold; border: 2px solid var(--pi-d); box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        
        textarea, input { 
            background: #f1f1f1; border: 1px solid #ddd; color: var(--pi-d); 
            width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">Bridge Freelance</h1>
        <div class="welcome-msg">Welcome to abokareem Platform 🌐</div>
        <p style="font-size: 0.8rem; color: var(--pi-g); margin-bottom: 15px;">Your Gateway to Freelance Services via Pi Network</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Login via Pi Network</button>
    </header>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>Programming</span><span class="price-badge">1.0 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>Design</span><span class="price-badge">0.8 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>Marketing</span><span class="price-badge">0.7 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-language"></i><span>Translation</span><span class="price-badge">0.5 Pi</span>
        </div>
    </section>

    <section class="orders-section">
        <div class="section-title">📦 Recent Orders</div>
        <div id="ordersList"></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; margin-bottom:15px; color: var(--pi-g)">Payment Complete! 🎉</h2>
            <textarea id="orderDetail" rows="3" placeholder="Enter your order details here..."></textarea>
            <input type="email" id="contactInfo" placeholder="Your Email Address">
            <button style="width:100%; background:var(--pi-g); color:var(--pi-d); border:none; padding:14px; border-radius:12px; margin-top:20px; font-weight:bold; cursor:pointer;" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) {
            toast.innerText = m; 
            toast.style.display = 'block'; 
            setTimeout(() => toast.style.display='none', 3000); 
        }

        async function startApp() {
            try {
                showMsg("Connecting...");
                await window.Pi.init({ version: "2.0", sandbox: true }); 
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                
                document.getElementById('authBtn').innerHTML = "Verified ✅";
                document.getElementById('authBtn').style.background = "#2ecc71";
                showMsg("Welcome " + auth.user.username);
            } catch (e) { 
                showMsg("Login failed: Please try via Pi Browser");
                console.error(e);
            }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) { showMsg("Please login first"); return; }
            currentPrice = amt; 
            currentCategory = name;
            
            try {
                showMsg("Starting payment...");
                await window.Pi.createPayment({
                    amount: amt, 
                    memo: "Service Order: " + name, 
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/api/payment-handler', { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ paymentId: id, action: 'approve' }) 
                        }).then(r => r.json());
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) 
                        });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: (e) => showMsg("Payment Failed"),
                    onCancel: () => showMsg("Payment Cancelled")
                });
            } catch (e) { showMsg("Payment system error"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("Please complete all fields");

            try {
                showMsg("Saving order...");
                
                await _supabase.from('services').insert([{
                    title: currentCategory, 
                    description: detail, 
                    price: String(currentPrice),
                    category: currentCategory, 
                    contact_info: contact,
                    user_pi: window.currentUser, 
                    txid: currentTxId
                }]);

                await emailjs.send("service_vuti648", "template_m6rq1ab", {
                    username: window.currentUser, 
                    service_detail: detail, 
                    contact_info: contact, 
                    order_id: currentTxId, 
                    price: currentPrice
                });

                showMsg("Submitted successfully!");
                setTimeout(() => location.reload(), 2000);
            } catch (error) { 
                showMsg("Server connection error");
                console.error(error);
            }
        }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(4);
                if (data) {
                    document.getElementById('ordersList').innerHTML = data.map(o => `
                        <div class="order-item">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem; color:var(--pi-g);">
                                <span>${o.title}</span><span>${o.price} Pi</span>
                            </div>
                            <div style="font-size:0.75rem; opacity:0.9; margin-top:5px; color:white;">${o.description ? o.description.substring(0, 40) : ''}...</div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
