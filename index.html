<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { 
            --pi-p: #6a1b9a; 
            --pi-d: #4a148c; 
            --pi-g: #ffb74d; 
            --w: #ffffff;
            --gold-bg: #fff9e6; /* خلفية ذهبية فاتحة */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--gold-bg); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: #333; }
        
        /* Hero Section - Compressed */
        .hero { 
            padding: 25px 20px; /* مساحة مضغوطة */
            background: linear-gradient(135deg, var(--pi-d) 0%, var(--pi-p) 100%); 
            text-align: center; color: var(--w); 
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            box-shadow: 0 8px 25px rgba(74, 20, 140, 0.25);
        }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 5px; font-weight: 900; }
        .welcome-msg { font-size: 0.85rem; background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); display: inline-block; padding: 5px 15px; border-radius: 30px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }
        
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; padding: 10px 30px; 
            border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }

        /* Grid & Cards - Smaller Icons */
        .categories { padding: 20px 15px; max-width: 600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { 
            background: var(--w); padding: 15px 10px; border-radius: 20px; 
            text-align: center; cursor: pointer; border: 1px solid rgba(255,183,77,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); width: 40px; height: 40px; /* حجم أصغر للنصف */
            display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; font-size: 1.2rem; margin: 0 auto 10px;
        }
        .cat-card span { font-weight: 700; color: var(--pi-d); font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .price-badge { font-size: 0.75rem; color: #bf360c; font-weight: 800; background: #fff3e0; padding: 2px 8px; border-radius: 5px; }

        /* Order Feed */
        .orders-section { padding: 10px 15px 30px; max-width: 500px; margin: 0 auto; width: 100%; }
        .section-title { color: var(--pi-d); margin-bottom: 15px; text-align: center; font-size: 1rem; font-weight: 800; }
        .order-item { 
            background: var(--w); padding: 12px; border-radius: 15px; margin-bottom: 10px; 
            border-right: 4px solid var(--pi-g); box-shadow: 0 3px 8px rgba(0,0,0,0.03);
        }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 30px 20px; border-radius: 25px; text-align: right; }
        
        /* Footer Restored */
        .footer-container { margin-top: auto; padding: 20px 10px 30px; text-align: center; background: rgba(255,255,255,0.8); border-top: 1px solid #eee; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .footer-links a { color: var(--pi-p); text-decoration: none; font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .copyright { font-size: 0.7rem; color: #888; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; display: none; z-index: 5000; font-size: 0.8rem; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <p style="font-size: 0.8rem; margin-bottom: 15px; opacity: 0.9;">أفضل الخدمات الرقمية عبر شبكة Pi</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول سريع</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>برمجة</span><span class="price-badge">1.0 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>تصميم</span><span class="price-badge">0.8 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>تسويق</span><span class="price-badge">0.7 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-language"></i><span>ترجمة</span><span class="price-badge">0.5 Pi</span>
        </div>
    </section>

    <section class="orders-section">
        <div class="section-title">📦 الطلبات النشطة</div>
        <div id="ordersList">
            <p style="text-align: center; font-size: 0.75rem; color: #999;">جاري التحديث...</p>
        </div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align: center; color: var(--pi-d); font-size: 1.2rem;">اكتمل الدفع! 🎉</h2>
            <textarea id="orderDetail" rows="4" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-top:15px;" placeholder="تفاصيل الخدمة المطلوبة..."></textarea>
            <input type="email" id="contactInfo" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-top:10px;" placeholder="ايميلك للتواصل">
            <button style="width:100%; background:var(--pi-p); color:white; border:none; padding:15px; border-radius:10px; margin-top:15px; font-weight:bold;" onclick="submitOrder()">إرسال الطلب</button>
        </div>
    </div>

    <footer class="footer-container">
        <div class="footer-links">
            <a href="#"><i class="fas fa-shield-alt"></i> سياسة الخصوصية</a>
            <a href="#"><i class="fas fa-file-contract"></i> شروط الاستخدام</a>
        </div>
        <div class="copyright">© 2026 Bridge Freelance - Powered by Pi Network</div>
    </footer>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 3000); }

        async function loadOrders() {
            try {
                const { data, error } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(4);
                const list = document.getElementById('ordersList');
                if (error || !data || data.length === 0) { list.innerHTML = '<p style="text-align:center; color:#999;">لا يوجد طلبات</p>'; return; }
                list.innerHTML = data.map(o => `
                    <div class="order-item">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem; color:var(--pi-d);">
                            <span>${o.title}</span>
                            <span>${o.price} Pi</span>
                        </div>
                        <div style="font-size:0.75rem; color:#666; margin:5px 0;">${o.description ? o.description.substring(0, 50) : ''}...</div>
                        <div style="font-size:0.65rem; color:#aaa;">بواسطة: ${o.user_pi}</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function startApp() {
            try {
                showMsg("جاري الاتصال...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = `أهلاً، ${auth.user.username} ✅`;
                document.getElementById('authBtn').style.background = "#2ecc71";
                showMsg("تم الدخول");
            } catch (e) { showMsg("خطأ في الدخول"); }
        }

        async function processPayment(amt, name) {
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("جاري تهيئة الدفع...");
                await window.Pi.createPayment({
                    amount: amt, memo: "خدمة: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; showMsg("تمت العملية!"); },
                    onReadyForServerCompletion: async (id, tx) => {
                        const response = await fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        if (response.ok) document.getElementById('reqModal').style.display = 'flex';
                    },
                    onCancel: () => showMsg("تم الإلغاء"),
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { showMsg("خطأ غير متوقع"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) { showMsg("أكمل البيانات"); return; }
            try {
                const { error: dbError } = await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact,
                    user_pi: window.currentUser || "Unknown", txid: currentTxId
                }]);
                if (dbError) throw dbError;
                
                await emailjs.send("service_vuti648", "template_m6rq1ab", {
                    username: window.currentUser || "abokareem", service_detail: detail, contact_info: contact, order_id: currentTxId, price: currentPrice
                });

                loadOrders();
                document.getElementById('modalContent').innerHTML = `<div style="text-align:center;"><h2>تم الاستلام!</h2><button onclick="location.reload()" style="padding:10px 20px; margin-top:10px;">إغلاق</button></div>`;
            } catch (error) { showMsg("خطأ في الحفظ"); }
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
