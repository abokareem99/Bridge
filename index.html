<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* الحفاظ على واجهتك الأصلية باللون الأبيض */
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* إضافة الأيقونات الذهبية كأزرار إضافية */
        .icon-link { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px;
            text-decoration: none; color: #333; font-weight: bold;
        }
        .icon-link i { color: #d4af37; font-size: 1.2rem; } /* اللون الذهبي للأيقونة */

        button { background-color: #4a148c; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }

        /* نافذة النجاح (الصح الأخضر) */
        #success-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 15px; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3); z-index: 1000; width: 80%;
        }
        .check-icon { color: #28a745; font-size: 4rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>جسر العمل الحر</h1>
        <p>مرحباً بك في تطبيق Bridge Freelance</p>

        <a href="services.html" class="icon-link">
            <span>تطوير البرمجيات</span>
            <i class="fas fa-code"></i>
        </a>
        <a href="services.html" class="icon-link">
            <span>الترجمة واللغات</span>
            <i class="fas fa-language"></i>
        </a>

        <button onclick="startPayment()">تجربة دفع 0.1 Pi</button>
    </div>

    <div id="success-modal">
        <i class="fas fa-check-circle check-icon"></i>
        <h2>تمت العملية بنجاح</h2>
        <button onclick="document.getElementById('success-modal').style.display='none'" style="background:#eee; color:black; margin-top:10px;">إغلاق</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        async function startPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تجربة دفع جسر التواصل",
                    metadata: { type: "test_payment" }
                }, {
                    onReadyForServerNotification: (paymentId) => {
                        fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'approve' }),
                        });
                    },
                    onComplete: (paymentId, txid) => {
                        // إظهار علامة الصح الأخضر عند النجاح
                        document.getElementById('success-modal').style.display = 'block';
                        fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid, action: 'complete' }),
                        });
                    },
                    onCancelled: () => {}, onIncomplete: () => {}
                });
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
