<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Premium Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #4a148c, #2d0a4e); min-height: 100vh; color: var(--white); padding-bottom: 100px; overflow-x: hidden; }
        
        .hero { padding: 15px 10px; text-align: center; }
        .hero-title { font-size: 1.5rem; color: var(--pi-g); font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .welcome-msg { font-size: 0.65rem; background: var(--glass); padding: 4px 12px; border-radius: 50px; margin-top: 5px; display: inline-block; border: 1px solid rgba(255,183,77,0.2); color: #FFFF00; font-weight: bold; }
        
        .auth-actions { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-auth { background: #8A2BE2; color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: background 0.3s; }
        .btn-free-post { background: var(--glass); color: var(--pi-g); border: 1px solid var(--pi-g); padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }

        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; z-index: 100; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 18px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-size: 1.1rem; margin: 0 auto 10px; }
        .cat-card span { font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .price-badge { font-size: 0.75rem; color: var(--pi-g); font-weight: 800; border: 1px solid var(--pi-g); padding: 2px 10px; border-radius: 8px; }

        .orders-section { padding: 12px; max-width: 500px; margin: 10px auto; background: rgba(0,0,0,0.2); border-radius: 22px; }
        #ordersList { max-height: 110px; overflow-y: auto; }
        .order-item { background: var(--glass); padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--pi-g); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--white); width: 88%; max-width: 360px; padding: 25px; border-radius: 24px; color: var(--pi-d); overflow-y: auto; max-height: 80vh; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 12px 0 22px; border-top: 1px solid var(--glass); z-index: 9999; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.5rem; cursor: pointer; padding: 5px 25px; transition: 0.3s; }
        .nav-item.active { color: var(--pi-g); opacity: 1; transform: translateY(-3px); }
        
        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10001; font-weight: 800; font-size: 0.85rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        input, textarea { width: 100%; margin-top: 10px; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Welcome to Bridge Freelance Platform 🌐</div>
            <div class="auth-actions">
                <button id="authBtn" class="btn-auth" onclick="startApp()">
                    <i class="fab fa-ethereum"></i> Login via Pi Network
                </button>
                <button class="btn-free-post" onclick="openFreeModal()">
                    <i class="fas fa-plus-circle"></i> Free Service
                </button>
            </div>
        </section>

        <section class="categories" id="servicesContainer"></section>

        <section class="orders-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 0.85rem;">
                <span style="color:var(--pi-g); font-weight:bold;"><i class="fas fa-history"></i> Global Activity</span>
                <i class="fas fa-cog" style="opacity:0.4; padding: 5px; cursor:pointer;" onclick="openAdmin()"></i>
            </div>
            <div id="ordersList"></div>
        </section>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <div id="adminAuth">
                <h3 style="text-align:center;">Admin Access</h3>
                <input type="password" id="adminPass" placeholder="Enter Password">
                <button onclick="checkAdmin()" style="width:100%; margin-top:15px; padding:12px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:10px; font-weight:bold;">Login</button>
            </div>
            <div id="adminTools" style="display:none;">
                <h3 style="margin-bottom:10px;">Add New Service</h3>
                <input type="text" id="newSTitle" placeholder="Service Title">
                <input type="text" id="newSPrice" placeholder="Price (Pi)">
                <button onclick="addService()" style="width:100%; margin-top:10px; padding:10px; background:#27ae60; color:white; border:none; border-radius:10px;">Add Service</button>
                <hr style="margin:20px 0;">
                <div id="adminServiceList"></div>
            </div>
            <button onclick="closeModal('adminModal')" style="width:100%; margin-top:15px; background:none; border:none; color:#999;">Close</button>
        </div>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 60px; color: #2ecc71; margin-bottom: 15px;"></i>
            <h2 style="color: #2d0a4e; margin-bottom: 10px;">Success!</h2>
            <p style="color: #666; font-size: 0.9rem;">Thank you! Your request has been received and added to Global Activity.</p>
            <button onclick="closeModal('successModal')" style="width: 100%; margin-top: 20px; padding: 15px; background: #4a148c; border: none; border-radius: 12px; font-weight: bold; color: white;">Back to Home</button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h3>Payment Successful!</h3>
            <textarea id="orderDetail" rows="4" placeholder="Order details..."></textarea>
            <input type="text" id="contactInfo" placeholder="Contact Info">
            <button onclick="submitOrder()" style="width:100%; margin-top:15px; padding:14px; background:var(--pi-g); color:var(--pi-d); border:none; border-radius:12px; font-weight:bold;">Send Order</button>
        </div>
    </div>

    <div id="freeModal" class="modal">
        <div class="modal-content">
            <h3>Post Free Service</h3>
            <input type="text" id="freeTitle" placeholder="Service Name">
            <textarea id="freeDesc" rows="4" placeholder="Description & Contact"></textarea>
            <button onclick="submitFreeService()" style="width:100%; margin-top:15px; padding:14px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">Post Now</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-layer-group"></i></div>
        <div class="nav-item" onclick="showMsg('Profile Coming Soon')"><i class="fas fa-user-astronaut"></i></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3500); }
        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openFreeModal() { if(!window.currentUser) { showMsg("Login Pi first"); return; } document.getElementById('freeModal').style.display='flex'; }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = "Welcome, " + auth.user.username;
                loadServices(); loadOrders();
            } catch (e) { showMsg("Login Error"); }
        }

        async function loadServices() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Service').order('id', {ascending: false});
            if(data) {
                document.getElementById('servicesContainer').innerHTML = data.map(s => `<div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')"><i class="fas fa-briefcase"></i><span>${s.title}</span><span class="price-badge">${s.price} Pi</span></div>`).join('');
            }
        }

        async function loadOrders() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Order').order('id', { ascending: false }).limit(4);
            if (data) {
                document.getElementById('ordersList').innerHTML = data.map(o => `<div class="order-item"><div><b>${o.title}</b><br><small>by ${o.user_pi}</small></div><b>${o.price} Pi</b></div>`).join('');
            }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Login first");
            currentPrice = amt; currentCategory = name;
            try {
                await window.Pi.createPayment({ amount: amt, memo: "Order: " + name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/approve', {method:'POST', body: JSON.stringify({id})}),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => { document.getElementById('reqModal').style.display = 'flex'; },
                    onError: (e) => showMsg("Failed")
                });
            } catch (e) { showMsg("Error"); }
        }

        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            await _supabase.from('services').insert([{ title: currentCategory, description: d, price: String(currentPrice), category: 'Order', user_pi: window.currentUser, contact_info: c, status: 'paid' }]);
            closeModal('reqModal');
            document.getElementById('successModal').style.display = 'flex';
            loadOrders();
        }

        async function submitFreeService() {
            const t = document.getElementById('freeTitle').value;
            const d = document.getElementById('freeDesc').value;
            await _supabase.from('services').insert([{ title: t, description: d, price: "0", category: 'Order', user_pi: window.currentUser, status: 'free' }]);
            closeModal('freeModal');
            document.getElementById('successModal').style.display = 'flex';
            loadOrders();
        }

        // منطق الأدمن المصلح
        async function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminAuth').style.display='none';
                document.getElementById('adminTools').style.display='block';
                loadAdminList();
            } else { showMsg("Wrong Password!"); }
        }

        async function loadAdminList() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Service');
            if(data) {
                document.getElementById('adminServiceList').innerHTML = data.map(s => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee; color: #333;"><span>${s.title}</span><i class="fas fa-trash" style="color:red" onclick="deleteService(${s.id})"></i></div>`).join('');
            }
        }

        async function addService() {
            const t = document.getElementById('newSTitle').value;
            const p = document.getElementById('newSPrice').value;
            if(!t || !p) return;
            await _supabase.from('services').insert([{ title: t, price: p, category: 'Service', status: 'active' }]);
            showMsg("Added!"); loadAdminList(); loadServices();
        }

        async function deleteService(id) { if(confirm("Delete?")) { await _supabase.from('services').delete().eq('id', id); loadAdminList(); loadServices(); } }

        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
