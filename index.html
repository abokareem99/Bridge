<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Professional Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pi-d: #4a148c; /* Deep Purple */
            --pi-g: #ffb74d; /* Golden Yellow */
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--pi-d); color: var(--white); min-height: 100vh; padding-bottom: 90px; }
        
        .hero { padding: 40px 15px; text-align: center; }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); font-weight: 800; margin-bottom: 10px; }
        
        /* Auth Button - All English */
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; 
            border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255,183,77,0.3);
        }

        /* Services Grid */
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .service-card { 
            background: rgba(255,255,255,0.05); border: 2px solid var(--pi-g); border-radius: 20px; 
            padding: 20px 10px; text-align: center; cursor: pointer;
        }
        .service-card i { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 10px; display: block; }
        .pi-badge { background: var(--pi-g); color: var(--pi-d); padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; margin-top: 8px; display: inline-block; font-weight: 800; }

        /* Orders Section - Improved UI */
        .orders-section { padding: 20px 15px; max-width: 500px; margin: 0 auto; }
        .section-header { 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
            margin-bottom: 20px; color: var(--pi-g); font-weight: bold; font-size: 1.2rem;
        }

        .order-card { 
            background: rgba(255,255,255,0.08); border-radius: 18px; padding: 15px; 
            margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,183,77,0.1);
        }
        
        /* Yellow Icon Boxes for Orders */
        .order-icon-box { 
            width: 45px; height: 45px; background: var(--pi-g); color: var(--pi-d); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        
        .order-details { flex: 1; margin-left: 15px; text-align: left; }
        .order-details h4 { font-size: 0.95rem; color: var(--pi-g); }
        .order-details p { font-size: 0.75rem; opacity: 0.7; }

        /* Floating Button - English */
        .fab { 
            position: fixed; bottom: 25px; left: 25px; background: var(--pi-g); color: var(--pi-d); 
            padding: 15px 25px; border-radius: 50px; font-weight: 900; box-shadow: 0 5px 20px rgba(0,0,0,0.4); 
            z-index: 1000; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 9999; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <header class="hero">
        <h1 class="hero-title">Bridge Freelance</h1>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Verify Identity ✅</button>
    </header>

    <section class="services-grid">
        <div class="service-card" onclick="pay(1.0, 'Programming')"><i class="fas fa-code"></i><span>Programming</span><br><div class="pi-badge">1.0 Pi</div></div>
        <div class="service-card" onclick="pay(0.8, 'Design')"><i class="fas fa-palette"></i><span>Design</span><br><div class="pi-badge">0.8 Pi</div></div>
    </section>

    <div class="orders-section">
        <div class="section-header">
            <i class="fas fa-bolt"></i> <span>Recent Services</span>
        </div>
        <div id="ordersContainer">
            </div>
    </div>

    <div class="fab" onclick="showPublishModal()">
        <i class="fas fa-plus"></i> <span>Post Service (0.1 Pi)</span>
    </div>

    <script>
        // الـ JavaScript يدعم الآن عرض البيانات بالإنجليزية
        async function loadOrders() {
            const { data } = await _supabase.from('services').select('*').order('id', { ascending: false });
            if(data) {
                document.getElementById('ordersContainer').innerHTML = data.map(s => `
                    <div class="order-card">
                        <div style="display:flex; align-items:center;">
                            <div class="order-icon-box">
                                <i class="fas fa-briefcase"></i>
                            </div>
                            <div class="order-details">
                                <h4>${s.title}</h4>
                                <p>Freelancer: ${s.user_pi}</p>
                            </div>
                        </div>
                        <div style="font-weight:900; color:var(--pi-g)">0.1 Pi</div>
                    </div>
                `).join('');
            }
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
