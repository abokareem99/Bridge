<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - High Speed v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .hero { padding: 30px 20px; background: linear-gradient(135deg, var(--pi-p), var(--pi-d)); text-align: center; color: var(--w); border-radius: 0 0 30px 30px; }
        .btn-auth { background: #2ecc71; color: white; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .cat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; }
        .price-tag { background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .feed-section { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .feed-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--pi-g); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; }
    </style>
</head>
<body>

<section class="hero">
    <h1 style="color: var(--pi-g);">Bridge Freelance</h1>
    <p style="font-size: 0.85rem; margin: 10px 0;">Fast & Secure Pi Payments</p>
    <button id="authBtn" class="btn-auth" onclick="startApp()">Verify Account</button>
</section>

<section class="categories">
    <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
        <i class="fas fa-code"></i> <br> Programming <br> <span class="price-tag">Pi 1.0</span>
    </div>
    <div class="cat-card" onclick="processPayment(0.8, 'Design')">
        <i class="fas fa-palette"></i> <br> Design <br> <span class="price-tag">Pi 0.8</span>
    </div>
</section>

<section class="feed-section" id="feedArea">
    <h3 style="margin-bottom:10px; color:var(--pi-d);">Recent Activity</h3>
    <div id="servicesFeed"></div>
</section>

<div id="reqModal" class="modal">
    <div class="modal-content" id="modalUI">
        <h2>Order Details</h2>
        <textarea id="orderDetail" rows="4" placeholder="How can we help?"></textarea>
        <input type="email" id="contactEmail" placeholder="Your Email">
        <button style="width:100%; background:var(--pi-p); color:white; padding:12px; border:none; border-radius:10px;" onclick="submitToSupabase()">Submit Order</button>
    </div>
</div>

<div id="toast"></div>

<script>
    const sbUrl = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
    const _sb = supabase.createClient(sbUrl, sbKey);

    let curTx = "", curAmt = 0, curCat = "";

    function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 4000); }

    async function loadFeed() {
        const { data } = await _sb.from('services').select('*').order('created_at', {ascending: false}).limit(4);
        if (data) {
            document.getElementById('servicesFeed').innerHTML = data.map(i => `
                <div class="feed-item">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.8rem; color:var(--pi-p);">
                        <span>${i.title}</span> <span>${i.price} Pi</span>
                    </div>
                    <p style="font-size:0.75rem; color:#666;">${i.description}</p>
                </div>
            `).join('');
        }
    }

    window.onload = loadFeed;

    async function startApp() {
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            const auth = await window.Pi.authenticate(['username', 'payments'], (p)=>{});
            window.user = auth.user.username;
            document.getElementById('authBtn').innerText = "Verified: " + window.user;
        } catch (e) { msg("Auth Failed"); }
    }

    async function processPayment(amt, name) {
        if (!window.user) return msg("Please Verify First!");
        curAmt = amt; curCat = name;
        try {
            await window.Pi.createPayment({
                amount: amt, memo: "Order: " + name, metadata: { cat: name }
            }, {
                onReadyForServerApproval: (id) => {
                    // Fast approval call
                    return fetch('/api/pay', {method:'POST', body: JSON.stringify({id, action:'approve'})});
                },
                onConnectedToBlockchain: (id, tx) => { curTx = tx; },
                onReadyForServerCompletion: (id, tx) => {
                    document.getElementById('reqModal').style.display = 'flex';
                    return fetch('/api/pay', {method:'POST', body: JSON.stringify({id, tx, action:'complete'})});
                },
                onCancel: () => msg("Cancelled"),
                onError: (e) => msg("Payment Error - Try Again")
            });
        } catch (e) { msg("System Busy"); }
    }

    async function submitToSupabase() {
        const desc = document.getElementById('orderDetail').value;
        const mail = document.getElementById('contactEmail').value;
        if (!desc || !mail) return msg("Fields Required");

        const { error } = await _sb.from('services').insert([{
            title: curCat, description: desc, price: String(curAmt),
            category: curCat, contact_info: mail, user_pi: window.user, txid: curTx
        }]);

        if (!error) {
            loadFeed();
            document.getElementById('modalUI').innerHTML = "<h2 style='text-align:center;'>Success!</h2><button style='width:100%; background:green; color:white; padding:10px; margin-top:10px;' onclick='location.reload()'>Done</button>";
        }
    }
</script>
</body>
</html>
