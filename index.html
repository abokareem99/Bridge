<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { background-color: #4a148c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>جسر العمل الحر</h1>
        <p>مرحباً بك في تطبيق Bridge Freelance</p>
        
        <button onclick="startPayment()">تجربة دفع 0.1 Pi</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0" });

        async function startPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1,
                    memo: "تجربة دفع جسر التواصل",
                    metadata: { type: "test_payment" }
                }, {
                    onReadyForServerNotification: (paymentId) => {
                        // الربط مع المسار الجديد في Vercel
                        fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'approve' }),
                        });
                    },
                    onCancelled: (paymentId) => { console.log("Cancelled"); },
                    onIncomplete: (paymentId) => { console.log("Incomplete"); },
                    onComplete: (paymentId, txid) => {
                        fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid, action: 'complete' }),
                        });
                    }
                });
            } catch (err) {
                console.error(err);
                alert("يرجى فتح التطبيق من داخل Pi Browser");
            }
        }
    </script>
</body>
</html>
