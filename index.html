<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { 
            --pi-p: #6a1b9a; 
            --pi-d: #4a148c; /* لون باي الغامق */
            --pi-g: #ffb74d; /* اللون الأصفر/الذهبي */
            --w: #ffb74d;    /* تم تحويل الأبيض إلى أصفر هنا */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* الخلفية البنفسجية الغامقة */
        body { background-color: var(--pi-d); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: var(--pi-g); }
        
        .hero { padding: 20px 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 5px; font-weight: 800; }
        .welcome-msg { font-size: 0.8rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--pi-g); color: var(--pi-g); }
        
        .btn-auth { background: #2ecc71; color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        .categories { padding: 15px; max-width: 450px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        /* تغيير خلفية البطاقات للأصفر */
        .cat-card { background: var(--pi-g); padding: 12px 5px; border-radius: 18px; text-align: center; cursor: pointer; color: var(--pi-d); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1.1rem; margin: 0 auto 8px; }
        .cat-card span { font-weight: 700; font-size: 0.85rem; display: block; margin-bottom: 4px; }
        .price-badge { font-size: 0.75rem; color: #fff; font-weight: bold; background: var(--pi-d); padding: 2px 8px; border-radius: 5px; }
        
        .orders-section { padding: 10px 15px; max-width: 450px; margin: 0 auto; width: 100%; }
        .section-title { color: var(--pi-g); margin-bottom: 10px; text-align: center; font-size: 0.95rem; font-weight: bold; }
        /* تغيير خلفية عناصر الطلبات للأصفر */
        .order-item { background: var(--pi-g); padding: 10px; border-radius: 12px; margin-bottom: 8px; border-right: 4px solid var(--pi-d); color: var(--pi-d); }

        .footer-container { margin-top: auto; padding: 20px 10px; text-align: center; background: rgba(0,0,0,0.2); }
        .footer-links a { color: var(--pi-g); text-decoration: none; font-size: 0.75rem; margin: 0 10px; font-weight: 600; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; }
        /* تغيير خلفية المودال للأصفر */
        .modal-content { background: var(--pi-g); width: 90%; max-width: 380px; padding: 25px 20px; border-radius: 20px; text-align: right; color: var(--pi-d); }
        .modal-content h2 { color: var(--pi-d); }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 10px 25px; border-radius: 30px; display: none; z-index: 5000; font-size: 0.85rem; font-weight: bold; }
        
        textarea, input { background: rgba(255,255,255,0.2); border: 1px solid var(--pi-d); color: var(--pi-d); }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <p style="font-size: 0.75rem; margin-bottom: 12px; opacity: 0.9; color: var(--pi-g);">بوابتك لخدمات العمل الحر عبر Pi Network</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Verified Account ✅</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>Programming</span><span class="price-badge">Pi 1.0</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>Design</span><span class="price-badge">Pi 0.8</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>Marketing</span><span class="price-badge">Pi 0.7</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-pen-nib"></i><span>Translation</span><span class="price-badge">Pi 0.5</span>
        </div>
    </section>

    <section class="orders-section">
        <div class="section-title">📦 الطلبات الأخيرة</div>
        <div id="ordersList"></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align:center; margin-bottom:10px;">تم الدفع بنجاح!</h2>
            <textarea id="orderDetail" rows="3" style="width:100%; padding:10px; margin-top:10px; border-radius:8px;" placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
            <input type="email" id="contactInfo" style="width:100%; padding:10px; margin-top:8px; border-radius:8px;" placeholder="بريدك الإلكتروني">
            <button style="width:100%; background:var(--pi-d); color:var(--pi-g); border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;" onclick="submitOrder()">إرسال الطلب</button>
        </div>
    </div>

    <footer class="footer-container">
        <div class="footer-links">
            <a href="#"><i class="fas fa-shield-alt"></i> الخصوصية</a>
            <a href="#"><i class="fas fa-file-contract"></i> الشروط</a>
        </div>
        <div class="copyright" style="color: var(--pi-g); opacity: 0.6;">© Bridge Freelance 2026</div>
    </footer>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 3000); }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(4);
                const list = document.getElementById('ordersList');
                if (!data || data.length === 0) { list.innerHTML = '<p style="text-align:center; font-size:0.75rem; color:var(--pi-g); opacity:0.7;">لا توجد طلبات</p>'; return; }
                list.innerHTML = data.map(o => `
                    <div class="order-item">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.8rem; color:var(--pi-d);">
                            <span>${o.title}</span><span>${o.price} Pi</span>
                        </div>
                        <div style="font-size:0.7rem; color:var(--pi-d); opacity:0.8;">${o.description ? o.description.substring(0, 40) : ''}...</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                showMsg("أهلاً بك " + auth.user.username);
            } catch (e) { showMsg("فشل الاتصال"); }
        }

        async function processPayment(amt, name) {
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("جاري طلب الدفع...");
                await window.Pi.createPayment({
                    amount: amt, memo: "Service: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                    },
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { showMsg("فشل العملية"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("أكمل البيانات");
            try {
                await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact,
                    user_pi: window.currentUser || "Unknown", txid: currentTxId
                }]);
                await emailjs.send("service_vuti648", "template_m6rq1ab", {
                    username: window.currentUser || "abokareem", service_detail: detail, contact_info: contact, order_id: currentTxId, price: currentPrice
                });
                location.reload();
            } catch (error) { showMsg("خطأ حفظ البيانات"); }
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
