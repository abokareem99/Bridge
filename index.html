<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جسر التواصل - سجل المشتريات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-d: #4a148c; --pi-g: #ffb74d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--pi-d); color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* التنسيقات العامة */
        .header { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .view-switcher { display: flex; justify-content: center; gap: 10px; padding: 15px; }
        .switch-btn { flex: 1; max-width: 120px; padding: 8px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .active { background: var(--pi-g); color: var(--pi-d); }
        .inactive { background: rgba(255,255,255,0.1); color: white; }

        /* قسم المشتري (السوق) */
        .market-grid { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--pi-g); padding: 15px; border-radius: 15px; color: var(--pi-d); text-align: center; cursor: pointer; }

        /* قسم سجل المشتريات الجديد */
        .my-orders { padding: 15px; background: rgba(0,0,0,0.2); margin-top: auto; border-top-left-radius: 25px; border-top-right-radius: 25px; }
        .order-row { background: white; color: var(--pi-d); padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .status-badge { background: #2ecc71; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 10px 20px; border-radius: 20px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color: var(--pi-g);">جسر التواصل</h2>
        <button id="authBtn" onclick="startApp()" style="background:#2ecc71; color:white; border:none; padding:5px 15px; border-radius:20px; margin-top:10px;">تحقق عبر Pi</button>
    </div>

    <div class="view-switcher">
        <button class="switch-btn active" id="bTab" onclick="show('buyer')">سوق الخدمات</button>
        <button class="switch-btn inactive" id="sTab" onclick="show('seller')">أضف خدمة</button>
    </div>

    <div id="buyerView" class="market-grid"></div>

    <div id="sellerView" style="display:none; padding:20px;">
        <div style="background:var(--pi-g); padding:20px; border-radius:20px; color:var(--pi-d);">
            <input type="text" id="gTitle" placeholder="عنوان الخدمة" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;">
            <input type="number" id="gPrice" placeholder="السعر بـ Pi" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px;">
            <button onclick="publish()" style="width:100%; background:var(--pi-d); color:white; padding:12px; border:none; border-radius:10px; font-weight:bold;">نشر الآن</button>
        </div>
    </div>

    <div class="my-orders">
        <h4 style="margin-bottom:10px; color:var(--pi-g); border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">
            <i class="fas fa-history"></i> سجل مشترياتي
        </h4>
        <div id="myOrdersList">
            <p style="text-align:center; font-size:0.7rem; opacity:0.6;">سجل دخولك لرؤية طلباتك</p>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

        function show(v) {
            document.getElementById('buyerView').style.display = v==='buyer'?'grid':'none';
            document.getElementById('sellerView').style.display = v==='seller'?'block':'none';
            document.getElementById('bTab').className = v==='buyer'?'switch-btn active':'switch-btn inactive';
            document.getElementById('sTab').className = v==='seller'?'switch-btn active':'switch-btn inactive';
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: false });
                const auth = await window.Pi.authenticate(['username'], (p)=>{});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = "مرحباً " + auth.user.username;
                loadMyOrders(); // تحميل مشتريات المستخدم فور دخوله
                loadMarket();
            } catch (e) { showMsg("افتح من متصفح Pi"); }
        }

        // دالة عرض الخدمات في السوق
        async function loadMarket() {
            const { data } = await _supabase.from('market_gigs').select('*');
            if(data) {
                document.getElementById('buyerView').innerHTML = data.map(g => `
                    <div class="card" onclick="pay(${g.price}, '${g.title}')">
                        <div style="font-weight:bold;">${g.title}</div>
                        <div style="font-size:0.8rem; margin-top:5px;">${g.price} Pi</div>
                    </div>
                `).join('');
            }
        }

        // دالة جلب سجل مشتريات الشخص الحالي فقط
        async function loadMyOrders() {
            if(!window.currentUser) return;
            const { data } = await _supabase.from('services')
                .select('*')
                .eq('user_pi', window.currentUser) // جلب الطلبات الخاصة بهذا اليوزر فقط
                .order('id', { ascending: false });

            if(data && data.length > 0) {
                document.getElementById('myOrdersList').innerHTML = data.map(o => `
                    <div class="order-row">
                        <div>
                            <strong>${o.title}</strong><br>
                            <span style="font-size:0.6rem; opacity:0.7;">${o.price} Pi</span>
                        </div>
                        <span class="status-badge">مكتمل ✅</span>
                    </div>
                `).join('');
            } else {
                document.getElementById('myOrdersList').innerHTML = "<p style='text-align:center; font-size:0.7rem;'>لا يوجد مشتريات سابقة</p>";
            }
        }

        async function publish() {
            const t = document.getElementById('gTitle').value;
            const p = document.getElementById('gPrice').value;
            if(!t || !p || !window.currentUser) return showMsg("أكمل البيانات");
            await _supabase.from('market_gigs').insert([{ title:t, price:p, seller_name:window.currentUser }]);
            showMsg("تم النشر!");
            show('buyer');
            loadMarket();
        }

        window.onload = loadMarket;
    </script>
</body>
</html>
