<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-purple: #6a1b9a; --pi-gold: #ffb74d; }
        body { background-color: #f4f4f9; font-family: sans-serif; padding-bottom: 80px; }
        .header { background: var(--pi-purple); color: white; padding: 20px; text-align: center; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .service-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-right: 5px solid var(--pi-gold); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .add-btn { position: fixed; bottom: 20px; left: 20px; background: var(--pi-purple); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <header class="header">
        <h1>جسر التواصل</h1>
        <p id="userStatus" style="font-size: 0.8rem;">جاري التحميل...</p>
    </header>

    <div class="container" id="sc">جاري تحميل الخدمات...</div>

    <a href="publish-service.html" onclick="window.location.replace('publish-service.html'); return false;" class="add-btn">+</a>

    <script>
        const sb = supabase.createClient('Https://xolwuawlnruvzqowxxbh.supabase.co', 'sb_publishable_PzP2Iko5vX3xlonGzF3a4w_qMogivll');

        async function init() {
            try {
                // تهيئة بسيطة جداً لإصدار 2.0
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username']);
                document.getElementById('userStatus').innerText = "مرحباً: " + auth.user.username;
            } catch (e) {
                document.getElementById('userStatus').innerText = "افتح من متصفح Pi";
            }
            load();
        }

        async function load() {
            const { data, error } = await sb.from('services').select('*').order('created_at', { ascending: false });
            const c = document.getElementById('sc');
            if (error) { c.innerText = "خطأ في الاتصال"; return; }
            c.innerHTML = data.map(s => `
                <div class="service-card">
                    <h3>${s.title}</h3>
                    <p>${s.description}</p>
                    <div style="margin-top:10px; font-weight:bold; color:green;">${s.price} Pi</div>
                </div>`).join('');
        }
        window.onload = init;
    </script>
</body>
</html>
