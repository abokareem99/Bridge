<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // هذا هو المفتاح العام الثابت الخاص بك
            emailjs.init("S0i0-6kI4r2uG_rXn");
        })();
    </script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .hero { padding: 40px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        .welcome-msg { font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 6px 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,215,0,0.3); }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .categories { padding: 25px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { background: var(--w); padding: 20px 10px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(106, 27, 154, 0.08); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; font-size: 1.6rem; margin-bottom: 12px; margin: 0 auto 12px; }
        .price-badge { font-size: 0.8rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 3px 10px; border-radius: 6px; display: block; width: fit-content; margin: 5px auto; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 92%; max-width: 400px; padding: 30px 20px; border-radius: 25px; text-align: right; }
        .modal-content textarea, .modal-content input { width: 100%; padding: 14px; margin-top: 12px; border: 1px solid #eee; border-radius: 12px; font-size: 0.9rem; background: #f9f9f9; }
        .btn-submit { width: 100%; background: var(--pi-p); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 25px; border-radius: 30px; display: none; z-index: 5000; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div><br>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة')"><i class="fas fa-code"></i><span>البرمجة</span><span class="price-badge">1.0 Pi</span></div>
        <div class="cat-card" onclick="processPayment(0.8, 'التصميم')"><i class="fas fa-palette"></i><span>التصميم</span><span class="price-badge">0.8 Pi</span></div>
        <div class="cat-card" onclick="processPayment(0.7, 'التسويق')"><i class="fas fa-bullhorn"></i><span>التسويق</span><span class="price-badge">0.7 Pi</span></div>
        <div class="cat-card" onclick="processPayment(0.5, 'الترجمة')"><i class="fas fa-pen-nib"></i><span>الترجمة</span><span class="price-badge">0.5 Pi</span></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align:center">📦 تفاصيل الطلب</h2>
            <p style="text-align:center; font-size:0.8rem; color:green">تم الدفع بنجاح! نرجو تزويدنا بالآتي:</p>
            <textarea id="orderDetail" rows="4" placeholder="اكتب تفاصيل الخدمة المطلوبة هنا..."></textarea>
            <input type="text" id="contactInfo" placeholder="رقم الواتساب أو وسيلة التواصل">
            <button class="btn-submit" onclick="sendToEmail()">إرسال بيانات الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentTxId = "تجريبي"; 
        let selectedService = "";
        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                document.getElementById('authBtn').innerText = "أهلاً: " + auth.user.username;
                document.getElementById('authBtn').style.background = "#2ecc71";
            } catch (e) { showMsg("فشل التوثيق"); }
        }

        async function processPayment(amt, name) {
            selectedService = name;
            try {
                showMsg("جاري طلب الدفع...");
                const payment = await window.Pi.createPayment({
                    amount: amt, memo: "طلب: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/approve', {method:'POST', body: JSON.stringify({id})}),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        return fetch('/api/complete', {method:'POST', body: JSON.stringify({id, tx})});
                    },
                    onError: (e) => showMsg("حدث خطأ")
                });
            } catch (e) { showMsg("فشل في العملية"); }
        }

        function sendToEmail() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) { showMsg("أكمل البيانات أولاً"); return; }

            const params = { service_name: selectedService, order_details: detail, user_contact: contact, transaction_id: currentTxId };

            // استخدام المعرف المفعل من صورتك الأخيرة
            emailjs.send("service_vuti648", "template_m6rq1ab", params)
                .then(() => {
                    document.getElementById('modalContent').innerHTML = "<div style='text-align:center'><h2>✅ تم الإرسال</h2><p>سنتواصل معك قريباً</p><button class='btn-submit' onclick='location.reload()'>إغلاق</button></div>";
                }, (err) => { showMsg("خطأ في الإرسال"); });
        }
    </script>
</body>
</html>
