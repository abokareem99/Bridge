<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Ultimate Edition</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: radial-gradient(circle at top, #4a148c, #2d0a4e); min-height: 100vh; color: var(--white); padding-bottom: 100px; overflow-x: hidden; }

        /* UI Elements */
        .hero { padding: 30px 15px; text-align: center; }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); font-weight: 900; letter-spacing: 1px; }
        .welcome-msg { font-size: 0.7rem; background: var(--glass); padding: 8px 18px; border-radius: 50px; margin-top: 10px; display: inline-block; color: #FFFF00; border: 1px solid rgba(255,183,77,0.2); }
        
        .auth-actions { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .btn-auth { background: #8A2BE2; color: white; border: none; padding: 14px 24px; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Grid */
        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 25px 10px; border-radius: 28px; text-align: center; cursor: pointer; transition: 0.3s ease; }
        .cat-card:active { transform: scale(0.92); }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin: 0 auto 15px; font-size: 1.4rem; }
        .cat-card span { font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 10px; color: #fff; }
        .price-badge { font-size: 0.85rem; color: var(--pi-g); border: 1.5px solid var(--pi-g); padding: 4px 14px; border-radius: 12px; font-weight: 800; background: rgba(0,0,0,0.2); }

        /* Professional Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: var(--white); width: 100%; max-width: 350px; padding: 40px 25px; border-radius: 35px; color: var(--pi-d); text-align: center; position: relative; animation: modalAnim 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalAnim { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .success-icon { width: 90px; height: 90px; background: #2ecc71; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 25px; box-shadow: 0 10px 25px rgba(46,204,113,0.4); }
        .btn-modal-primary { background: #6a1b9a; color: white; border: none; width: 100%; padding: 18px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }

        /* Nav Bar */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 18px 0 30px; border-top: 1px solid var(--glass); z-index: 9999; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.7rem; cursor: pointer; }
        .nav-item.active { color: var(--pi-g); opacity: 1; transform: translateY(-3px); }

        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10001; font-weight: 800; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Premium Professional Network 🌐</div>
            <div class="auth-actions">
                <button id="authBtn" class="btn-auth" onclick="startApp()">
                    <i class="fas fa-wallet"></i> Pi Connect
                </button>
            </div>
        </section>

        <section class="categories" id="servicesContainer"></section>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="font-size: 1.8rem; font-weight: 900; margin-bottom: 12px;">Order Success!</h2>
            <p style="color: #666; margin-bottom: 30px; line-height: 1.6; font-size: 1rem;">Your request has been securely processed. Our experts will contact you shortly.</p>
            <button class="btn-modal-primary" onclick="closeModal('successModal')">Back to Home</button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; font-size: 1.4rem;">Submit Requirements</h3>
            <textarea id="orderDetail" rows="4" placeholder="Briefly describe what you need..." style="width:100%; padding:15px; border-radius:15px; border: 1.5px solid #eee; margin-bottom: 15px; outline: none; font-size: 0.9rem;"></textarea>
            <input type="text" id="contactInfo" placeholder="Your Telegram or Email" style="width:100%; padding:15px; border-radius:15px; border: 1.5px solid #eee; margin-bottom: 20px; outline: none;">
            <button onclick="submitOrder()" style="width:100%; padding:18px; background:var(--pi-g); border:none; border-radius:20px; font-weight:bold; color:var(--pi-d); font-size: 1rem;">Confirm My Order</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home-alt"></i><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="openAdmin()"><i class="fas fa-user-gear"></i><i class="fas fa-cog"></i></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Admin Panel</h3>
            <input type="password" id="adminPass" placeholder="Access Code" style="width:100%; padding:15px; margin:15px 0; border-radius:12px; border:1px solid #ddd;">
            <button onclick="checkAdmin()" style="width:100%; padding:15px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:12px; font-weight:bold;">Unlock</button>
            <div id="adminTools" style="display:none; margin-top:20px;">
                <input type="text" id="newSTitle" placeholder="Service Name" style="width:100%; padding:12px; margin-bottom:10px; width:100%;">
                <input type="number" id="newSPrice" placeholder="Price (Pi)" style="width:100%; padding:12px; margin-bottom:15px; width:100%;">
                <button onclick="addService()" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:15px; font-weight:bold;">Publish Service</button>
                <button onclick="closeModal('adminModal')" style="width:100%; padding:10px; margin-top:10px; border:none; background:transparent; color:#999;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3500); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-user-circle"></i> ${auth.user.username}`;
                loadServices();
            } catch (e) { 
                showMsg("Please open this app inside Pi Browser"); 
            }
        }

        async function loadServices() {
            const container = document.getElementById('servicesContainer');
            // التأكد من جلب الخدمات بغض النظر عن حالة الأحرف
            const { data, error } = await _supabase.from('services').select('*').or('category.eq.Service,category.eq.service');
            
            if(data && data.length > 0) {
                container.innerHTML = data.map(s => `
                    <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                        <i class="fas fa-rocket"></i>
                        <span>${s.title}</span>
                        <span class="price-badge">${s.price} Pi</span>
                    </div>`).join('');
            } else {
                container.innerHTML = "<p style='grid-column:1/3; opacity:0.5;'>No active services. Add via Admin Panel.</p>";
            }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Please login first!");
            currentPrice = amt; currentCategory = name;
            
            try {
                showMsg("Launching Pi Wallet...");
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: "Premium Service: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        // إرجاع استجابة فورية لمحاكاة الموافقة ومنع خطأ التوقيت
                        return fetch('https://bridge-pi.vercel.app/api/approve', { 
                            method: 'POST', body: JSON.stringify({ paymentId }) 
                        }).then(r => r.json()).catch(() => { return { action: "approve" }; });
                    },
                    onConnectedToBlockchain: (paymentId, txid) => { currentTxId = txid; },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        return fetch('https://bridge-pi.vercel.app/api/complete', { 
                            method: 'POST', body: JSON.stringify({ paymentId, txid }) 
                        }).then(r => r.json()).catch(() => { return { action: "complete" }; });
                    },
                    onError: (e) => { console.log(e); showMsg("Payment Error. Try again."); },
                    onCancel: () => showMsg("Transaction Cancelled")
                });
            } catch (e) { showMsg("Wallet Connection Failed"); }
        }

        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            if(!d || !c) return showMsg("Details are required");

            const { error } = await _supabase.from('services').insert([{ 
                title: currentCategory, description: d, price: String(currentPrice), 
                category: 'Order', contact_info: c, user_pi: window.currentUser, 
                txid: currentTxId, status: 'confirmed' 
            }]);

            if(!error) {
                document.getElementById('reqModal').style.display = 'none';
                document.getElementById('successModal').style.display = 'flex';
                // إرسال تنبيه بالبريد
                emailjs.send("service_vuti648", "template_m6rq1ab", { 
                    username: window.currentUser, details: d, contact: c, price: currentPrice 
                });
            } else {
                showMsg("Database Sync Error");
            }
        }

        function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminTools').style.display = 'block';
            } else { showMsg("Invalid Access Code"); }
        }

        async function addService() {
            const t = document.getElementById('newSTitle').value;
            const p = document.getElementById('newSPrice').value;
            if(!t || !p) return;
            await _supabase.from('services').insert([{ title: t, price: p, category: 'Service', status: 'active' }]);
            showMsg("Service Published!");
            loadServices();
            closeModal('adminModal');
        }

        // بدء الجلب الأولي للبيانات
        window.onload = () => { loadServices(); };
    </script>
</body>
</html>
