<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Pi Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; flex-direction: column; min-height: 100vh; }
        .hero { padding: 30px 20px; background: linear-gradient(135deg, var(--pi-p), var(--pi-d)); text-align: center; color: var(--w); border-radius: 0 0 30px 30px; }
        .welcome-badge { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; margin: 10px 0; display: inline-block; }
        .btn-auth { background: #2ecc71; color: white; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .cat-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .cat-card:active { transform: scale(0.95); border-color: var(--pi-g); }
        .cat-card i { font-size: 1.5rem; color: var(--pi-p); margin-bottom: 8px; display: block; }
        .price-tag { display: inline-block; background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; margin-top: 5px; }
        .feed-section { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .feed-title { color: var(--pi-d); font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .feed-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--pi-g); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .feed-user { font-size: 0.7rem; color: #888; margin-top: 8px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-send { width: 100%; background: var(--pi-p); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 2000; font-size: 0.8rem; }
    </style>
</head>
<body>

<section class="hero">
    <h1 style="color: var(--pi-g);">Bridge Freelance</h1>
    <div class="welcome-badge">Welcome to abokareem platform 🌐</div>
    <p style="font-size: 0.8rem; margin-bottom: 15px;">Your Gateway to Services via Pi Network</p>
    <button id="authBtn" class="btn-auth" onclick="startApp()">Login with Pi Network</button>
</section>

<section class="categories">
    <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
        <i class="fas fa-code"></i> <span>Programming</span> <br> <span class="price-tag">Pi 1.0</span>
    </div>
    <div class="cat-card" onclick="processPayment(0.8, 'Design')">
        <i class="fas fa-palette"></i> <span>Design</span> <br> <span class="price-tag">Pi 0.8</span>
    </div>
</section>

<section class="feed-section">
    <div class="feed-title">
        <span>Recent Services</span>
        <i class="fas fa-sync-alt" onclick="loadFeed()" style="cursor: pointer; color: var(--pi-p);"></i>
    </div>
    <div id="servicesFeed">
        </div>
</section>

<div id="reqModal" class="modal">
    <div class="modal-content" id="modalUI">
        <h2 style="text-align: center; color: var(--pi-d);">Order Details</h2>
        <textarea id="orderDetail" rows="4" placeholder="Describe the service..."></textarea>
        <input type="email" id="contactEmail" placeholder="Your Email Address">
        <button class="btn-send" onclick="submitToSupabase()">Submit Order</button>
    </div>
</div>

<footer style="margin-top: auto; padding: 20px; text-align: center; font-size: 0.7rem; color: #999; border-top: 1px solid #eee;">
    <div style="margin-bottom: 5px;">
        <a href="#" style="color: var(--pi-p); text-decoration: none; margin: 0 10px;">Privacy Policy</a>
        <a href="#" style="color: var(--pi-p); text-decoration: none; margin: 0 10px;">Terms of Use</a>
    </div>
    © 2026 Bridge Freelance - Powered by Pi Network
</footer>

<div id="toast"></div>

<script>
    const sbUrl = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const sbKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
    const _sb = supabase.createClient(sbUrl, sbKey);

    let curTx = "", curAmt = 0, curCat = "";

    function msg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none', 3000); }

    async function loadFeed() {
        const { data, error } = await _sb.from('services').select('*').order('created_at', {ascending: false}).limit(5);
        if (!error && data) {
            document.getElementById('servicesFeed').innerHTML = data.map(i => `
                <div class="feed-item">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem; color:var(--pi-p);">
                        <span>${i.title}</span> <span style="color:#e65100;">Pi ${i.price}</span>
                    </div>
                    <p style="font-size:0.8rem; color:#555; margin-top:5px;">${i.description}</p>
                    <div class="feed-user"><i class="fas fa-user-circle"></i> Ordered by: ${i.user_pi}</div>
                </div>
            `).join('');
        }
    }

    window.onload = loadFeed;

    async function startApp() {
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            const auth = await window.Pi.authenticate(['username', 'payments'], (p)=>{});
            window.user = auth.user.username;
            document.getElementById('authBtn').innerText = "Verified: " + window.user;
        } catch (e) { msg("Connection Error"); }
    }

    async function processPayment(amt, name) {
        if (!window.user) { msg("Please Login First!"); return; }
        curAmt = amt; curCat = name;
        try {
            msg(`Opening Pi Wallet for ${name}...`);
            await window.Pi.createPayment({
                amount: amt, memo: "Order: " + name, metadata: { cat: name }
            }, {
                onReadyForServerApproval: (id) => fetch('/api/pay', {method:'POST', body: JSON.stringify({id, action:'approve'})}),
                onConnectedToBlockchain: (id, tx) => { curTx = tx; },
                onReadyForServerCompletion: (id, tx) => {
                    document.getElementById('reqModal').style.display = 'flex';
                    fetch('/api/pay', {method:'POST', body: JSON.stringify({id, tx, action:'complete'})});
                },
                onError: (e) => msg("Payment Error")
            });
        } catch (e) { msg("Error: " + e.message); }
    }

    async function submitToSupabase() {
        const desc = document.getElementById('orderDetail').value;
        const mail = document.getElementById('contactEmail').value;
        if (!desc || !mail) return msg("Please fill all fields");

        const { error } = await _sb.from('services').insert([{
            title: curCat, description: desc, price: String(curAmt),
            category: curCat, contact_info: mail, user_pi: window.user, txid: curTx
        }]);

        if (!error) {
            msg("Success!");
            loadFeed();
            document.getElementById('modalUI').innerHTML = "<h2 style='text-align:center;'>✅ Success</h2><p style='text-align:center;'>Order published.</p><button class='btn-send' onclick='location.reload()'>Close</button>";
        } else { msg("Database Error"); }
    }
</script>
</body>
</html>
