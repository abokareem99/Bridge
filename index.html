<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { 
            --pi-p: #6a1b9a;
            --pi-d: #4a148c; /* لون باي البنفسجي الغامق */
            --pi-g: #ffb74d; /* اللون الذهبي/الأصفر */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: var(--pi-d); min-height: 100vh; color: white; display: flex; flex-direction: column; }
        
        .hero { padding: 30px 15px; text-align: center; }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); font-weight: 800; margin-bottom: 10px; }
        
        .welcome-msg { 
            font-size: 0.9rem; background: var(--pi-g); color: var(--pi-d); 
            display: inline-block; padding: 8px 20px; border-radius: 50px; 
            font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .btn-auth { 
            background: #2ecc71; color: white; border: none; padding: 12px 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer;
        }

        .categories { 
            padding: 15px; max-width: 450px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; 
        }
        
        .cat-card { 
            background: var(--pi-g); /* لون البطاقة الذهبي الواضح */
            padding: 20px 10px; border-radius: 22px; text-align: center; 
            cursor: pointer; color: var(--pi-d); font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); 
            width: 45px; height: 45px; display: flex; align-items: center; 
            justify-content: center; border-radius: 12px; font-size: 1.3rem; margin: 0 auto 12px;
        }

        .price-badge { 
            font-size: 0.85rem; color: #fff; font-weight: bold; background: var(--pi-d);
            padding: 3px 12px; border-radius: 8px; display: inline-block; margin-top: 5px;
        }
        
        .orders-section { padding: 20px 15px; max-width: 450px; margin: 0 auto; width: 100%; }
        .section-title { color: var(--pi-g); margin-bottom: 15px; text-align: center; font-weight: bold; }
        .order-item { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px; margin-bottom: 10px; border-right: 4px solid var(--pi-g); }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--pi-d); color: var(--pi-g); padding: 10px 25px; border-radius: 30px; display: none; z-index: 5000; font-weight: bold; border: 2px solid var(--pi-g); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 90%; max-width: 380px; padding: 25px; border-radius: 20px; color: var(--pi-d); }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>البرمجة</span><span class="price-badge">1.0 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>التصميم</span><span class="price-badge">0.8 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>التسويق</span><span class="price-badge">0.7 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-language"></i><span>الترجمة</span><span class="price-badge">0.5 Pi</span>
        </div>
    </section>

    <section class="orders-section">
        <div class="section-title">📦 الطلبات الأخيرة</div>
        <div id="ordersList"></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center;">اكتمل الدفع! 🎉</h2>
            <textarea id="orderDetail" rows="3" style="width:100%; margin-top:10px; padding:10px;" placeholder="اكتب تفاصيل طلبك..."></textarea>
            <input type="email" id="contactInfo" style="width:100%; margin-top:10px; padding:10px;" placeholder="بريدك الإلكتروني">
            <button style="width:100%; background:var(--pi-d); color:var(--pi-g); border:none; padding:12px; border-radius:10px; margin-top:15px; font-weight:bold; cursor:pointer;" onclick="submitOrder()">إرسال الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        [span_2](start_span)[span_3](start_span)[span_4](start_span)// الكود البرمجي الأصلي الخاص بك لضمان استمرار الدفع وربط البيانات[span_2](end_span)[span_3](end_span)[span_4](end_span)
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 3000); }

        async function startApp() {
            try {
                showMsg("جاري الاتصال...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "تم التحقق ✅";
                showMsg("مرحباً " + auth.user.username);
            } catch (e) { showMsg("فشل الدخول"); }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) { showMsg("يرجى تسجيل الدخول أولاً"); return; }
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("بدء عملية الدفع...");
                await window.Pi.createPayment({
                    amount: amt, memo: "طلب خدمة: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('/api/payment-handler', { 
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ paymentId: id, action: 'approve' }) 
                        }).then(r => r.json());
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { 
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) 
                        });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: (e) => showMsg("فشل الدفع"),
                    onCancel: () => showMsg("تم إلغاء الدفع")
                });
            } catch (e) { showMsg("حدث خطأ"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("يرجى إكمال البيانات");
            try {
                showMsg("جاري حفظ الطلب...");
                await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact,
                    user_pi: window.currentUser, txid: currentTxId
                }]);
                showMsg("تم الإرسال بنجاح!");
                setTimeout(() => location.reload(), 2000);
            } catch (error) { showMsg("خطأ في الاتصال"); }
        }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(4);
                if (data) {
                    document.getElementById('ordersList').innerHTML = data.map(o => `
                        <div class="order-item">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem; color:var(--pi-g);">
                                <span>${o.title}</span><span>${o.price} Pi</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
