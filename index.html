<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>جسر التواصل - سوق الخدمات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --pi-p: #4a148c; --pi-y: #ffb74d; }
        body { background: var(--pi-p); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .header { padding: 20px; text-align: center; background: #5e1bbf; border-bottom: 3px solid var(--pi-y); }
        .auth-btn { background: #2ecc71; color: white; padding: 10px 20px; border-radius: 20px; display: inline-block; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* الأقسام الرئيسية */
        .section-container { padding: 15px; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        
        /* كارت الخدمة (للشراء) */
        .buy-card { background: var(--pi-y); color: var(--pi-p); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid transparent; }
        .buy-card:active { transform: scale(0.95); border-color: white; }
        .price-label { background: var(--pi-p); color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; display: inline-block; }

        /* تبديل الواجهات */
        .tabs { display: flex; gap: 10px; padding: 15px; justify-content: center; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: rgba(255,255,255,0.1); color: white; }
        .tab.active { background: var(--pi-y); color: var(--pi-p); }

        /* المودال */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; color: var(--pi-p); padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-y); color: var(--pi-p); padding: 10px 20px; border-radius: 30px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="color:var(--pi-y);">جسر التواصل</h1>
        <div id="btnAuth" class="auth-btn" onclick="startSystem()">إضغط هنا للتحقق (خطوة أساسية)</div>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="show('market')">سوق الخدمات (للشراء)</button>
        <button id="t2" class="tab" onclick="show('publish')">أضف خدمة (للنشر)</button>
    </div>

    <div id="pageMarket" class="section-container">
        <h3 style="color:var(--pi-y); margin-bottom:10px;"><i class="fas fa-shopping-cart"></i> الخدمات المتاحة الآن:</h3>
        <div id="itemsContainer" class="market-grid">
            <p style="grid-column: span 2; text-align: center; opacity: 0.6;">جاري تحميل السوق...</p>
        </div>
    </div>

    <div id="pagePublish" class="section-container" style="display:none;">
        <div style="background:var(--pi-y); color:var(--pi-p); padding:20px; border-radius:20px;">
            <h3 style="text-align:center;">انشر مهارتك</h3>
            <input type="text" id="gTitle" placeholder="اسم الخدمة">
            <input type="number" id="gPrice" placeholder="السعر بـ Pi">
            <button onclick="publishItem()" style="width:100%; background:var(--pi-p); color:white; padding:15px; border:none; border-radius:12px; margin-top:15px; font-weight:bold;">نشر في السوق</button>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:#2ecc71;">تم الدفع بنجاح!</h2>
            <p style="margin-top:10px; font-weight:bold;">أرسل تفاصيل طلبك وعنوان تواصلك:</p>
            <input type="email" id="uMail" placeholder="بريدك الإلكتروني">
            <textarea id="uNotes" rows="3" placeholder="ماذا تطلب من صاحب الخدمة؟"></textarea>
            <button onclick="confirmOrder()" style="width:100%; background:var(--pi-p); color:white; padding:15px; border:none; border-radius:12px; margin-top:15px; font-weight:bold;">إرسال الطلب النهائي</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const _sb = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let payInfo = { t: "", p: 0, tx: "" };

        function msg(t) { const e=document.getElementById('toast'); e.innerText=t; e.style.display='block'; setTimeout(()=>e.style.display='none',3000); }

        function show(p) {
            document.getElementById('pageMarket').style.display = p==='market'?'block':'none';
            document.getElementById('pagePublish').style.display = p==='publish'?'block':'none';
            document.getElementById('t1').className = p==='market'?'tab active':'tab';
            document.getElementById('t2').className = p==='publish'?'tab active':'tab';
        }

        async function startSystem() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments']);
                window.currentUser = auth.user.username;
                document.getElementById('btnAuth').innerText = "مرحباً: " + window.currentUser;
                loadItems();
            } catch (e) { msg("افتح التطبيق من متصفح Pi"); }
        }

        async function loadItems() {
            const { data } = await _sb.from('market_gigs').select('*').order('id', {ascending:false});
            const div = document.getElementById('itemsContainer');
            if(data && data.length > 0) {
                div.innerHTML = data.map(i => `
                    <div class="buy-card" onclick="startPay(${i.price}, '${i.title}')">
                        <i class="fas fa-shopping-bag" style="font-size:1.5rem;"></i>
                        <div style="font-weight:bold; margin-top:5px;">${i.title}</div>
                        <div class="price-label">${i.price} Pi</div>
                    </div>
                `).join('');
            } else {
                div.innerHTML = "<p style='grid-column:span 2; text-align:center;'>لا يوجد خدمات معروضة حالياً</p>";
            }
        }

        async function startPay(amt, tit) {
            if(!window.currentUser) return msg("يجب التحقق أولاً بالضغط على الزر الأخضر");
            msg("جاري فتح المحفظة...");
            try {
                await window.Pi.createPayment({ amount: amt, memo: "شراء: " + tit, metadata: {n: tit} }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {method:'POST', body: JSON.stringify({paymentId:id, action:'approve'})}),
                    onReadyForServerCompletion: (id, tx) => {
                        payInfo = { t: tit, p: amt, tx: tx };
                        document.getElementById('orderModal').style.display = 'flex';
                    }
                });
            } catch (e) { msg("خطأ في الاتصال بالمحفظة"); }
        }

        async function confirmOrder() {
            const m = document.getElementById('uMail').value;
            const n = document.getElementById('uNotes').value;
            if(!m || !n) return msg("أكمل البيانات");
            
            await _sb.from('services').insert([{ 
                title: payInfo.t, price: String(payInfo.p), contact_info: m, description: n, user_pi: window.currentUser, txid: payInfo.tx 
            }]);
            
            msg("تم إرسال طلبك بنجاح!");
            document.getElementById('orderModal').style.display = 'none';
        }

        async function publishItem() {
            const t = document.getElementById('gTitle').value;
            const p = document.getElementById('gPrice').value;
            if(!t || !p || !window.currentUser) return msg("أكمل البيانات وتحقق من هويتك");
            await _sb.from('market_gigs').insert([{ title: t, price: p, seller_name: window.currentUser }]);
            msg("تم النشر بنجاح!");
            show('market');
            loadItems();
        }

        window.onload = loadItems;
    </script>
</body>
</html>
