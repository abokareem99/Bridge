<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* واجهة abokareem الاحترافية */
        .hero { padding: 50px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); margin-bottom: 10px; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .categories { padding: 25px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { background: var(--w); padding: 20px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-size: 1.5rem; margin-bottom: 10px; }
        .cat-card span { font-weight: bold; color: var(--pi-d); }
        .cat-card small { background: #eee; padding: 2px 8px; border-radius: 5px; margin-top: 5px; font-size: 0.8rem; }

        /* نافذة الطلب */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; }
        textarea, input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .btn-submit { width: 100%; background: var(--pi-p); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: bold; }

        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; display: none; z-index: 5000; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <p style="margin-bottom: 15px;">مرحباً بك في منصة abokareem 🌐</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة')"><i class="fas fa-code"></i><span>البرمجة</span><small>1.0 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.8, 'التصميم')"><i class="fas fa-palette"></i><span>التصميم</span><small>0.8 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.7, 'التسويق')"><i class="fas fa-bullhorn"></i><span>التسويق</span><small>0.7 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.5, 'الترجمة')"><i class="fas fa-pen-nib"></i><span>الترجمة</span><small>0.5 Pi</small></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align: center; color: var(--pi-d);">📦 مطلوبات التنفيذ</h2>
            <textarea id="orderDetail" rows="4" placeholder="تفاصيل الخدمة المطلوبة..."></textarea>
            <input type="text" id="contactInfo" placeholder="رقم الواتساب">
            <button class="btn-submit" onclick="sendOrder()">إرسال الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SERVICE_ID = "service_6ooge2n";
        const TEMPLATE_ID = "template_m6rq1ab";
        const PUBLIC_KEY = "S0iO-6kI4r2uG_rXn";

        emailjs.init(PUBLIC_KEY);
        let currentTxId = "";

        function showMsg(m) { 
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display='none', 4000); 
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                document.getElementById('authBtn').innerText = "تم التوثيق: " + auth.user.username;
            } catch (e) { showMsg("يجب الفتح من Pi Browser"); }
        }

        async function processPayment(amt, name) {
            try {
                showMsg("فتح المحفظة...");
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: "خدمة: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: async (id) => {
                        // تعديل: تأكد من أن السيرفر يستجيب بسرعة لتجنب "انتهاء الصلاحية"
                        const res = await fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                        return res.json();
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        const res = await fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                        });
                        return res.json();
                    },
                    onError: (e) => { showMsg("فشل الدفع: انتهت المهلة"); console.error(e); }
                });
            } catch (e) { showMsg("سجل الدخول أولاً"); }
        }

        function sendOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("أكمل البيانات");

            showMsg("جاري الإرسال...");
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                username: window.Pi.currentUser?.username || "Pioneer",
                service_detail: detail,
                contact_info: contact,
                txid: currentTxId
            }).then(() => {
                document.getElementById('modalContent').innerHTML = `<h3 style="text-align:center">✅ تم إرسال طلبك بنجاح!</h3><button class="btn-submit" onclick="location.reload()">رجوع</button>`;
            });
        }
    </script>
</body>
</html>
