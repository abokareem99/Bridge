<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Professional Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: radial-gradient(circle at top, #4a148c, #2d0a4e); min-height: 100vh; color: var(--white); padding-bottom: 100px; overflow-x: hidden; }

        /* Header & Hero */
        .hero { padding: 25px 15px; text-align: center; }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3); letter-spacing: 1px; }
        .welcome-msg { font-size: 0.75rem; background: var(--glass); padding: 6px 16px; border-radius: 50px; margin-top: 8px; display: inline-block; border: 1px solid rgba(255,183,77,0.2); color: #FFFF00; font-weight: bold; }
        
        /* Actions */
        .auth-actions { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .btn-auth { background: #8A2BE2; color: white; border: none; padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .btn-free-post { background: var(--glass); color: var(--pi-g); border: 1px solid var(--pi-g); padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }

        /* Services Grid */
        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; position: relative; z-index: 10; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-card:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 1.2rem; margin: 0 auto 12px; }
        .cat-card span { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 8px; color: #fff; }
        .price-badge { font-size: 0.8rem; color: var(--pi-g); font-weight: 800; border: 1px solid var(--pi-g); padding: 3px 12px; border-radius: 10px; background: rgba(255,183,77,0.05); }

        /* Activity Section */
        .orders-section { padding: 15px; max-width: 500px; margin: 20px auto; background: rgba(0,0,0,0.25); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        #ordersList { max-height: 150px; overflow-y: auto; }
        .order-item { background: var(--glass); padding: 10px 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--pi-g); }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid var(--glass); z-index: 9999; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--pi-g); opacity: 1; transform: translateY(-3px); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px); padding: 20px; }
        .modal-content { background: var(--white); width: 100%; max-width: 350px; padding: 35px 25px; border-radius: 30px; color: var(--pi-d); text-align: center; animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Success Modal Specifics */
        .success-icon { width: 85px; height: 85px; background: #2ecc71; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; margin: 0 auto 20px; box-shadow: 0 10px 25px rgba(46, 204, 113, 0.4); }
        .btn-modal-primary { background: #6a1b9a; color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        
        /* Utils */
        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10001; font-weight: 800; }
        footer { text-align: center; padding: 20px 0; margin-top: 10px; opacity: 0.6; font-size: 0.7rem; }
        .policy-links { margin-bottom: 10px; display: flex; justify-content: center; gap: 25px; }
        .policy-links a { color: var(--pi-g); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Premium Freelance Gateway 🌐</div>
            <div class="auth-actions">
                <button id="authBtn" class="btn-auth" onclick="startApp()">
                    <i class="fab fa-ethereum"></i> Pi Login
                </button>
                <button class="btn-free-post" onclick="openFreeModal()">
                    <i class="fas fa-plus-circle"></i> Free Listing
                </button>
            </div>
        </section>

        <section class="categories" id="servicesContainer"></section>

        <section class="orders-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size: 0.9rem;">
                <span style="color:var(--pi-g); font-weight:bold;"><i class="fas fa-bolt"></i> Recent Activity</span>
                <i class="fas fa-shield-alt" style="opacity:0.3; cursor:pointer;" onclick="openAdmin()"></i>
            </div>
            <div id="ordersList"></div>
        </section>

        <footer>
            <div class="policy-links">
                <a href="privacy.html">Privacy Policy</a>
                <a href="terms.html">Terms of Use</a>
            </div>
            <p>&copy; 2026 Bridge Freelance • Professional Network</p>
        </footer>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="font-size: 1.7rem; margin-bottom: 10px; color: #2d0a4e;">Order Received!</h2>
            <p style="color: #666; line-height: 1.6; margin-bottom: 25px;">Thank you for choosing <b>Bridge Freelance</b>. We will contact you via email shortly.</p>
            <button class="btn-modal-primary" onclick="closeModal('successModal')">Back to Home</button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content" style="text-align: left;">
            <h3 style="text-align:center; margin-bottom: 15px;">Finalize Your Order</h3>
            <label style="font-size: 0.8rem; color: #999;">Describe your requirements:</label>
            <textarea id="orderDetail" rows="4" style="width:100%; padding:12px; border-radius:12px; border: 1px solid #ddd; margin: 5px 0 15px; outline: none;"></textarea>
            <label style="font-size: 0.8rem; color: #999;">Telegram or Email:</label>
            <input type="text" id="contactInfo" style="width:100%; padding:12px; border-radius:12px; border: 1px solid #ddd; margin-top: 5px; outline: none;">
            <button onclick="submitOrder()" style="width:100%; padding:15px; background:var(--pi-g); border:none; border-radius:15px; font-weight:bold; color:var(--pi-d); margin-top: 20px;">Submit Request</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="homeNav" onclick="showTab('home')"><i class="fas fa-grid-2"></i><i class="fas fa-th-large"></i></div>
        <div class="nav-item" id="profileNav" onclick="showTab('profile')"><i class="fas fa-user-circle"></i></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Admin Access</h3>
            <input type="password" id="adminPass" placeholder="Enter Code" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd;">
            <button onclick="checkAdmin()" style="width:100%; padding:12px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:10px;">Login Admin</button>
            <div id="adminTools" style="display:none; margin-top:20px;">
                <input type="text" id="newSTitle" placeholder="Service Name" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="number" id="newSPrice" placeholder="Price in Pi" style="width:100%; padding:10px; margin-bottom:10px;">
                <button onclick="addService()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:10px;">Add Service</button>
                <button onclick="closeModal('adminModal')" style="width:100%; padding:10px; margin-top:10px; background:#eee; border:none; border-radius:10px;">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        // UI Handlers
        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }

        // Load Services (Fixed Case Sensitivity)
        async function loadServices() {
            const { data, error } = await _supabase.from('services')
                .select('*')
                .or('category.eq.Service,category.eq.service');
            
            const container = document.getElementById('servicesContainer');
            if(data && data.length > 0) {
                container.innerHTML = data.map(s => {
                    let t = s.title.toLowerCase();
                    let icon = t.includes('des') ? 'fa-palette' : t.includes('prog') ? 'fa-code' : 'fa-lightbulb';
                    return `
                        <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                            <i class="fas ${icon}"></i>
                            <span>${s.title}</span>
                            <span class="price-badge">${s.price} Pi</span>
                        </div>`;
                }).join('');
            } else {
                container.innerHTML = "<p style='grid-column: 1/3; opacity:0.5; padding:20px;'>No services found.</p>";
            }
        }

        // Pi Auth
        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-user-check"></i> ${auth.user.username}`;
                loadServices(); loadOrders();
            } catch (e) { showMsg("Pi Connection Failed"); }
        }

        // Payment Logic
        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Please login via Pi Network first");
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("Opening Pi Wallet...");
                await window.Pi.createPayment({ amount: amt, memo: `Bridge Freelance: ${name}`, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({ paymentId: id, action: 'approve' }) }),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: () => showMsg("Payment Failed"),
                    onCancel: () => showMsg("Payment Cancelled")
                });
            } catch (e) { showMsg("Payment Interface Error"); }
        }

        // Submit Order (Fixed & Professional)
        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            if(!d || !c) return showMsg("Please fill in all details");

            try {
                // Save to DB
                await _supabase.from('services').insert([{ 
                    title: currentCategory, description: d, price: String(currentPrice), 
                    category: 'Order', contact_info: c, user_pi: window.currentUser, 
                    txid: currentTxId, status: 'order' 
                }]);

                // Send Alert
                emailjs.send("service_vuti648", "template_m6rq1ab", { 
                    username: window.currentUser, service_detail: d, contact_info: c, 
                    order_id: currentTxId, price: currentPrice 
                });

                document.getElementById('reqModal').style.display = 'none';
                document.getElementById('successModal').style.display = 'flex'; // Show Success Modal
                loadOrders();
            } catch (e) { showMsg("Error processing order"); }
        }

        // Admin Tools
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminTools').style.display = 'block';
            } else { showMsg("Invalid Code"); }
        }

        async function addService() {
            const t = document.getElementById('newSTitle').value;
            const p = document.getElementById('newSPrice').value;
            if(!t || !p) return;
            await _supabase.from('services').insert([{ title: t, price: p, category: 'Service', status: 'active' }]);
            showMsg("Added Successfully!");
            loadServices();
        }

        async function loadOrders() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Order').order('id', { ascending: false }).limit(5);
            if(data) {
                document.getElementById('ordersList').innerHTML = data.map(o => `
                    <div class="order-item">
                        <div><b>${o.title}</b><br><small style="opacity:0.6">User: ${o.user_pi}</small></div>
                        <b style="color:var(--pi-g)">${o.price} Pi</b>
                    </div>`).join('');
            }
        }

        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
