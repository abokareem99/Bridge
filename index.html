<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: radial-gradient(circle at top, #4a148c, #2d0a4e); min-height: 100vh; color: var(--white); padding-bottom: 100px; overflow-x: hidden; }

        /* Header & Hero */
        .hero { padding: 25px 15px; text-align: center; }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); font-weight: 900; letter-spacing: 1px; }
        .welcome-msg { font-size: 0.75rem; background: var(--glass); padding: 6px 16px; border-radius: 50px; margin-top: 10px; display: inline-block; border: 1px solid rgba(255,183,77,0.3); color: #f1c40f; }

        /* Buttons */
        .auth-actions { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .btn-auth { background: #8e44ad; color: white; border: none; padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-free-post { background: var(--glass); color: var(--pi-g); border: 1px solid var(--pi-g); padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }

        /* Grid Services */
        .categories { padding: 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-card:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 1.3rem; margin: 0 auto 12px; }
        .cat-card span { font-weight: 700; font-size: 0.95rem; display: block; margin-bottom: 8px; }
        .price-badge { font-size: 0.8rem; color: var(--pi-g); font-weight: 800; border: 1px solid var(--pi-g); padding: 3px 12px; border-radius: 10px; background: rgba(255,183,77,0.1); }

        /* Global Activity */
        .orders-section { padding: 15px; max-width: 500px; margin: 15px auto; background: rgba(0,0,0,0.25); border-radius: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .section-header { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 0 5px; }
        .order-item { background: var(--glass); padding: 12px 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--pi-g); }
        .order-info b { font-size: 0.9rem; color: var(--white); }
        .order-info small { color: #bdc3c7; display: block; margin-top: 2px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid var(--glass); z-index: 1000; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--pi-g); opacity: 1; transform: translateY(-3px); }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: var(--white); width: 90%; max-width: 380px; padding: 30px; border-radius: 28px; color: #333; position: relative; }
        .success-icon { font-size: 65px; color: #2ecc71; margin-bottom: 15px; text-align: center; }
        
        input, textarea { width: 100%; margin-top: 12px; padding: 14px; border-radius: 14px; border: 1px solid #eee; background: #f9f9f9; font-size: 0.9rem; outline: none; }
        .btn-primary { width: 100%; margin-top: 20px; padding: 16px; background: var(--pi-d); color: var(--pi-g); border: none; border-radius: 15px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 30px; border-radius: 50px; display: none; z-index: 10001; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <header class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Premium Service Marketplace 🌐</div>
            <div class="auth-actions">
                <button id="authBtn" class="btn-auth" onclick="startApp()">
                    <i class="fas fa-wallet"></i> Pi Login
                </button>
                <button class="btn-free-post" onclick="openModal('freeModal')">
                    <i class="fas fa-plus-circle"></i> Free Post
                </button>
            </div>
        </header>

        <section class="categories" id="servicesContainer">
            </section>

        <section class="orders-section">
            <div class="section-header">
                <span style="color:var(--pi-g); font-weight:bold;"><i class="fas fa-bolt"></i> Global Activity</span>
                <i class="fas fa-cog" style="opacity:0.5; cursor:pointer;" onclick="openModal('adminModal')"></i>
            </div>
            <div id="ordersList">
                </div>
        </section>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <div class="success-icon"><i class="fas fa-check-circle"></i></div>
            <h2 style="color: #2d0a4e; margin-bottom: 12px;">Order Received!</h2>
            <p style="color: #777; font-size: 0.95rem; line-height: 1.6; margin-bottom: 25px;">
                Thank you for choosing <b>Bridge Freelance</b>.<br>
                The service is now live on the platform.
            </p>
            <button onclick="refreshAndClose()" style="width: 100%; padding: 16px; background: #4a148c; border: none; border-radius: 15px; font-weight: bold; color: white; font-size: 1rem;">
                Back to Home
            </button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#2d0a4e;">Complete Your Post</h3>
            <textarea id="orderDetail" rows="4" placeholder="Describe what you offer..."></textarea>
            <input type="text" id="contactInfo" placeholder="Your WhatsApp or Telegram">
            <button onclick="submitOrder()" class="btn-primary">Publish Service</button>
        </div>
    </div>

    <div id="freeModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#2d0a4e;">Post Free Service</h3>
            <input type="text" id="freeTitle" placeholder="Service Title (e.g. Logo Design)">
            <textarea id="freeDesc" rows="4" placeholder="Description & Contact info..."></textarea>
            <button onclick="submitFreeService()" class="btn-primary" style="background:#27ae60; color:white;">Post Now</button>
            <p onclick="closeModal('freeModal')" style="text-align:center; margin-top:15px; color:#999; cursor:pointer;">Cancel</p>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showMsg('Profile feature coming soon')"><i class="fas fa-user-circle"></i></div>
    </nav>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentPrice = 0, currentCategory = "", currentTxId = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        
        function refreshAndClose() {
            closeModal('successModal');
            loadData();
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-check-circle"></i> ${auth.user.username}`;
                showMsg("Authenticated!");
            } catch (e) { showMsg("Pi Network error"); }
        }

        async function loadData() {
            // Load Categories
            const { data: services } = await _supabase.from('services').select('*').eq('category', 'Service').order('id', { ascending: false });
            if(services) {
                document.getElementById('servicesContainer').innerHTML = services.map(s => `
                    <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                        <i class="fas ${s.title.toLowerCase().includes('prog') ? 'fa-code' : 'fa-paint-brush'}"></i>
                        <span>${s.title}</span>
                        <span class="price-badge">${s.price} Pi</span>
                    </div>
                `).join('');
            }

            // Load Global Activity
            const { data: activity } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(6);
            if(activity) {
                document.getElementById('ordersList').innerHTML = activity.map(o => `
                    <div class="order-item">
                        <div class="order-info">
                            <b>${o.title}</b>
                            <small>by ${o.user_pi || 'Anonymous'}</small>
                        </div>
                        <b style="color:var(--pi-g)">${o.price} Pi</b>
                    </div>
                `).join('');
            }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Please login first");
            currentPrice = amt; currentCategory = name;
            try {
                await window.Pi.createPayment({ amount: amt, memo: "Post: " + name, metadata: { name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/approve', {method:'POST', body: JSON.stringify({id})}),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => {
                        document.getElementById('reqModal').style.display='flex';
                    },
                    onError: (e) => showMsg("Payment Failed")
                });
            } catch(e) { showMsg("Payment Error"); }
        }

        async function submitOrder() {
            const desc = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!desc || !contact) return showMsg("Missing fields");

            await _supabase.from('services').insert([{
                title: currentCategory, description: desc, price: String(currentPrice),
                category: 'Service', status: 'active', user_pi: window.currentUser, contact_info: contact
            }]);

            closeModal('reqModal');
            openModal('successModal');
        }

        async function submitFreeService() {
            const title = document.getElementById('freeTitle').value;
            const desc = document.getElementById('freeDesc').value;
            if(!title || !desc || !window.currentUser) return showMsg("Incomplete details");

            await _supabase.from('services').insert([{
                title: title, description: desc, price: "0",
                category: 'Service', status: 'active', user_pi: window.currentUser
            }]);

            closeModal('freeModal');
            openModal('successModal');
        }

        window.onload = loadData;
    </script>
</body>
</html>
