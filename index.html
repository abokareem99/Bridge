<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #FFD700; --w: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }

        /* الهيدر المحسن */
        .hero {
            padding: 35px 20px;
            background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            text-align: center; color: var(--w);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 5px; font-weight: 800; }
        .welcome-msg { font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,215,0,0.3); }

        .btn-auth {
            background: var(--pi-g); color: var(--pi-d); border: none;
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* شبكة الأيقونات المتناسقة */
        .categories { 
            padding: 25px 15px; 
            max-width: 500px; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* جعلها في صفين لملء الفراغ */
            gap: 15px;
            width: 100%;
        }
        
        .cat-card {
            background: var(--w); padding: 20px 10px;
            border-radius: 20px; text-align: center; cursor: pointer;
            border: 1px solid rgba(106, 27, 154, 0.1);
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cat-card:active { transform: scale(0.95); }
        
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); 
            width: 50px; height: 50px; display: flex; 
            align-items: center; justify-content: center; 
            border-radius: 15px; font-size: 1.5rem; margin-bottom: 10px;
        }
        .cat-card span { font-weight: 700; color: var(--pi-d); font-size: 0.9rem; margin-bottom: 5px; }
        .price-badge { font-size: 0.8rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 2px 8px; border-radius: 5px; }

        /* تذييل الصفحة للمساحات القانونية */
        footer { margin-top: auto; padding: 20px; text-align: center; font-size: 0.8rem; color: #777; }
        footer a { color: var(--pi-p); text-decoration: none; margin: 0 10px; font-weight: bold; }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 25px; border-radius: 30px; 
            display: none; z-index: 3000; font-size: 0.85rem; border: 1px solid var(--pi-g);
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <p style="font-size: 0.85rem; margin-bottom: 20px; opacity: 0.9;">أنجز مهامك المهنية بضغطة زر</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">توثيق الحساب للدفع</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة والتطوير')">
            <i class="fas fa-code"></i>
            <span>البرمجة</span>
            <span class="price-badge">1.0 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.8, 'التصميم الجرافيكي')">
            <i class="fas fa-palette"></i>
            <span>التصميم</span>
            <span class="price-badge">0.8 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.5, 'الكتابة والترجمة')">
            <i class="fas fa-pen-nib"></i>
            <span>الترجمة</span>
            <span class="price-badge">0.5 Pi</span>
        </div>

        <div class="cat-card" onclick="processPayment(0.7, 'التسويق الرقمي')">
            <i class="fas fa-bullhorn"></i>
            <span>التسويق</span>
            <span class="price-badge">0.7 Pi</span>
        </div>
    </section>

    <footer>
        <div style="margin-bottom: 10px;">
            <a href="terms.html">شروط الاستخدام</a> | <a href="privacy.html">سياسة الخصوصية</a>
        </div>
        <p>&copy; 2026 Bridge Freelance - Powered by Pi Network</p>
    </footer>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 4000); }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك " + auth.user.username);
                document.getElementById('authBtn').innerText = "الحساب موثق ✅";
            } catch (e) { showMsg("فشل التوثيق"); }
        }

        async function processPayment(amt, name) {
            try {
                showMsg(`جاري بدء دفع ${amt} Pi لخدمة ${name}...`);
                await window.Pi.createPayment({
                    amount: amt,
                    memo: "طلب خدمة: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    }),
                    onConnectedToBlockchain: (id, tx) => showMsg("تم الدفع بنجاح!"),
                    onReadyForServerCompletion: (id, tx) => fetch('/api/payment-handler', {
                        method: 'POST',
                        body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                    }),
                    onCancel: () => showMsg("تم إلغاء العملية"),
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { showMsg("حدث خطأ تقني"); }
        }
    </script>
</body>
</html>
