<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - نسخة المطور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        
        .hero { padding: 30px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 10px; font-weight: 800; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .categories { padding: 20px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { background: var(--w); padding: 15px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 8px rgba(0,0,0,0.03); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; border-radius: 12px; margin-bottom: 8px; }
        .price-badge { font-size: 0.75rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 2px 8px; border-radius: 5px; }

        .orders-section { padding: 10px 20px 30px; max-width: 500px; margin: 0 auto; width: 100%; }
        .section-header { font-size: 0.95rem; color: var(--pi-d); font-weight: bold; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-header::after { content: ""; flex-grow: 1; height: 1px; background: #ddd; }
        .orders-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .order-card { background: white; padding: 10px; border-radius: 12px; border-right: 4px solid var(--pi-g); font-size: 0.75rem; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 90%; max-width: 380px; padding: 25px; border-radius: 25px; }
        #toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; display: none; z-index: 5000; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div style="margin-bottom: 15px; opacity: 0.9;">بوابتك لخدمات Pi Network</div>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <main class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>Programming</span><br><span class="price-badge">Pi 1.0</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>Design</span><br><span class="price-badge">Pi 0.8</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>Marketing</span><br><span class="price-badge">Pi 0.7</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-pen-nib"></i><span>Translation</span><br><span class="price-badge">Pi 0.5</span>
        </div>
    </main>

    <section class="orders-section">
        <div class="section-header">آخر الطلبات المنفذة</div>
        <div id="ordersContainer" class="orders-grid"></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color:var(--pi-d);">📦 تفاصيل الطلب</h2>
            <textarea id="orderDetail" rows="4" placeholder="اكتب تفاصيل طلبك هنا..." style="width:100%; padding:12px; margin-top:15px; border:1px solid #eee; border-radius:12px; text-align:right;"></textarea>
            <input type="email" id="contactInfo" placeholder="إيميلك للتواصل" style="width:100%; padding:12px; margin-top:10px; border:1px solid #eee; border-radius:12px; text-align:right;">
            <button id="submitBtn" onclick="submitOrder()" style="width:100%; background:var(--pi-p); color:white; border:none; padding:15px; border-radius:12px; margin-top:15px; font-weight:bold;">إرسال الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SB_URL = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display='none', 3000);
        }

        async function fetchLiveOrders() {
            try {
                const { data } = await _supabase.from('services').select('title, description').order('created_at', { ascending: false }).limit(4);
                if (data) {
                    document.getElementById('ordersContainer').innerHTML = data.map(o => `
                        <div class="order-card"><b>${o.title}</b><p style="color:#666; font-size:0.7rem;">${o.description.substring(0, 30)}...</p></div>
                    `).join('');
                }
            } catch (e) { console.log("Fetch error"); }
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = "مرحباً: " + window.currentUser;
                fetchLiveOrders();
            } catch (e) { showMsg("يرجى الفتح من متصفح Pi"); }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) { showMsg("سجل دخولك أولاً"); return; }
            currentPrice = amt; currentCategory = name;
            
            try {
                await window.Pi.createPayment({
                    amount: amt, memo: "Order: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: async (id) => {
                        // محاولة إرسال الموافقة لملفك المحلي
                        try {
                            await fetch('api/payment-handler', { 
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId: id, action: 'approve' }) 
                            });
                        } catch(e) { console.log("Server not found, proceeding locally..."); }
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        // محاولة إرسال الإكمال لملفك المحلي
                        try {
                            await fetch('api/payment-handler', { 
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) 
                            });
                        } catch(e) { console.log("Completion handled locally"); }
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onCancel: () => showMsg("تم الإلغاء"),
                    onError: (e) => showMsg("خطأ في العملية")
                });
            } catch (e) { showMsg("فشل الدفع"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("أكمل البيانات");

            try {
                await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact, user_pi: window.currentUser, txid: currentTxId
                }]);
                await emailjs.send("service_vuti648", "template_m6rq1ab", {
                    username: window.currentUser, service_detail: detail, contact_info: contact, order_id: currentTxId, price: currentPrice
                });
                showMsg("تم الإرسال بنجاح!");
                setTimeout(() => location.reload(), 2000);
            } catch (e) { showMsg("خطأ في الحفظ"); }
        }

        window.onload = () => { setTimeout(fetchLiveOrders, 1000); };
    </script>
</body>
</html>
