<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Hero Section */
        .hero { padding: 40px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        .welcome-msg { font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 6px 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid rgba(255,215,0,0.3); }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* Categories */
        .categories { padding: 25px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { background: var(--w); padding: 20px 10px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid rgba(106, 27, 154, 0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; font-size: 1.4rem; margin-bottom: 10px; }
        .price-badge { font-size: 0.8rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 3px 10px; border-radius: 6px; }

        /* NEW: Service Feed Section */
        .feed-section { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .feed-title { font-size: 1.1rem; color: var(--pi-d); font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .feed-container { display: flex; flex-direction: column; gap: 12px; }
        .feed-item { background: var(--w); padding: 15px; border-radius: 15px; border-right: 4px solid var(--pi-g); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .feed-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; font-weight: bold; color: var(--pi-p); }
        .feed-desc { font-size: 0.8rem; color: #555; line-height: 1.4; }
        .feed-user { font-size: 0.7rem; color: #999; margin-top: 8px; border-top: 1px solid #eee; padding-top: 5px; }

        /* Modals & UI */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 92%; max-width: 400px; padding: 25px; border-radius: 25px; text-align: right; }
        .modal-content textarea, .modal-content input { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #eee; border-radius: 12px; font-size: 0.9rem; }
        .btn-submit { width: 100%; background: var(--pi-p); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        
        .footer-container { margin-top: auto; padding: 20px; text-align: center; border-top: 1px solid #eee; background: #fff; }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 8px; }
        .footer-links a { color: var(--pi-p); text-decoration: none; font-size: 0.8rem; font-weight: 600; }
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; display: none; z-index: 5000; font-size: 0.8rem; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <p style="font-size: 0.8rem; opacity: 0.9; margin-bottom: 15px;">بوابتك لخدمات العمل الحر عبر Pi Network</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>Programming</span><span class="price-badge">Pi 1.0</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>Design</span><span class="price-badge">Pi 0.8</span>
        </div>
    </section>

    <section class="feed-section">
        <div class="feed-title"><i class="fas fa-sync-alt fa-spin"></i> Recent Services</div>
        <div id="servicesFeed" class="feed-container">
            <p style="text-align: center; font-size: 0.8rem; color: #999;">Loading latest services...</p>
        </div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2>📦 Order Details</h2>
            <textarea id="orderDetail" rows="3" placeholder="Describe the service..."></textarea>
            <input type="email" id="contactInfo" placeholder="Your Email Address">
            <button class="btn-submit" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <footer class="footer-container">
        <div class="footer-links">
            <a href="#"><i class="fas fa-shield-alt"></i> سياسة الخصوصية</a>
            <a href="#"><i class="fas fa-file-contract"></i> شروط الاستخدام</a>
        </div>
        <div class="copyright" style="font-size: 0.7rem; color: #aaa;">© Bridge Freelance 2026</div>
    </footer>

    <div id="toast"></div>

    <script>
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 3000); }

        // NEW: Function to load services from Supabase
        async function loadFeed() {
            try {
                const { data, error } = await _supabase
                    .from('services')
                    .select('title, description, price, user_pi')
                    .order('created_at', { ascending: false })
                    .limit(5);

                if (error) throw error;

                const feedDiv = document.getElementById('servicesFeed');
                if (data.length === 0) {
                    feedDiv.innerHTML = '<p style="text-align: center; font-size: 0.8rem;">No services yet.</p>';
                    return;
                }

                feedDiv.innerHTML = data.map(item => `
                    <div class="feed-item">
                        <div class="feed-header">
                            <span>${item.title}</span>
                            <span style="color: #e65100;">${item.price} Pi</span>
                        </div>
                        <div class="feed-desc">${item.description.substring(0, 80)}...</div>
                        <div class="feed-user"><i class="fas fa-user-circle"></i> Ordered by: ${item.user_pi}</div>
                    </div>
                `).join('');
            } catch (e) { console.error("Feed Error:", e); }
        }

        // Load feed on page start
        window.onload = loadFeed;

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = "Verified: " + auth.user.username;
                document.getElementById('authBtn').style.background = "#2ecc71";
            } catch (e) { showMsg("Auth Error"); }
        }

        async function processPayment(amt, name) {
            currentPrice = amt; currentCategory = name;
            try {
                await window.Pi.createPayment({
                    amount: amt, memo: "Service: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({ paymentId: id, action: 'approve' }) }),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => { 
                        document.getElementById('reqModal').style.display = 'flex';
                        fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                    },
                    onError: (e) => showMsg("Payment Failed")
                });
            } catch (e) { showMsg("Error"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return showMsg("Fill all fields");

            try {
                const { error } = await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact, user_pi: window.currentUser || "User", txid: currentTxId
                }]);
                if (error) throw error;
                
                showMsg("Order Published!");
                loadFeed(); // Refresh the feed immediately
                document.getElementById('modalContent').innerHTML = "<h2>✅ Done!</h2><p>Your service is now live.</p><button class='btn-submit' onclick='location.reload()'>Close</button>";
            } catch (e) { showMsg("Save Error"); }
        }
    </script>
</body>
</html>
