<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* التزام تام بتصميمك الأبيض الأصلي */
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; margin: 0; }
        .container { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 5px; color: #000; }
        p { color: #666; margin-bottom: 25px; }

        /* تنسيق الأيقونات كأزرار قابلة للضغط (إضافة فقط) */
        .service-btn {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 20px; margin-bottom: 12px; border: 1px solid #eee;
            border-radius: 10px; text-decoration: none; color: #333;
            transition: background 0.2s;
        }
        .service-btn:hover { background-color: #fafafa; border-color: #d4af37; }
        .service-btn i { color: #d4af37; font-size: 1.3rem; } /* اللون الذهبي للأيقونة */

        /* زر الدفع البنفسجي الخاص بك */
        .pay-button { 
            background-color: #4a148c; color: white; border: none; padding: 18px; 
            border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 15px; 
        }
        
        /* نافذة النجاح المخفية */
        #success-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; width: 80%;
        }
        .check-icon { color: #28a745; font-size: 4rem; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>جسر العمل الحر</h1>
        <p>مرحباً بك في تطبيق Bridge Freelance</p>

        <a href="services.html" class="service-btn">
            <i class="fas fa-code"></i>
            <span>تطوير البرمجيات</span>
        </a>

        <a href="services.html" class="service-btn">
            <i class="fas fa-language"></i>
            <span>الترجمة واللغات</span>
        </a>

        <button class="pay-button" onclick="startPayment()">تجربة دفع Pi 0.1</button>
    </div>

    <div id="success-modal">
        <i class="fas fa-check-circle check-icon"></i>
        <h2>تمت العملية بنجاح</h2>
        <button onclick="document.getElementById('success-modal').style.display='none'" style="border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">إغلاق</button>
    </div>

    <script>
        const Pi = window.Pi; Pi.init({ version: "2.0" });
        async function startPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1, memo: "تجربة دفع جسر التواصل", metadata: { type: "test" }
                }, {
                    onReadyForServerNotification: (id) => {
                        fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' }),
                        });
                    },
                    onComplete: (id, txid) => {
                        // إظهار علامة الصح الأخضر عند اكتمال الدفع
                        document.getElementById('success-modal').style.display = 'block';
                        fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, txid: txid, action: 'complete' }),
                        });
                    },
                    onCancelled: () => {}, onIncomplete: () => {}
                });
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
