<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .hero { padding: 40px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .hero-title { font-size: 2.2rem; color: var(--pi-g); margin-bottom: 8px; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .categories { padding: 25px 15px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .cat-card { background: var(--w); padding: 20px 10px; border-radius: 20px; text-align: center; cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 18px; font-size: 1.6rem; margin-bottom: 12px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 92%; max-width: 400px; padding: 30px 20px; border-radius: 25px; text-align: right; }
        .btn-submit { width: 100%; background: var(--pi-p); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 20px; font-weight: bold; }
        #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 25px; border-radius: 30px; display: none; z-index: 5000; font-size: 0.85rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <p style="margin-bottom: 15px;">مرحباً بك في منصة abokareem 🌐</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة')"><i class="fas fa-code"></i><span>البرمجة</span><small>Pi 1.0</small></div>
        <div class="cat-card" onclick="processPayment(0.8, 'التصميم')"><i class="fas fa-palette"></i><span>التصميم</span><small>Pi 0.8</small></div>
        <div class="cat-card" onclick="processPayment(0.7, 'التسويق')"><i class="fas fa-bullhorn"></i><span>التسويق</span><small>Pi 0.7</small></div>
        <div class="cat-card" onclick="processPayment(0.5, 'الترجمة')"><i class="fas fa-pen-nib"></i><span>الترجمة</span><small>Pi 0.5</small></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align: center; color: var(--pi-d);">📦 مطلوبات التنفيذ</h2>
            <textarea id="orderDetail" style="width:100%; padding:10px; margin-top:10px; border-radius:10px;" rows="4" placeholder="ما هي الخدمة التي تحتاجها؟"></textarea>
            <input type="text" id="contactInfo" style="width:100%; padding:10px; margin-top:10px; border-radius:10px;" placeholder="رقم واتساب للتواصل">
            <button class="btn-submit" onclick="sendOrderToEmail()">إرسال بيانات الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- البيانات المستخرجة من حسابك ---
        const SERVICE_ID = "service_6ooge2n";
        const TEMPLATE_ID = "template_m6rq1ab";
        const PUBLIC_KEY = "S0iO-6kI4r2uG_rXn"; // هذا هو المفتاح العام الخاص بك

        emailjs.init(PUBLIC_KEY);
        let currentTxId = "";

        function showMsg(m) { 
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display='none', 4000); 
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك " + auth.user.username);
                document.getElementById('authBtn').innerText = "الحساب موثق ✅";
            } catch (e) { showMsg("حدث خطأ في التوثيق"); }
        }

        async function processPayment(amt, name) {
            try {
                showMsg(`جاري معالجة دفع ${amt} Pi...`);
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: "شراء خدمة: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => {
                        return fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            body: JSON.stringify({ paymentId: id, action: 'approve' })
                        });
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        return fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                        });
                    },
                    onError: (e) => { showMsg("حدث خطأ تقني في الدفع"); console.error(e); }
                });
            } catch (e) { showMsg("تعذر بدء الدفع"); }
        }

        function sendOrderToEmail() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            
            if(!detail || !contact) { showMsg("يرجى إكمال البيانات"); return; }

            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                username: window.Pi.currentUser?.username || "Pioneer",
                service_detail: detail,
                contact_info: contact,
                txid: currentTxId
            }).then(() => {
                document.getElementById('modalContent').innerHTML = `
                    <div style="text-align: center;">
                        <i class="fas fa-check-circle" style="font-size: 3.5rem; color: #2ecc71;"></i>
                        <h2>تم الإرسال بنجاح!</h2>
                        <button class="btn-submit" onclick="location.reload()">إغلاق</button>
                    </div>`;
            });
        }
    </script>
</body>
</html>
