<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Icon Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">(function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: radial-gradient(circle at top, #4a148c, #2d0a4e); 
            min-height: 100vh; color: var(--white); 
            padding-bottom: 110px; 
            overflow-x: hidden;
        }

        /* Hero & Auth */
        .hero { padding: 15px 10px; text-align: center; }
        .hero-title { font-size: 1.5rem; color: var(--pi-g); font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .auth-container { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        
        .btn-main { border: none; padding: 10px 18px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-auth { background: linear-gradient(45deg, var(--pi-g), #ffa726); color: var(--pi-d); }
        .btn-free { background: var(--glass); color: var(--pi-g); border: 1px solid var(--pi-g); }

        /* Services Grid - Fixed Icons Logic */
        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: relative; z-index: 100; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px 5px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .cat-card:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }
        
        /* الأيقونات الملونة */
        .cat-card i { 
            color: var(--pi-d); background: var(--pi-g); 
            width: 42px; height: 42px; display: flex; 
            align-items: center; justify-content: center; 
            border-radius: 14px; font-size: 1.2rem; margin: 0 auto 10px; 
        }
        
        .price-badge { font-size: 0.75rem; color: var(--pi-g); font-weight: 800; border: 1px solid var(--pi-g); padding: 2px 10px; border-radius: 8px; }

        /* Orders */
        .orders-section { padding: 12px; max-width: 500px; margin: 10px auto; background: rgba(0,0,0,0.2); border-radius: 22px; }
        #ordersList { max-height: 130px; overflow-y: auto; }
        .order-item { background: var(--glass); padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--pi-g); }
        .free-tag { background: #27ae60; color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 12px 0 28px; border-top: 1px solid var(--glass); z-index: 9999; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--pi-g); opacity: 1; transform: translateY(-3px); }

        /* Modals & Profile */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--white); width: 88%; max-width: 360px; padding: 25px; border-radius: 24px; color: var(--pi-d); }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; border: 1px solid #ddd; }
        
        #profileSection { display: none; padding: 15px; max-width: 500px; margin: 0 auto; }
        .profile-card { background: var(--glass); border-radius: 22px; padding: 20px; text-align: center; border: 1px solid rgba(255,183,77,0.2); }
        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10001; font-weight: 800; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="auth-container">
                <button id="authBtn" class="btn-main btn-auth" onclick="startApp()">
                    <i class="fas fa-wallet"></i> Login Pi
                </button>
                <button class="btn-main btn-free" onclick="openFreeModal()">
                    <i class="fas fa-paper-plane"></i> خدمة مجانية
                </button>
            </div>
        </section>

        <section class="categories" id="servicesContainer"></section>

        <section class="orders-section">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size: 0.85rem;">
                <span style="color:var(--pi-g); font-weight:bold;"><i class="fas fa-globe-ame"></i> نشاط المجتمع</span>
                <i class="fas fa-user-shield" style="opacity:0.3" onclick="openAdmin()"></i>
            </div>
            <div id="ordersList"></div>
        </section>

        <footer style="text-align:center; padding:15px; font-size:0.65rem; opacity:0.4;">
            <div style="margin-bottom:5px;">
                <a onclick="alert('Privacy Policy Enabled')" style="color:var(--pi-g); text-decoration:underline;">Privacy</a> | 
                <a onclick="alert('Terms of Use Enabled')" style="color:var(--pi-g); text-decoration:underline;">Terms</a>
            </div>
            <p>&copy; 2026 Bridge Freelance By Abokareem</p>
        </footer>
    </div>

    <section id="profileSection">
        <div class="profile-card">
            <div style="width:75px; height:75px; background:var(--pi-g); color:var(--pi-d); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; margin:0 auto 12px; font-weight:bold; border:4px solid rgba(255,255,255,0.1);" id="userInitial">?</div>
            <h2 id="profileName" style="color: var(--pi-g); font-size: 1.4rem;">Guest</h2>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:15px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                <div><b id="totalOrders" style="color:var(--pi-g); font-size:1.2rem;">0</b><p style="font-size:0.7rem; opacity:0.7;">Orders</p></div>
                <div><b id="totalSpent" style="color:var(--pi-g); font-size:1.2rem;">0</b><p style="font-size:0.7rem; opacity:0.7;">Pi Spent</p></div>
            </div>
        </div>
        <h3 style="color: var(--pi-g); margin: 25px 0 10px; text-align: right; font-size:1.1rem; border-right:3px solid var(--pi-g); padding-right:10px;">سجل طلباتي</h3>
        <div id="userOrdersList"></div>
    </section>

    <div id="freeModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:10px;">انشر خدمتك مجاناً</h3>
            <input type="text" id="freeTitle" placeholder="اسم الخدمة (مثلاً: ترجمة نصوص)">
            <textarea id="freeDesc" rows="4" placeholder="اكتب تفاصيل الخدمة وطريقة التواصل معك"></textarea>
            <button onclick="submitFreeService()" style="width:100%; margin-top:15px; padding:15px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold; font-size:1rem;">نشر في المجتمع</button>
            <button onclick="closeModal('freeModal')" style="width:100%; margin-top:10px; background:none; border:none; color:#999;">إلغاء</button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; color:#2d0a4e;">تم الدفع بنجاح! 🎉</h3>
            <p style="font-size:0.8rem; text-align:center; color:#666; margin-bottom:10px;">يرجى كتابة تفاصيل طلبك لرفعها للمدير</p>
            <textarea id="orderDetail" rows="4" placeholder="اكتب تفاصيل طلبك بدقة..."></textarea>
            <input type="text" id="contactInfo" placeholder="رقم الواتساب أو حساب التليجرام">
            <button onclick="submitOrder()" style="width:100%; margin-top:15px; padding:15px; background:var(--pi-g); color:var(--pi-d); border:none; border-radius:12px; font-weight:bold;">إرسال الطلب الآن</button>
        </div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h4 style="text-align:center; border-bottom:1px solid #eee; padding-bottom:10px;">Admin Panel</h4>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="كود الإدارة">
                <button onclick="checkAdmin()" style="width:100%; padding:12px; margin-top:15px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:12px; font-weight:bold;">دخول</button>
            </div>
            <div id="adminTools" style="display:none">
                <input type="text" id="newSTitle" placeholder="اسم الخدمة الجديدة">
                <input type="number" id="newSPrice" placeholder="السعر بـ Pi">
                <button onclick="addService()" style="width:100%; margin-top:10px; padding:12px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold;">إضافة الخدمة</button>
                <div id="adminServiceList" style="margin-top:15px; max-height:120px; overflow-y:auto; border-top:1px solid #eee; padding-top:10px;"></div>
                <button onclick="closeModal('adminModal')" style="width:100%; margin-top:15px; background:#f5f5f5; border:none; border-radius:12px;">خروج</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="homeNav" onclick="showTab('home')"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" id="profileNav" onclick="showTab('profile')"><i class="fas fa-user-circle"></i></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGBoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3500); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openFreeModal() { if(!window.currentUser) return showMsg("Login Pi first"); document.getElementById('freeModal').style.display='flex'; }

        // وظيفة تحديد الأيقونة بناءً على اسم الخدمة
        function getIcon(title) {
            let t = title.toLowerCase();
            if(t.includes('تصميم') || t.includes('design')) return 'fa-palette';
            if(t.includes('برمج') || t.includes('prog')) return 'fa-code';
            if(t.includes('ترجم') || t.includes('trans')) return 'fa-language';
            if(t.includes('سوق') || t.includes('market')) return 'fa-bullhorn';
            if(t.includes('فيديو') || t.includes('video')) return 'fa-video';
            return 'fa-rocket'; // أيقونة افتراضية
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "<i class='fas fa-user-check'></i> " + auth.user.username;
                document.getElementById('authBtn').style.background = "#27ae60";
                loadServices(); loadOrders();
            } catch (e) { showMsg("Pi Error"); }
        }

        async function loadServices() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Service');
            if(data) {
                document.getElementById('servicesContainer').innerHTML = data.map(s => `
                    <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                        <i class="fas ${getIcon(s.title)}"></i>
                        <span>${s.title}</span>
                        <div style="margin-top:5px;"><span class="price-badge">${s.price} Pi</span></div>
                    </div>`).join('');
            }
        }

        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Login Pi first");
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("جاري الاتصال بالمحفظة...");
                await window.Pi.createPayment({ amount: amt, memo: "Service: " + name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: (e) => showMsg("Payment Failed"),
                    onCancel: () => showMsg("Payment Cancelled")
                });
            } catch (e) { showMsg("Payment Timeout Error"); }
        }

        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            if(!d || !c) return showMsg("Fill all details");
            await _supabase.from('services').insert([{ title: currentCategory, description: d, price: String(currentPrice), category: 'Order', contact_info: c, user_pi: window.currentUser, txid: currentTxId, status: 'order' }]);
            await emailjs.send("service_vuti648", "template_m6rq1ab", { username: window.currentUser, service_detail: d, contact_info: c, order_id: currentTxId, price: currentPrice });
            closeModal('reqModal'); showMsg("Order Sent!"); loadOrders();
        }

        async function submitFreeService() {
            const t = document.getElementById('freeTitle').value;
            const d = document.getElementById('freeDesc').value;
            if(!t || !d) return showMsg("Fill details");
            await _supabase.from('services').insert([{ title: t, description: d, price: "0", category: 'Order', user_pi: window.currentUser, status: 'free_service' }]);
            closeModal('freeModal'); showMsg("Published to Community!"); loadOrders();
        }

        async function loadOrders() {
            const { data } = await _supabase.from('services').select('*').eq('category', 'Order').order('id', { ascending: false }).limit(10);
            if (data) {
                document.getElementById('ordersList').innerHTML = data.map(o => `
                    <div class="order-item">
                        <div>
                            <b>${o.title}</b> ${o.price === "0" ? '<span class="free-tag">مجانية</span>' : ''}
                            <br><small style="opacity:0.6;">by ${o.user_pi}</small>
                        </div>
                        <b style="color:var(--pi-g);">${o.price === "0" ? 'Free' : o.price + ' Pi'}</b>
                    </div>`).join('');
            }
        }

        function showTab(tab) {
            if(tab === 'profile') {
                if(!window.currentUser) return showMsg("Login Pi first");
                document.getElementById('homePage').style.display = 'none';
                document.getElementById('profileSection').style.display = 'block';
                document.getElementById('profileNav').classList.add('active');
                document.getElementById('homeNav').classList.remove('active');
                loadUserProfile();
            } else {
                document.getElementById('homePage').style.display = 'block';
                document.getElementById('profileSection').style.display = 'none';
                document.getElementById('homeNav').classList.add('active');
                document.getElementById('profileNav').classList.remove('active');
            }
        }

        async function loadUserProfile() {
            document.getElementById('profileName').innerText = window.currentUser;
            document.getElementById('userInitial').innerText = window.currentUser[0].toUpperCase();
            const { data } = await _supabase.from('services').select('*').eq('user_pi', window.currentUser).eq('category', 'Order').order('id', { ascending: false });
            if (data) {
                document.getElementById('totalOrders').innerText = data.length;
                document.getElementById('totalSpent').innerText = data.reduce((acc, curr) => acc + parseFloat(curr.price), 0).toFixed(2);
                document.getElementById('userOrdersList').innerHTML = data.map(o => `
                    <div class="order-item" style="text-align:right;">
                        <div style="font-weight:bold;">${o.title}</div>
                        <div style="color:var(--pi-g);">${o.price} Pi</div>
                    </div>`).join('');
            }
        }

        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }
        function checkAdmin() { if(document.getElementById('adminPass').value === "ateya2026") { document.getElementById('adminAuth').style.display='none'; document.getElementById('adminTools').style.display='block'; loadAdminList(); } else { showMsg("Wrong Code"); } }
        async function loadAdminList() { const { data } = await _supabase.from('services').select('*').eq('category', 'Service'); if(data) { document.getElementById('adminServiceList').innerHTML = data.map(s => `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.8rem;"><span>${s.title}</span><i class="fas fa-trash-alt" style="color:red" onclick="deleteService(${s.id})"></i></div>`).join(''); } }
        async function deleteService(id) { if(confirm("Delete?")) { await _supabase.from('services').delete().eq('id', id); loadAdminList(); loadServices(); } }
        async function addService() { const t = document.getElementById('newSTitle').value; const p = document.getElementById('newSPrice').value; if(t && p) { await _supabase.from('services').insert([{ title: t, price: p, category: 'Service' }]); loadAdminList(); loadServices(); } }

        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
