<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --purple: #4a148c; }
        body { background: linear-gradient(135deg, var(--purple), #2e0d5a); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 30px; background: rgba(255,255,255,0.1); width: 100%; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: center; }
        .container { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        
        /* جعل الكارت قابل للضغط للتحويل لصفحة أخرى */
        .card { 
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; padding: 20px; display: flex; align-items: center; 
            justify-content: space-between; cursor: pointer; transition: 0.3s;
            text-decoration: none; color: white;
        }
        .card:hover { border-color: var(--gold); background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .card i { color: var(--gold); font-size: 1.6rem; }
        
        .pay-btn { background: var(--gold); color: black; border: none; padding: 20px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2rem; width: 100%; }

        /* نافذة النجاح بالصح الأخضر */
        #success-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 1000; width: 85%; max-width: 320px; }
        .check-icon { color: #28a745; font-size: 5rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <header>
        <h1>جسر العمل الحر</h1>
        <p>اختر فئة للانتقال لصفحة الخدمات</p>
    </header>

    <div class="container">
        <a href="services.html" class="card">
            <span>تطوير البرمجيات</span>
            <i class="fas fa-code"></i>
        </a>

        <a href="services.html" class="card">
            <span>الترجمة واللغات</span>
            <i class="fas fa-language"></i>
        </a>

        <a href="add-service.html" class="card">
            <span>إضافة خدمة جديدة</span>
            <i class="fas fa-plus-circle"></i>
        </a>

        <button class="pay-btn" onclick="startPayment()">بدء الدفع المباشر (0.1 Pi)</button>
    </div>

    <div id="success-modal">
        <i class="fas fa-check-circle check-icon"></i>
        <h2 style="margin:0">تمت العملية بنجاح</h2>
        <p>تم تأكيد الدفع عبر شبكة Pi</p>
        <button onclick="location.reload()" style="border:none; background:var(--purple); color:white; padding:12px 25px; border-radius:10px; cursor:pointer;">إغلاق</button>
    </div>

    <script>
        // كود الدفع الخاص بك (لم يتغير لضمان الأمان)
        const Pi = window.Pi; Pi.init({ version: "2.0" });
        async function startPayment() {
            try {
                const payment = await Pi.createPayment({
                    amount: 0.1, memo: "تجربة دفع جسر التواصل", metadata: { type: "test" }
                }, {
                    onReadyForServerNotification: (id) => {
                        fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, action: 'approve' }),
                        });
                    },
                    onComplete: (id, txid) => {
                        // إظهار علامة الصح الأخضر
                        document.getElementById('success-modal').style.display = 'block';
                        fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, txid: txid, action: 'complete' }),
                        });
                    },
                    onCancelled: (id) => {}, onIncomplete: (id) => {}
                });
            } catch (err) { alert("افتح الرابط داخل Pi Browser"); }
        }
    </script>
</body>
</html>
