<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #FFD700; --w: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }

        /* الهيدر */
        .hero {
            padding: 30px 20px;
            background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            text-align: center; color: var(--w);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 5px; font-weight: 800; }
        .welcome-msg { font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 5px 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid rgba(255,215,0,0.3); }

        .btn-auth {
            background: var(--pi-g); color: var(--pi-d); border: none;
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* التصنيفات */
        .categories { 
            padding: 20px 15px; max-width: 500px; margin: 0 auto; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }
        .cat-card {
            background: var(--w); padding: 18px 10px; border-radius: 20px; 
            text-align: center; cursor: pointer; border: 1px solid rgba(106, 27, 154, 0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); width: 50px; height: 50px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 15px; font-size: 1.5rem; margin-bottom: 10px;
        }
        .cat-card span { font-weight: 700; color: var(--pi-d); font-size: 0.9rem; margin-bottom: 5px; }
        .price-badge { font-size: 0.8rem; color: #e65100; font-weight: bold; background: #fff3e0; padding: 2px 8px; border-radius: 5px; }

        /* نافذة المطلوبات (الجديدة) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 4000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 400px; padding: 25px; border-radius: 25px; text-align: right;
        }
        .modal-content h2 { color: var(--pi-d); font-size: 1.2rem; margin-bottom: 15px; text-align: center; }
        .modal-content textarea, .modal-content input {
            width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ddd; border-radius: 12px; font-size: 0.9rem;
        }
        .btn-submit {
            width: 100%; background: var(--pi-p); color: white; border: none; padding: 15px; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer;
        }

        /* الفوتر */
        .footer-container { margin-top: auto; padding: 15px 10px 40px; text-align: center; }
        .legal-links { margin-bottom: 10px; }
        .legal-links a { color: var(--pi-p); text-decoration: none; margin: 0 10px; font-size: 0.9rem; font-weight: bold; }
        .copyright { font-size: 0.8rem; color: #777; }

        #toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 10px 25px; border-radius: 30px; 
            display: none; z-index: 5000; font-size: 0.85rem; border: 1px solid var(--pi-g);
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">مرحباً بك في منصة abokareem 🌐</div>
        <p style="font-size: 0.85rem; margin-bottom: 15px; opacity: 0.9;">أنجز مهامك المهنية بضغطة زر</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">توثيق الحساب للدفع</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'البرمجة والتطوير')">
            <i class="fas fa-code"></i><span>البرمجة</span><span class="price-badge">Pi 1.0</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'التصميم الجرافيكي')">
            <i class="fas fa-palette"></i><span>التصميم</span><span class="price-badge">Pi 0.8</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'التسويق والمبيعات')">
            <i class="fas fa-bullhorn"></i><span>التسويق</span><span class="price-badge">Pi 0.7</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'الكتابة والترجمة')">
            <i class="fas fa-pen-nib"></i><span>الترجمة</span><span class="price-badge">Pi 0.5</span>
        </div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2>📦 مطلوبات التنفيذ</h2>
            <p style="font-size: 0.8rem; color: #666;">لقد تم الدفع بنجاح! فضلاً أدخل تفاصيل طلبك لنتواصل معك:</p>
            <textarea id="orderDetail" rows="4" placeholder="مثلاً: أريد برمجة تطبيق متجر إلكتروني بسيط..."></textarea>
            <input type="text" id="contactInfo" placeholder="رقم واتساب أو وسيلة تواصل">
            <button class="btn-submit" onclick="submitOrder()">إرسال بيانات الطلب</button>
        </div>
    </div>

    <div class="footer-container">
        <div class="legal-links">
            <a href="terms.html">شروط الاستخدام</a> | <a href="privacy.html">سياسة الخصوصية</a>
        </div>
        <div class="copyright">Bridge Freelance - Powered by Pi Network 2026 ©</div>
    </div>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "";

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 4000); }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك " + auth.user.username);
                document.getElementById('authBtn').innerText = "الحساب موثق ✅";
            } catch (e) { showMsg("فشل التوثيق"); }
        }

        async function processPayment(amt, name) {
            try {
                showMsg(`جاري معالجة دفع ${amt} Pi...`);
                await window.Pi.createPayment({
                    amount: amt,
                    memo: "شراء خدمة: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    }).then(r => r.json()),
                    
                    onConnectedToBlockchain: (id, tx) => {
                        currentTxId = tx;
                        showMsg("تم الدفع! فضلاً أكمل بيانات الطلب.");
                    },
                    
                    onReadyForServerCompletion: (id, tx) => {
                        // إظهار نافذة المطلوبات فور النجاح
                        document.getElementById('reqModal').style.display = 'flex';
                        
                        return fetch('/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                        }).then(r => r.json());
                    },
                    onCancel: () => showMsg("تم الإلغاء"),
                    onError: (e) => showMsg("خطأ في الدفع")
                });
            } catch (e) { showMsg("حدث خطأ تقني"); }
        }

        function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            
            if(!detail || !contact) {
                showMsg("فضلاً أكمل جميع الحقول");
                return;
            }

            // هنا يمكنك إرسال البيانات لقاعدة بياناتك أو عرض رسالة نجاح
            showMsg("تم استلام طلبك بنجاح يافنان! سنقوم بمراجعته.");
            setTimeout(() => {
                document.getElementById('reqModal').style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
