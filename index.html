<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>
    <style>
        :root { 
            --pi-p: #6a1b9a; 
            --pi-d: #4a148c; 
            --pi-g: #ffb74d; 
            --w: #ffffff;
            --gold-soft: #fdf5e6; /* ذهبي مطفي مريح للعين */
            --gold-strong: #d4af37;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--gold-soft); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: #333; }
        
        /* Hero Section - Super Compressed */
        .hero { 
            padding: 15px 10px; /* مساحة علوية صغرى */
            background: linear-gradient(135deg, var(--pi-d) 0%, var(--pi-p) 100%); 
            text-align: center; color: var(--w); 
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .hero-title { font-size: 1.6rem; color: var(--pi-g); margin-bottom: 2px; font-weight: 800; }
        .welcome-msg { font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; display: inline-block; }
        
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; padding: 8px 20px; 
            border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 0.85rem;
        }

        /* Grid & Cards - Tiny Icons */
        .categories { padding: 15px 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .cat-card { 
            background: var(--w); padding: 12px 8px; border-radius: 15px; 
            text-align: center; cursor: pointer; border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.2s;
        }
        .cat-card i { 
            color: var(--pi-g); background: var(--pi-d); width: 32px; height: 32px; /* حجم أيقونة صغير جداً */
            display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-size: 1rem; margin: 0 auto 8px;
        }
        .cat-card span { font-weight: 700; color: var(--pi-d); font-size: 0.85rem; display: block; margin-bottom: 3px; }
        .price-badge { font-size: 0.7rem; color: #784212; font-weight: 800; background: #fef5e7; padding: 2px 6px; border-radius: 4px; }

        /* Order Feed */
        .orders-section { padding: 5px 10px 20px; max-width: 450px; margin: 0 auto; width: 100%; }
        .section-title { color: var(--pi-d); margin-bottom: 10px; text-align: center; font-size: 0.9rem; font-weight: 800; opacity: 0.8; }
        .order-item { 
            background: rgba(255,255,255,0.7); padding: 10px; border-radius: 12px; margin-bottom: 8px; 
            border-right: 3px solid var(--pi-g); border-left: 1px solid rgba(0,0,0,0.05);
        }

        /* Footer Links */
        .footer-container { margin-top: auto; padding: 15px 10px 25px; text-align: center; background: rgba(255,255,255,0.4); }
        .footer-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 8px; }
        .footer-links a { color: var(--pi-p); text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .copyright { font-size: 0.65rem; color: #999; }

        /* Toast & Modal */
        #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); background: #444; color: #fff; padding: 8px 16px; border-radius: 20px; display: none; z-index: 5000; font-size: 0.75rem; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: white; width: 85%; max-width: 350px; padding: 25px 20px; border-radius: 20px; }
    </style>
</head>
<body>
    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <div class="welcome-msg">منصة abokareem 🌐</div><br>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول Pi</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'Programming')">
            <i class="fas fa-code"></i><span>برمجة</span><span class="price-badge">1.0 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.8, 'Design')">
            <i class="fas fa-palette"></i><span>تصميم</span><span class="price-badge">0.8 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.7, 'Marketing')">
            <i class="fas fa-bullhorn"></i><span>تسويق</span><span class="price-badge">0.7 Pi</span>
        </div>
        <div class="cat-card" onclick="processPayment(0.5, 'Translation')">
            <i class="fas fa-language"></i><span>ترجمة</span><span class="price-badge">0.5 Pi</span>
        </div>
    </section>

    <section class="orders-section">
        <div class="section-title">📦 طلبات حية</div>
        <div id="ordersList"></div>
    </section>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h3 style="text-align:center; margin-bottom:10px;">اكتمل الدفع!</h3>
            <textarea id="orderDetail" rows="3" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="ما هي طلباتك؟"></textarea>
            <input type="email" id="contactInfo" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:8px;" placeholder="ايميلك">
            <button style="width:100%; background:var(--pi-p); color:white; border:none; padding:12px; border-radius:8px; margin-top:10px; font-weight:bold;" onclick="submitOrder()">إرسال</button>
        </div>
    </div>

    <footer class="footer-container">
        <div class="footer-links">
            <a href="#"><i class="fas fa-shield-alt"></i> الخصوصية</a>
            <a href="#"><i class="fas fa-file-contract"></i> الشروط</a>
        </div>
        <div class="copyright">© 2026 Bridge Freelance</div>
    </footer>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const supabaseUrl = "https://xolwuawlnruvzqowxxbh.supabase.co"; 
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 2500); }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').order('id', { ascending: false }).limit(3);
                const list = document.getElementById('ordersList');
                if (!data || data.length === 0) { list.innerHTML = '<p style="text-align:center; font-size:0.7rem;">لا يوجد طلبات</p>'; return; }
                list.innerHTML = data.map(o => `
                    <div class="order-item">
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.8rem; color:var(--pi-d);">
                            <span>${o.title}</span><span>${o.price} Pi</span>
                        </div>
                        <div style="font-size:0.7rem; color:#666;">${o.description ? o.description.substring(0, 40) : ''}...</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function startApp() {
            try {
                showMsg("جاري الاتصال...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = `تم الدخول ✅`;
                document.getElementById('authBtn').style.background = "#2ecc71";
            } catch (e) { showMsg("خطأ اتصال"); }
        }

        async function processPayment(amt, name) {
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("تجهيز الدفع...");
                await window.Pi.createPayment({
                    amount: amt, memo: "خدمة: " + name, metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        const response = await fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        if (response.ok) document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: (e) => showMsg("خطأ")
                });
            } catch (e) { showMsg("فشل الدفع"); }
        }

        async function submitOrder() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) return;
            try {
                await _supabase.from('services').insert([{ 
                    title: currentCategory, description: detail, price: String(currentPrice),
                    category: currentCategory, contact_info: contact,
                    user_pi: window.currentUser || "Unknown", txid: currentTxId
                }]);
                await emailjs.send("service_vuti648", "template_m6rq1ab", {
                    username: window.currentUser || "abokareem", service_detail: detail, contact_info: contact, order_id: currentTxId, price: currentPrice
                });
                location.reload();
            } catch (error) { showMsg("خطأ حفظ"); }
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
