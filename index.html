<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance - Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <script type="text/javascript">
        (function() { emailjs.init("aRCAx1NwvATaC4F-m"); })();
    </script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--pi-d); min-height: 100vh; color: var(--white); display: block; }
        .hero { padding: 20px 15px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.1); }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        .welcome-msg { font-size: 0.75rem; background: var(--pi-g); color: var(--pi-d); display: inline-block; padding: 6px 15px; border-radius: 20px; margin-bottom: 10px; font-weight: bold; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: block; margin: 0 auto; }
        .categories { padding: 15px; max-width: 450px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: var(--pi-g); padding: 15px 5px; border-radius: 18px; text-align: center; cursor: pointer; color: var(--pi-d); box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; }
        .cat-card:active { transform: scale(0.95); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1rem; margin: 0 auto 8px; }
        .cat-card span { font-weight: 700; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .price-badge { font-size: 0.65rem; color: #fff; font-weight: bold; background: var(--pi-d); padding: 2px 8px; border-radius: 6px; }
        .orders-section { padding: 15px; max-width: 450px; margin: 0 auto; }
        .section-title { color: var(--pi-g); margin-bottom: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; }
        .order-item { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--pi-g); }
        footer { padding: 20px 0; text-align: center; border-top: 1px solid rgba(255,183,77,0.05); }
        .policy-links { font-size: 0.7rem; color: var(--pi-g); display: flex; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .policy-links a { color: var(--pi-g); text-decoration: none; font-weight: bold; }
        .copy-text { font-size: 0.6rem; color: white; opacity: 0.4; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: var(--white); width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; color: var(--pi-d); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 10px 20px; border-radius: 20px; display: none; z-index: 5000; font-size: 0.8rem; font-weight: bold; }
        textarea, input { width: 100%; padding: 10px; border-radius: 8px; margin-top: 8px; font-size: 0.85rem; border: 1px solid #ddd; }
        .admin-trigger { position: fixed; bottom: 0; left: 0; width: 50px; height: 50px; cursor: pointer; z-index: 9999; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">Bridge Freelance</h1>
        <div class="welcome-msg">Welcome to abokareem Platform 🌐</div>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Login via Pi Network</button>
    </section>

    <section class="categories" id="servicesContainer"></section>

    <section class="orders-section">
        <div class="section-title">📦 Recent Orders</div>
        <div id="ordersList"></div>
    </section>

    <footer>
        <div class="policy-links">
            <a href="#" onclick="alert('Privacy Policy: We protect your Pi data.')">Privacy Policy</a>
            <a href="#" onclick="alert('Terms of Use: Use this platform for legal services.')">Terms of Use</a>
        </div>
        <p class="copy-text">&copy; 2026 Bridge Freelance. All rights reserved.</p>
        <div class="admin-trigger" onclick="openAdmin()"></div>
    </footer>

    <div id="adminPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; overflow-y:auto; padding:20px;">
        <div style="max-width:400px; margin:auto; background:#fff; color:#333; padding:20px; border-radius:15px;">
            <h3 style="text-align:center; color:#4a148c; margin-bottom:15px;">Admin Control 🛠️</h3>
            <div id="adminAuth">
                <input type="password" id="adminPass" placeholder="Password">
                <button onclick="checkAdmin()" style="width:100%; padding:12px; background:#4a148c; color:#ffb74d; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">Login</button>
            </div>
            <div id="adminControls" style="display:none;">
                <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:15px;">
                    <p style="font-weight:bold; font-size:0.8rem;">Add New Service:</p>
                    <input type="text" id="addT" placeholder="Service Name">
                    <input type="number" step="0.1" id="addP" placeholder="Price in Pi">
                    <button onclick="addNewS()" style="width:100%; background:#27ae60; color:white; border:none; padding:10px; border-radius:8px; margin-top:10px; font-weight:bold;">Add Now</button>
                </div>
                <div id="adminList" style="max-height:250px; overflow-y:auto; border-top:1px solid #eee; padding-top:10px;"></div>
                <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; margin-top:15px; padding:10px; border:none; border-radius:8px; background:#eee;">Exit</button>
            </div>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; font-size: 1.1rem; margin-bottom:10px;">Payment Complete! 🎉</h2>
            <textarea id="orderDetail" rows="3" placeholder="Describe your request..."></textarea>
            <input type="email" id="contactInfo" placeholder="Your Email">
            <button style="width:100%; background:var(--pi-g); color:var(--pi-d); border:none; padding:12px; border-radius:10px; margin-top:15px; font-weight:bold;" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <div id="autoReplyModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71; margin-bottom: 10px;"></i>
            <h3>Order Received!</h3>
            <p style="font-size: 0.8rem; margin: 10px 0;">We will contact you shortly.</p>
            <button style="width:100%; background:var(--pi-d); color:var(--pi-g); border:none; padding:12px; border-radius:10px; font-weight:bold;" onclick="location.reload()">Back</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        let currentTxId = "", currentPrice = 0, currentCategory = "";
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");

        function showMsg(m) { toast.innerText = m; toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 3000); }

        async function startApp() {
            try {
                showMsg("Connecting...");
                await window.Pi.init({ version: "2.0", sandbox: true }); 
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "Verified ✅";
                document.getElementById('authBtn').style.background = "#2ecc71";
                showMsg("Welcome " + auth.user.username);
            } catch (e) { showMsg("Login failed"); }
        }

        async function loadServices() {
            const container = document.getElementById('servicesContainer');
            try {
                const { data } = await _supabase.from('services').select('*');
                // تصفية مرنة جداً لعرض الخدمات فقط
                const activeOnes = data.filter(s => s.category !== 'Order');

                if (activeOnes && activeOnes.length > 0) {
                    container.innerHTML = activeOnes.map(s => {
                        let icon = s.title.includes('Design') ? 'fa-palette' : 
                                   s.title.includes('Program') ? 'fa-code' : 
                                   s.title.includes('Market') ? 'fa-bullhorn' : 
                                   s.title.includes('Translat') ? 'fa-language' : 'fa-briefcase';
                        return `
                            <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                                <i class="fas ${icon}"></i>
                                <span>${s.title}</span>
                                <span class="price-badge">${s.price} Pi</span>
                            </div>`;
                    }).join('');
                }
            } catch (e) { console.error(e); }
        }

        async function loadOrders() {
            try {
                const { data } = await _supabase.from('services').select('*').eq('category', 'Order').order('id', { ascending: false }).limit(4);
                if (data && data.length > 0) {
                    document.getElementById('ordersList').innerHTML = data.map(o => `
                        <div class="order-item">
                            <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.75rem; color:var(--pi-g);">
                                <span>${o.title}</span><span>${o.price} Pi</span>
                            </div>
                            <div style="font-size:0.65rem; opacity:0.8; margin-top:3px;">User: ${o.user_pi || 'Guest'}</div>
                        </div>`).join('');
                }
            } catch (e) {}
        }

        // وظائف المدير
        function openAdmin() { document.getElementById('adminPanel').style.display = 'block'; }
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminAuth').style.display = 'none';
                document.getElementById('adminControls').style.display = 'block';
                loadAdminList();
            } else { alert("Wrong Password"); }
        }
        async function loadAdminList() {
            const { data } = await _supabase.from('services').select('*').neq('category', 'Order');
            document.getElementById('adminList').innerHTML = data.map(s => `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:12px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <span>${s.title} (${s.price} Pi)</span>
                    <button onclick="delS(${s.id})" style="color:red; border:none; background:none; cursor:pointer; font-weight:bold;">Delete</button>
                </div>`).join('');
        }
        async function addNewS() {
            const t = document.getElementById('addT').value;
            const p = document.getElementById('addP').value;
            if(!t || !p) return alert("Fill data");
            await _supabase.from('services').insert([{ title: t, price: p, status: 'active', category: 'Service' }]);
            alert("Added!"); loadAdminList(); loadServices();
        }
        async function delS(id) {
            if(confirm("Delete this service?")) {
                await _supabase.from('services').delete().eq('id', id);
                loadAdminList(); loadServices();
            }
        }

        // دفع وطلبات
        async function processPayment(amt, name) {
            if(!window.currentUser) { showMsg("Please login first"); return; }
            currentPrice = amt; currentCategory = name;
            try {
                showMsg("Starting Pi Payment...");
                await window.Pi.createPayment({ amount: amt, memo: "Service: " + name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, action: 'approve' }) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' }) });
                        document.getElementById('reqModal').style.display = 'flex';
                    },
                    onError: () => showMsg("Failed"),
                    onCancel: () => showMsg("Cancelled")
                });
            } catch (e) { showMsg("Error"); }
        }

        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            if(!d || !c) return showMsg("Fill all fields");
            await _supabase.from('services').insert([{ title: currentCategory, description: d, price: String(currentPrice), category: 'Order', contact_info: c, user_pi: window.currentUser, txid: currentTxId, status: 'active' }]);
            await emailjs.send("service_vuti648", "template_m6rq1ab", { username: window.currentUser, service_detail: d, contact_info: c, order_id: currentTxId, price: currentPrice });
            document.getElementById('reqModal').style.display = 'none';
            document.getElementById('autoReplyModal').style.display = 'flex';
        }

        window.onload = () => { loadServices(); loadOrders(); };
    </script>
</body>
</html>
