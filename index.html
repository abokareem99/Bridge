<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --pi-d: #4a148c; /* البنفسجي */
            --pi-g: #ffb74d; /* الأصفر الذهبي */
            --white: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--pi-d); min-height: 100vh; color: var(--white); padding-bottom: 80px; }
        
        .hero { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.2); }
        .hero-title { font-size: 2rem; color: var(--pi-g); font-weight: 800; }
        
        .btn-auth { 
            background: var(--pi-g); color: var(--pi-d); border: none; padding: 12px 30px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        .categories { padding: 20px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 450px; margin: 0 auto; }
        .cat-card { 
            background: var(--pi-g); padding: 20px 10px; border-radius: 20px; 
            text-align: center; cursor: pointer; color: var(--pi-d); font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .cat-card i { font-size: 1.5rem; margin-bottom: 10px; display: block; color: var(--pi-d); }
        .price-badge { background: var(--pi-d); color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.8rem; }

        .orders-section { padding: 20px 15px; max-width: 450px; margin: 0 auto; }
        .order-item { 
            background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border-right: 4px solid var(--pi-g);
        }

        /* زر النشر العائم باللون الأصفر */
        .fab-publish {
            position: fixed; bottom: 20px; left: 20px;
            background: var(--pi-g); color: var(--pi-d);
            padding: 15px 25px; border-radius: 50px;
            font-weight: 900; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            cursor: pointer; z-index: 1000; border: 2px solid white;
            display: flex; align-items: center; gap: 8px;
        }

        /* المودالات */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: white; color: var(--pi-d); width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: right; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; font-weight: bold; }
        .btn-pay { width: 100%; background: var(--pi-d); color: var(--pi-g); border: none; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 30px; display: none; z-index: 5000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <header class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </header>

    <section class="categories">
        <div class="cat-card" onclick="initPayment(1.0, 'برمجة', 'order')"><i class="fas fa-code"></i><span>طلب برمجة</span> <span class="price-badge">1.0 Pi</span></div>
        <div class="cat-card" onclick="initPayment(0.8, 'تصميم', 'order')"><i class="fas fa-palette"></i><span>طلب تصميم</span> <span class="price-badge">0.8 Pi</span></div>
    </section>

    <section class="orders-section">
        <h3 style="color:var(--pi-g); text-align:center; margin-bottom:15px;">📦 الخدمات المنشورة</h3>
        <div id="ordersList"></div>
    </section>

    <div class="fab-publish" onclick="openModal('pubModal')">
        <i class="fas fa-plus"></i> <span>انشر خدمتك بـ 0.1</span>
    </div>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center">نشر خدمة جديدة 🚀</h3>
            <input type="text" id="pubTitle" placeholder="ما هي خدمتك؟">
            <textarea id="pubDesc" rows="3" placeholder="وصف الخدمة..."></textarea>
            <input type="text" id="pubContact" placeholder="واتساب للتواصل">
            <button class="btn-pay" onclick="handlePublish()">تأكيد ودفع 0.1 Pi</button>
            <p onclick="closeModal('pubModal')" style="text-align:center; color:red; margin-top:10px; cursor:pointer">إلغاء</p>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        
        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerText = "تم التحقق: " + window.currentUser;
                showMsg("مرحباً بك");
            } catch (e) { showMsg("افتح من Pi Browser"); }
        }

        // دالة الدفع الذكية (تعالج الطلب والنشر)
        async function initPayment(amt, title, type) {
            if(!window.currentUser) return showMsg("سجل دخولك أولاً");
            try {
                showMsg("جاري معالجة الدفع...");
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: (type === 'pub' ? "نشر خدمة: " : "طلب خدمة: ") + title,
                    metadata: { actionType: type }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({paymentId: id, action: 'approve'}) }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => { window.lastTx = tx; },
                    onReadyForServerCompletion: async (id, tx) => {
                        await fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({paymentId: id, txid: tx, action: 'complete'}) });
                        if(type === 'pub') {
                            savePublish(); 
                        } else {
                            showMsg("تم الطلب! سنتواصل معك.");
                        }
                    },
                    onError: () => showMsg("خطأ في الدفع")
                });
            } catch (e) { showMsg("فشلت العملية"); }
        }

        async function handlePublish() {
            const title = document.getElementById('pubTitle').value;
            if(!title) return showMsg("أدخل العنوان");
            closeModal('pubModal');
            await initPayment(0.1, title, 'pub');
        }

        async function savePublish() {
            const t = document.getElementById('pubTitle').value;
            const d = document.getElementById('pubDesc').value;
            const c = document.getElementById('pubContact').value;
            
            await _supabase.from('services').insert([{ 
                title: t, description: d, contact_info: c, 
                user_pi: window.currentUser, price: "0.1" 
            }]);
            showMsg("تم النشر بنجاح! 🎊");
            setTimeout(() => location.reload(), 2000);
        }

        async function load() {
            const { data } = await _supabase.from('services').select('*').order('id', { ascending: false });
            if(data) {
                document.getElementById('ordersList').innerHTML = data.map(o => `
                    <div class="order-item">
                        <div style="display:flex; justify-content:space-between; color:var(--pi-g); font-weight:bold">
                            <span>${o.title}</span><span>${o.price} Pi</span>
                        </div>
                        <p style="font-size:0.8rem; margin-top:5px;">${o.description}</p>
                        <p style="font-size:0.7rem; color:var(--pi-g); margin-top:5px;">للتواصل: ${o.contact_info}</p>
                    </div>
                `).join('');
            }
        }
        window.onload = load;
    </script>
</body>
</html>
