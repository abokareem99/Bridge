<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">emailjs.init("aRCAx1NwvATaC4F-m");</script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--pi-d); min-height: 100vh; color: var(--white); }
        .hero { padding: 20px 15px; text-align: center; border-bottom: 1px solid rgba(255,183,77,0.1); }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 8px; font-weight: 800; }
        .welcome-msg { font-size: 0.75rem; background: var(--pi-g); color: var(--pi-d); display: inline-block; padding: 6px 15px; border-radius: 20px; margin-bottom: 10px; font-weight: bold; }
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.9rem; display: block; margin: 0 auto; }
        .categories { padding: 15px; max-width: 450px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .cat-card { background: var(--pi-g); padding: 15px 5px; border-radius: 18px; text-align: center; cursor: pointer; color: var(--pi-d); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 1rem; margin: 0 auto 8px; }
        .cat-card span { font-weight: 700; font-size: 0.75rem; display: block; margin-bottom: 4px; }
        .price-badge { font-size: 0.65rem; color: #fff; font-weight: bold; background: var(--pi-d); padding: 2px 8px; border-radius: 6px; }
        .orders-section { padding: 15px; max-width: 450px; margin: 0 auto; }
        .order-item { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 12px; margin-bottom: 8px; border-left: 3px solid var(--pi-g); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; }
        .modal-content { background: var(--white); width: 90%; max-width: 350px; padding: 20px; border-radius: 15px; color: var(--pi-d); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 10px 20px; border-radius: 20px; display: none; z-index: 5000; font-size: 0.8rem; font-weight: bold; }
        textarea, input { width: 100%; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">Bridge Freelance</h1>
        <div class="welcome-msg">Welcome to abokareem Platform 🌐</div>
        <button id="authBtn" class="btn-auth" onclick="startApp()">Login via Pi Network</button>
    </section>

    <section class="categories" id="servicesContainer"></section>

    <section class="orders-section" id="ordersList"></section>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h2 style="text-align:center; color: var(--pi-d)">Payment Complete! 🎉</h2>
            <textarea id="orderDetail" rows="3" placeholder="Order details..."></textarea>
            <input type="email" id="contactInfo" placeholder="Contact Email">
            <button style="width:100%; background:var(--pi-g); padding:12px; border-radius:10px; margin-top:15px; font-weight:bold; border:none; cursor:pointer" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentUser = null, currentTxId = null, currentPrice = 0, currentService = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }

        // تصحيح: الدالة تعمل فقط عند الضغط على الزر
        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {
                   if(p) handleServerSide(p.identifier, p.status.ready_for_server_approval ? 'approve' : 'complete', p.transaction?.txid);
                });
                currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = "Verified: " + currentUser;
                document.getElementById('authBtn').style.background = "#2ecc71";
                loadServices();
                loadOrders();
            } catch (e) { showMsg("Login failed"); }
        }

        async function loadServices() {
            const { data } = await _supabase.from('services').select('*');
            if (data) {
                document.getElementById('servicesContainer').innerHTML = data.filter(s => s.status === 'active').map(s => `
                    <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                        <i class="fas fa-briefcase"></i>
                        <span>${s.title}</span>
                        <span class="price-badge">${s.price} Pi</span>
                    </div>`).join('');
            }
        }

        async function loadOrders() {
            const { data } = await _supabase.from('orders').select('*').order('id', { ascending: false }).limit(5);
            if (data) {
                document.getElementById('ordersList').innerHTML = '<h3 style="text-align:center; color:var(--pi-g); margin-bottom:10px;">Recent Orders</h3>' + 
                data.map(o => `<div class="order-item">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.7rem;">
                        <span>${o.service}</span><span>${o.price} Pi</span>
                    </div>
                    <div style="font-size:0.6rem; opacity:0.7;">User: ${o.user_pi}</div>
                </div>`).join('');
            }
        }

        async function processPayment(amt, name) {
            if(!currentUser) return showMsg("Please Login First");
            currentPrice = amt; currentService = name;
            try {
                await window.Pi.createPayment({ amount: amt, memo: "Service: " + name, metadata: { service: name } }, {
                    onReadyForServerApproval: (id) => handleServerSide(id, 'approve'),
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => handleServerSide(id, 'complete', tx),
                    onError: (e) => showMsg("Payment Error"),
                    onCancel: () => showMsg("Cancelled")
                });
            } catch (e) { showMsg("Payment Failed"); }
        }

        async function handleServerSide(pid, action, txid) {
            try {
                await fetch('/api/payment-handler', { method: 'POST', body: JSON.stringify({ paymentId: pid, action, txid }) });
                if (action === 'complete') document.getElementById('reqModal').style.display = 'flex';
            } catch (e) { if(action === 'complete') document.getElementById('reqModal').style.display = 'flex'; }
        }

        async function submitOrder() {
            const desc = document.getElementById('orderDetail').value;
            const mail = document.getElementById('contactInfo').value;
            if(!desc || !mail) return showMsg("Fill all fields");

            // هذا الجزء هو سبب الخطأ في الصورة: تأكد من مسميات الأعمدة في Supabase
            const { error } = await _supabase.from('orders').insert([{ 
                service: currentService, 
                description: desc, 
                price: String(currentPrice), 
                contact_info: mail, 
                user_pi: currentUser, 
                txid: currentTxId || "test_tx"
            }]);

            if(!error) {
                await emailjs.send("service_vuti648", "template_m6rq1ab", { username: currentUser, service_detail: desc, contact_info: mail });
                location.reload(); 
            } else {
                console.error(error);
                showMsg("Database Error: Check Supabase RLS");
            }
        }

        // إزالة استدعاء startApp من هنا لترك الخيار للزر
        window.onload = () => { /* الصفحة لا تفعل شيئاً حتى يضغط عطية الزر */ };
    </script>
</body>
</html>
