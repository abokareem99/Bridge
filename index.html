<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Pi Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f4f9; overflow-x: hidden; }

        .hero {
            height: 38vh; 
            background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            display: flex; align-items: center; justify-content: center; text-align: center; color: var(--w);
            padding: 10px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .hero-title { font-size: 2rem; color: var(--pi-g); margin-bottom: 5px; font-weight: bold; }
        .hero-subtitle { font-size: 0.85rem; margin-bottom: 15px; opacity: 0.9; }

        .search-bar {
            background: var(--w); border-radius: 50px; padding: 2px;
            display: flex; margin: 0 auto 15px; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .search-bar input { flex: 1; border: none; padding: 8px; border-radius: 50px; outline: none; text-align: center; font-size: 0.85rem; }

        .btn-main {
            background: var(--pi-g); color: var(--pi-p); border: none;
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.9rem;
        }

        .categories { padding: 15px; max-width: 500px; margin: 0 auto; }
        .cat-card {
            background: var(--w); margin-bottom: 8px; padding: 12px 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; text-decoration: none; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        .cat-info { display: flex; align-items: center; gap: 10px; }
        .cat-info i { color: var(--pi-p); font-size: 1.1rem; width: 25px; text-align: center; }
        .cat-info span { font-size: 0.9rem; font-weight: 500; }
        .fa-chevron-left { color: var(--pi-g); font-size: 0.8rem; }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1 class="hero-title">جسر التواصل</h1>
            <p class="hero-subtitle">خدمات العمل الحر عبر Pi Network</p>
            <div class="search-bar">
                <input type="text" placeholder="ابحث عن خدمة...">
            </div>
            <button id="authBtn" class="btn-main" onclick="startApp()">دخول عبر Pi Network</button>
            <button id="payBtn" class="btn-main" style="display:none;" onclick="makePayment()">دفع 0.1 Pi للتجربة</button>
        </div>
    </section>

    <section class="categories">
        <a href="services.html" class="cat-card">
            <div class="cat-info"><i class="fas fa-code"></i><span>البرمجة والتطوير</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
        <a href="#" class="cat-card">
            <div class="cat-info"><i class="fas fa-pen-nib"></i><span>الكتابة والترجمة</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
        <a href="#" class="cat-card">
            <div class="cat-info"><i class="fas fa-palette"></i><span>التصميم الجرافيكي</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
        <a href="#" class="cat-card">
            <div class="cat-info"><i class="fas fa-bullhorn"></i><span>التسويق والمبيعات</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
        <a href="#" class="cat-card">
            <div class="cat-info"><i class="fas fa-calculator"></i><span>الأعمال والمحاسبة</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
        <a href="#" class="cat-card">
            <div class="cat-info"><i class="fas fa-graduation-cap"></i><span>التدريب والتعليم</span></div>
            <i class="fas fa-chevron-left"></i>
        </a>
    </section>

    <div id="toast"></div>

    <script>
        const toast = document.getElementById('toast');
        function showMsg(m) { 
            toast.innerText = m; 
            toast.style.display = 'block'; 
            setTimeout(() => toast.style.display='none', 3000); 
        }

        async function startApp() {
            try {
                showMsg("جاري التوثيق...");
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("أهلاً بك " + auth.user.username);
                document.getElementById('authBtn').style.display = 'none';
                document.getElementById('payBtn').style.display = 'inline-block';
            } catch (e) { 
                showMsg("فشل التوثيق: " + e.message); 
            }
        }

        async function makePayment() {
            try {
                showMsg("جاري إنشاء المعاملة...");
                await window.Pi.createPayment({
                    amount: 0.1, 
                    memo: "تجربة دفع جسر التواصل", 
                    metadata: { id: "test-1" }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    }).then(r => r.json()),
                    
                    onConnectedToBlockchain: (id, tx) => showMsg("تم الدفع بنجاح!"),
                    
                    onReadyForServerCompletion: (id, tx) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, txid: tx, action: 'complete' })
                    }).then(r => r.json()),
                    
                    onCancel: () => showMsg("تم الإلغاء"),
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { 
                showMsg("فشل تقني: " + e.message); 
            }
        }
    </script>
</body>
</html>
