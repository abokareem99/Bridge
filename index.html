<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #ffb74d; --w: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        
        .hero { padding: 50px 20px; background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%); text-align: center; color: var(--w); border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .hero-title { font-size: 2.5rem; color: var(--pi-g); margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .btn-auth { background: var(--pi-g); color: var(--pi-d); border: none; padding: 14px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        .categories { padding: 30px 15px; max-width: 600px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .cat-card { background: var(--w); padding: 25px 15px; border-radius: 25px; text-align: center; cursor: pointer; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .cat-card i { color: var(--pi-g); background: var(--pi-d); width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 20px; font-size: 1.8rem; margin-bottom: 15px; }
        .cat-card span { font-weight: bold; color: var(--pi-d); font-size: 1.1rem; }
        .cat-card small { color: #e65100; margin-top: 5px; font-weight: bold; background: #fff3e0; padding: 2px 8px; border-radius: 5px; }

        footer { margin-top: auto; padding: 20px; text-align: center; color: #666; font-size: 0.9rem; border-top: 1px solid #eee; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 4000; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 30px; text-align: right; }
        textarea, input { width: 100%; padding: 15px; margin-top: 12px; border: 2px solid #f0f0f0; border-radius: 15px; font-size: 1rem; outline: none; }
        .btn-submit { width: 100%; background: var(--pi-p); color: white; border: none; padding: 18px; border-radius: 15px; margin-top: 25px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 30px; border-radius: 50px; display: none; z-index: 5000; text-align: center; }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <p style="margin-bottom: 25px; opacity: 0.9;">أهلاً بك في منصة abokareem للعمل الحر</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">دخول عبر Pi Network</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="processPayment(1.0, 'برمجة وتطوير')"><i class="fas fa-code"></i><span>البرمجة</span><small>1.0 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.8, 'تصميم جرافيك')"><i class="fas fa-palette"></i><span>التصميم</span><small>0.8 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.7, 'تسويق ومبيعات')"><i class="fas fa-bullhorn"></i><span>التسويق</span><small>0.7 Pi</small></div>
        <div class="cat-card" onclick="processPayment(0.5, 'كتابة وترجمة')"><i class="fas fa-pen-nib"></i><span>الترجمة</span><small>0.5 Pi</small></div>
    </section>

    <footer>
        <p>شروط الاستخدام | سياسة الخصوصية</p>
        <p style="margin-top: 5px;">Bridge Freelance © 2026</p>
    </footer>

    <div id="reqModal" class="modal">
        <div class="modal-content" id="modalContent">
            <h2 style="text-align: center; color: var(--pi-d);">📦 مطلوبات التنفيذ</h2>
            <textarea id="orderDetail" rows="4" placeholder="اكتب تفاصيل طلبك هنا..."></textarea>
            <input type="text" id="contactInfo" placeholder="رقم الواتساب للتواصل">
            <button class="btn-submit" onclick="sendOrderToEmail()">إرسال الطلب</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const SERVICE_ID = "service_6ooge2n";
        const TEMPLATE_ID = "template_m6rq1ab";
        const PUBLIC_KEY = "S0iO-6kI4r2uG_rXn";

        emailjs.init(PUBLIC_KEY);
        let currentTxId = "";

        function showMsg(m) { 
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block'; 
            setTimeout(() => t.style.display='none', 4000); 
        }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                document.getElementById('authBtn').innerText = "تم التوثيق: " + auth.user.username;
            } catch (e) { showMsg("يرجى المحاولة من داخل متصفح Pi"); }
        }

        async function processPayment(amt, name) {
            try {
                showMsg("جاري الاتصال بـ Pi Wallet...");
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: "خدمة: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (paymentId) => {
                        return fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, action: 'approve' })
                        });
                    },
                    onConnectedToBlockchain: (paymentId, txid) => {
                        currentTxId = txid;
                        showMsg("تم تأكيد المعاملة على البلوكشين");
                    },
                    onReadyForServerCompletion: (paymentId, txid) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        return fetch('https://bridge-freelance.vercel.app/api/payment-handler', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ paymentId, txid, action: 'complete' })
                        });
                    },
                    onError: (error, payment) => {
                        showMsg("خطأ في عملية الدفع: " + error.message);
                        console.error(error);
                    },
                    onCancel: (paymentId) => { showMsg("تم إلغاء العملية"); }
                });
            } catch (e) {
                showMsg("تأكد من تسجيل الدخول أولاً");
            }
        }

        function sendOrderToEmail() {
            const detail = document.getElementById('orderDetail').value;
            const contact = document.getElementById('contactInfo').value;
            if(!detail || !contact) { showMsg("أكمل البيانات"); return; }

            showMsg("جاري الإرسال...");
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                username: window.Pi.currentUser?.username || "Pioneer",
                service_detail: detail,
                contact_info: contact,
                txid: currentTxId
            }).then(() => {
                document.getElementById('modalContent').innerHTML = `
                    <div style="text-align: center;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: #2ecc71;"></i>
                        <h2>تم بنجاح!</h2>
                        <p>تواصل مع abokareem لمتابعة طلبك.</p>
                        <button class="btn-submit" onclick="location.reload()">إغلاق</button>
                    </div>`;
            });
        }
    </script>
</body>
</html>
