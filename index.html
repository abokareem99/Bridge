<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جسر التواصل - Bridge Freelance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        :root {
            --pi-p: #6a1b9a; --pi-d: #4a148c; --pi-g: #FFD700; --w: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }

        /* تعديل الهيدر ليكون متناسقاً ولا يأخذ مساحة ضخمة */
        .hero {
            padding: 30px 20px; 
            background: linear-gradient(135deg, var(--pi-p) 0%, var(--pi-d) 100%);
            text-align: center; color: var(--w);
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); margin-bottom: 8px; }
        .hero-subtitle { font-size: 0.9rem; opacity: 0.9; margin-bottom: 15px; }

        .btn-auth {
            background: var(--pi-g); color: var(--pi-d); border: none;
            padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer;
        }

        /* تنسيق الأيقونات والبطاقات */
        .categories { padding: 20px; flex: 1; max-width: 500px; margin: 0 auto; width: 100%; }
        .cat-card {
            background: var(--w); margin-bottom: 12px; padding: 15px;
            border-radius: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border: 1px solid #eee;
            transition: 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .cat-card:active { transform: scale(0.97); }
        .cat-info { display: flex; align-items: center; gap: 15px; }
        .cat-info i { color: var(--pi-g); font-size: 1.3rem; background: var(--pi-d); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .price-tag { background: #fff3e0; color: #e65100; padding: 4px 10px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; border: 1px solid #ffe0b2; }

        /* نافذة تقديم الخدمة المنبثقة (المودال) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 400px; padding: 25px;
            border-radius: 20px; text-align: center; position: relative;
        }
        .modal-content h2 { color: var(--pi-d); margin-bottom: 15px; }
        .modal-content p { font-size: 0.95rem; color: #666; margin-bottom: 20px; line-height: 1.6; }
        .btn-pay-now {
            width: 100%; background: var(--pi-g); color: var(--pi-d); border: none;
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 1.2rem; color: #ccc; cursor: pointer; }

        #toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #333; color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 3000;
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">جسر التواصل</h1>
        <p class="hero-subtitle">منصة العمل الحر الموثقة عبر Pi Network</p>
        <button id="authBtn" class="btn-auth" onclick="startApp()">توثيق الحساب للدفع</button>
    </section>

    <section class="categories">
        <div class="cat-card" onclick="openService('البرمجة والتطوير', 1.0, 'نقدم لك حلولاً برمجية متكاملة تشمل تطوير المواقع والتطبيقات الذكية بأعلى جودة.')">
            <div class="cat-info"><i class="fas fa-code"></i><span>البرمجة والتطوير</span></div>
            <span class="price-tag">1.0 Pi</span>
        </div>

        <div class="cat-card" onclick="openService('التصميم الجرافيكي', 0.8, 'احصل على هويات بصرية وشعارات احترافية تعكس تميز مشروعك.')">
            <div class="cat-info"><i class="fas fa-palette"></i><span>التصميم الجرافيكي</span></div>
            <span class="price-tag">0.8 Pi</span>
        </div>

        <div class="cat-card" onclick="openService('كتابة المحتوى', 0.5, 'خدمات كتابة المقالات، الترجمة، وصناعة المحتوى الإبداعي المتوافق مع محركات البحث.')">
            <div class="cat-info"><i class="fas fa-pen-nib"></i><span>الكتابة والترجمة</span></div>
            <span class="price-tag">0.5 Pi</span>
        </div>
    </section>

    <div id="serviceModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal()"></i>
            <h2 id="mTitle">اسم الخدمة</h2>
            <p id="mDesc">وصف الخدمة سيظهر هنا بشكل مفصل ليتمكن المستخدم من معرفة ما سيحصل عليه.</p>
            <div style="margin-bottom: 20px; font-weight: bold; color: var(--pi-p);">السعر: <span id="mPrice">0</span> Pi</div>
            <button class="btn-pay-now" onclick="confirmPayment()">تأكيد الطلب والدفع</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentService = { title: '', price: 0 };

        function openService(title, price, desc) {
            currentService = { title, price };
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mDesc').innerText = desc;
            document.getElementById('mPrice').innerText = price;
            document.getElementById('serviceModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('serviceModal').style.display = 'none'; }

        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                showMsg("تم التوثيق: " + auth.user.username);
                document.getElementById('authBtn').innerText = "الحساب موثق ✅";
            } catch (e) { showMsg("خطأ في التوثيق"); }
        }

        async function confirmPayment() {
            closeModal();
            try {
                showMsg("جاري معالجة الدفع لـ " + currentService.title);
                await window.Pi.createPayment({
                    amount: currentService.price,
                    memo: "طلب خدمة: " + currentService.title,
                    metadata: { service: currentService.title }
                }, {
                    onReadyForServerApproval: (id) => fetch('/api/payment-handler', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ paymentId: id, action: 'approve' })
                    }).then(r => r.json()),
                    onConnectedToBlockchain: (id, tx) => showMsg("نجحت العملية!"),
                    onCancel: () => showMsg("تم إلغاء الدفع"),
                    onError: (e) => showMsg("خطأ: " + e.message)
                });
            } catch (e) { showMsg("عذراً، فشل الدفع"); }
        }

        function showMsg(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
