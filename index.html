<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Freelance - Professional Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --pi-p: #6a1b9a; --pi-d: #2d0a4e; --pi-g: #ffb74d; --white: #ffffff; --glass: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #4a148c, #2d0a4e); min-height: 100vh; color: var(--white); padding-bottom: 100px; }

        /* Header */
        .hero { padding: 25px 15px; text-align: center; }
        .hero-title { font-size: 1.8rem; color: var(--pi-g); font-weight: 900; letter-spacing: 1px; }
        .welcome-msg { font-size: 0.75rem; background: var(--glass); padding: 6px 16px; border-radius: 50px; margin-top: 8px; display: inline-block; color: #FFFF00; border: 1px solid rgba(255,183,77,0.2); }
        
        /* Auth */
        .auth-actions { display: flex; justify-content: center; gap: 12px; margin: 20px 0; }
        .btn-auth { background: #8A2BE2; color: white; border: none; padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-free-post { background: var(--glass); color: var(--pi-g); border: 1px solid var(--pi-g); padding: 12px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        /* Services Grid */
        .categories { padding: 10px; max-width: 500px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .cat-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 20px 10px; border-radius: 24px; text-align: center; cursor: pointer; transition: 0.3s; }
        .cat-card:active { transform: scale(0.95); }
        .cat-card i { color: var(--pi-d); background: var(--pi-g); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 14px; margin: 0 auto 12px; font-size: 1.2rem; }
        .cat-card span { font-weight: 700; font-size: 0.9rem; display: block; margin-bottom: 8px; color: #fff; }
        .price-badge { font-size: 0.8rem; color: var(--pi-g); border: 1px solid var(--pi-g); padding: 3px 12px; border-radius: 10px; font-weight: 800; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: var(--white); width: 100%; max-width: 350px; padding: 35px 25px; border-radius: 30px; color: var(--pi-d); text-align: center; animation: popUp 0.3s ease-out; }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .success-icon { width: 85px; height: 85px; background: #2ecc71; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(46,204,113,0.3); }
        .btn-modal-primary { background: #6a1b9a; color: white; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a052e; display: flex; justify-content: space-around; padding: 15px 0 25px; border-top: 1px solid var(--glass); z-index: 9999; }
        .nav-item { color: white; opacity: 0.4; font-size: 1.6rem; cursor: pointer; }
        .nav-item.active { color: var(--pi-g); opacity: 1; }

        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--pi-g); color: var(--pi-d); padding: 12px 25px; border-radius: 50px; display: none; z-index: 10001; font-weight: 800; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="homePage">
        <section class="hero">
            <h1 class="hero-title">Bridge Freelance</h1>
            <div class="welcome-msg">Verified Freelance Network 🌐</div>
            <div class="auth-actions">
                <button id="authBtn" class="btn-auth" onclick="startApp()">
                    <i class="fab fa-ethereum"></i> Pi Login
                </button>
                <button class="btn-free-post" onclick="openFreeModal()">
                    <i class="fas fa-plus-circle"></i> Free Listing
                </button>
            </div>
        </section>

        <section class="categories" id="servicesContainer"></section>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="success-icon"><i class="fas fa-check"></i></div>
            <h2 style="font-size: 1.7rem; margin-bottom: 10px;">Order Received!</h2>
            <p style="color: #666; margin-bottom: 25px; line-height: 1.5;">Thank you for using <b>Bridge Freelance</b>.<br>Our team will contact you shortly.</p>
            <button class="btn-modal-primary" onclick="closeModal('successModal')">Done</button>
        </div>
    </div>

    <div id="reqModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 15px;">Order Details</h3>
            <textarea id="orderDetail" rows="4" placeholder="Describe your request..." style="width:100%; padding:12px; border-radius:12px; border: 1px solid #ddd; margin-bottom: 15px; outline: none;"></textarea>
            <input type="text" id="contactInfo" placeholder="Email or Telegram" style="width:100%; padding:12px; border-radius:12px; border: 1px solid #ddd; margin-bottom: 20px; outline: none;">
            <button onclick="submitOrder()" style="width:100%; padding:15px; background:var(--pi-g); border:none; border-radius:15px; font-weight:bold; color:var(--pi-d);">Submit Now</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active"><i class="fas fa-home"></i></div>
        <div class="nav-item" onclick="showMsg('History coming soon')"><i class="fas fa-history"></i></div>
        <div class="nav-item" onclick="openAdmin()"><i class="fas fa-user-shield"></i></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h3>Admin Panel</h3>
            <input type="password" id="adminPass" placeholder="Access Code" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd;">
            <button onclick="checkAdmin()" style="width:100%; padding:12px; background:var(--pi-d); color:var(--pi-g); border:none; border-radius:10px;">Unlock</button>
            <div id="adminTools" style="display:none; margin-top:20px;">
                <input type="text" id="newSTitle" placeholder="Service Name" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="number" id="newSPrice" placeholder="Price (Pi)" style="width:100%; padding:10px; margin-bottom:15px;">
                <button onclick="addService()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; border-radius:10px;">Save Service</button>
                <button onclick="closeModal('adminModal')" style="width:100%; padding:10px; margin-top:10px; border:none;">Close</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://xolwuawlnruvzqowxxbh.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w");
        let currentTxId = "", currentPrice = 0, currentCategory = "";

        function showMsg(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function openAdmin() { document.getElementById('adminModal').style.display='flex'; }

        // المصادقة
        async function startApp() {
            try {
                await window.Pi.init({ version: "2.0", sandbox: true });
                const auth = await window.Pi.authenticate(['username', 'payments'], (p) => {});
                window.currentUser = auth.user.username;
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-check-circle"></i> ${auth.user.username}`;
                loadServices();
            } catch (e) { showMsg("Authentication Error"); }
        }

        // جلب الخدمات (إصلاح شامل)
        async function loadServices() {
            const { data } = await _supabase.from('services').select('*').or('category.eq.Service,category.eq.service');
            const container = document.getElementById('servicesContainer');
            if(data && data.length > 0) {
                container.innerHTML = data.map(s => `
                    <div class="cat-card" onclick="processPayment(${s.price}, '${s.title}')">
                        <i class="fas fa-briefcase"></i>
                        <span>${s.title}</span>
                        <span class="price-badge">${s.price} Pi</span>
                    </div>`).join('');
            } else {
                container.innerHTML = "<p style='grid-column:1/3; opacity:0.5;'>No services found. Add one from Admin.</p>";
            }
        }

        // منطق الدفع المحسن (Complete Flow)
        async function processPayment(amt, name) {
            if(!window.currentUser) return showMsg("Please login first");
            currentPrice = amt; currentCategory = name;
            
            try {
                showMsg("Opening Pi Wallet...");
                const payment = await window.Pi.createPayment({
                    amount: amt,
                    memo: "Service: " + name,
                    metadata: { service: name }
                }, {
                    onReadyForServerApproval: (id) => {
                        // لإزالة خطأ "انتهت الصلاحية"، يجب إرجاع استجابة فورية هنا
                        return fetch('https://bridge-pi.vercel.app/api/approve', { 
                            method: 'POST', body: JSON.stringify({ paymentId: id }) 
                        }).then(r => r.json()).catch(() => { return { action: "approve" }; });
                    },
                    onConnectedToBlockchain: (id, tx) => { currentTxId = tx; },
                    onReadyForServerCompletion: (id, tx) => {
                        document.getElementById('reqModal').style.display = 'flex';
                        return fetch('https://bridge-pi.vercel.app/api/complete', { 
                            method: 'POST', body: JSON.stringify({ paymentId: id, txid: tx }) 
                        }).then(r => r.json()).catch(() => { return { action: "complete" }; });
                    },
                    onError: (e) => showMsg("Payment Failed"),
                    onCancel: () => showMsg("Payment Cancelled")
                });
            } catch (e) { showMsg("Payment System Busy"); }
        }

        // إرسال الطلب
        async function submitOrder() {
            const d = document.getElementById('orderDetail').value;
            const c = document.getElementById('contactInfo').value;
            if(!d || !c) return showMsg("Please fill details");

            await _supabase.from('services').insert([{ 
                title: currentCategory, description: d, price: String(currentPrice), 
                category: 'Order', contact_info: c, user_pi: window.currentUser, txid: currentTxId 
            }]);

            document.getElementById('reqModal').style.display = 'none';
            document.getElementById('successModal').style.display = 'flex';
        }

        // أدوات الإدارة
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "ateya2026") {
                document.getElementById('adminTools').style.display = 'block';
            } else { showMsg("Wrong Access Code"); }
        }

        async function addService() {
            const t = document.getElementById('newSTitle').value;
            const p = document.getElementById('newSPrice').value;
            if(!t || !p) return;
            await _supabase.from('services').insert([{ title: t, price: p, category: 'Service', status: 'active' }]);
            showMsg("Service Saved!");
            loadServices();
        }

        window.onload = () => { loadServices(); };
    </script>
</body>
</html>
